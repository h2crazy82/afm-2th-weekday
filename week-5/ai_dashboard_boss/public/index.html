<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AI Dashboard — 로그인</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Pretendard', system-ui, sans-serif;
         background: linear-gradient(135deg, #f6f8fb 0%, #e9eef5 100%);
         min-height: 100vh; display: grid; place-items: center; color: #1a1a1a; }
  .card { background: #fff; padding: 32px 28px; border-radius: 14px; width: 360px;
          box-shadow: 0 12px 40px rgba(0,0,0,.08); border: 1px solid #ececec; }
  h1 { margin: 0 0 4px; font-size: 20px; }
  .sub { margin: 0 0 22px; font-size: 13px; color: #777; }
  label { display: block; font-size: 12px; color: #555; margin: 10px 0 4px; font-weight: 600; }
  input { width: 100%; padding: 11px 12px; font-size: 14px; border: 1px solid #ddd;
          border-radius: 8px; background: #fafafa; }
  input:focus { outline: none; border-color: #0b6bcb; background: #fff; }
  .actions { display: flex; gap: 8px; margin-top: 18px; }
  button { flex: 1; padding: 11px; font-size: 14px; border: 0; border-radius: 8px;
           cursor: pointer; font-weight: 600; }
  .primary { background: #111; color: #fff; }
  .primary:hover { background: #333; }
  .ghost { background: #eee; color: #333; }
  .ghost:hover { background: #e0e0e0; }
  .msg { margin-top: 14px; min-height: 18px; font-size: 13px; }
  .msg.err { color: #c00; }
  .msg.ok { color: #0a7; }
</style>
</head>
<body>
  <form class="card" id="form">
    <h1>AI Dashboard</h1>
    <p class="sub">나만 접근 가능한 솔로 오퍼레이터용 대시보드</p>

    <label>이메일</label>
    <input type="email" id="email" required autocomplete="email" />

    <label>비밀번호</label>
    <input type="password" id="password" required minlength="6" autocomplete="current-password" />

    <div class="actions">
      <button type="button" class="primary" id="signin">로그인</button>
      <button type="button" class="ghost" id="signup">회원가입</button>
    </div>
    <div class="msg" id="msg"></div>
  </form>

<script>
const $email = document.getElementById('email');
const $pw = document.getElementById('password');
const $msg = document.getElementById('msg');

function say(text, ok) {
  $msg.textContent = text;
  $msg.className = 'msg ' + (ok ? 'ok' : 'err');
}

async function auth(path) {
  const email = $email.value.trim();
  const password = $pw.value;
  if (!email || !password) return say('이메일과 비밀번호를 입력하세요.');
  try {
    const res = await fetch(`/api/auth/${path}`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) return say(data.error || res.status);
    if (data.session?.access_token) {
      localStorage.setItem('access_token', data.session.access_token);
      location.href = '/dashboard';
    } else {
      say('가입 완료. 이메일 인증 후 로그인하세요.', true);
    }
  } catch (e) {
    say(e.message);
  }
}

document.getElementById('signin').onclick = () => auth('signin');
document.getElementById('signup').onclick = () => auth('signup');

const existing = localStorage.getItem('access_token');
if (existing) {
  fetch('/api/auth/me', { headers: { authorization: `Bearer ${existing}` } })
    .then((r) => r.ok && (location.href = '/dashboard'));
}
</script>
</body>
</html>
