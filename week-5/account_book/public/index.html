<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .fade-in { animation: fadeIn 0.25s ease-in; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;
    const API_BASE_URL = '/api';

    // ===== Design primitives =====
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', children, className = '' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white focus:ring-indigo-500',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800 focus:ring-slate-400',
        danger: 'bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 focus:ring-red-400',
        ghost: 'hover:bg-slate-100 text-slate-700 focus:ring-slate-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
      return (
        <button type={type} onClick={onClick} disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Card({ children, className = '' }) {
      return <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 ${className}`}>{children}</div>;
    }

    function Badge({ children, color = 'slate' }) {
      const colors = {
        slate: 'bg-slate-100 text-slate-700',
        emerald: 'bg-emerald-100 text-emerald-700',
        rose: 'bg-rose-100 text-rose-700',
        indigo: 'bg-indigo-100 text-indigo-700',
      };
      return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${colors[color]}`}>{children}</span>;
    }

    function Alert({ children }) {
      return <div className="border rounded-lg px-3 py-2 text-sm bg-red-50 border-red-200 text-red-700">{children}</div>;
    }

    function Spinner() {
      return (
        <svg className="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
      );
    }

    function EmptyState({ title, description }) {
      return (
        <div className="text-center py-10 px-4">
          <p className="text-sm font-medium text-slate-700">{title}</p>
          {description && <p className="text-xs text-slate-500 mt-1">{description}</p>}
        </div>
      );
    }

    // ===== Helpers =====
    const todayStr = () => new Date().toISOString().slice(0, 10);

    function formatDate(value) {
      if (!value) return '';
      try {
        const d = new Date(value);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
      } catch (e) { return ''; }
    }

    function formatWon(n) {
      const num = Number(n) || 0;
      return num.toLocaleString('ko-KR') + '원';
    }

    async function apiRequest(path, options = {}) {
      const res = await fetch(`${API_BASE_URL}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        let msg = `요청 실패 (${res.status})`;
        try { const body = await res.json(); if (body?.error) msg = body.error; } catch (e) {}
        throw new Error(msg);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // ===== Form =====
    function TransactionForm({ onCreated }) {
      const [type, setType] = useState('expense');
      const [form, setForm] = useState({
        amount: '', category: '', memo: '', date: todayStr(),
      });
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.amount || Number(form.amount) < 0) { setError('올바른 금액을 입력해 주세요.'); return; }
        if (!form.category.trim()) { setError('카테고리를 입력해 주세요.'); return; }
        if (!form.date) { setError('날짜를 선택해 주세요.'); return; }
        setSubmitting(true);
        setError(null);
        try {
          await apiRequest('/transactions', {
            method: 'POST',
            body: JSON.stringify({
              type,
              amount: Number(form.amount),
              category: form.category.trim(),
              memo: form.memo.trim() || null,
              date: form.date,
            }),
          });
          setForm({ amount: '', category: '', memo: '', date: todayStr() });
          onCreated?.();
        } catch (e) {
          setError(e.message);
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <Card className="p-5 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-lg font-semibold text-slate-900">내역 등록</h2>
            <div className="inline-flex bg-slate-100 rounded-lg p-1">
              <button type="button" onClick={() => setType('expense')}
                className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${
                  type === 'expense' ? 'bg-rose-500 text-white' : 'text-slate-600 hover:bg-white'
                }`}>지출</button>
              <button type="button" onClick={() => setType('income')}
                className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${
                  type === 'income' ? 'bg-emerald-500 text-white' : 'text-slate-600 hover:bg-white'
                }`}>수입</button>
            </div>
          </div>

          <form onSubmit={handleSubmit} className="flex flex-col gap-3">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div className="flex flex-col gap-1">
                <label className="text-sm font-medium text-slate-700">금액<span className="text-red-500 ml-0.5">*</span></label>
                <input type="number" min="0" step="1" value={form.amount}
                  onChange={(e) => setForm({ ...form, amount: e.target.value })}
                  placeholder="예: 12000"
                  className="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
              </div>
              <div className="flex flex-col gap-1">
                <label className="text-sm font-medium text-slate-700">날짜<span className="text-red-500 ml-0.5">*</span></label>
                <input type="date" value={form.date}
                  onChange={(e) => setForm({ ...form, date: e.target.value })}
                  className="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
              </div>
            </div>
            <div className="flex flex-col gap-1">
              <label className="text-sm font-medium text-slate-700">카테고리<span className="text-red-500 ml-0.5">*</span></label>
              <input type="text" value={form.category}
                onChange={(e) => setForm({ ...form, category: e.target.value })}
                placeholder="예: 식비 / 교통 / 주거 / 구독료"
                className="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
            </div>
            <div className="flex flex-col gap-1">
              <label className="text-sm font-medium text-slate-700">메모</label>
              <input type="text" value={form.memo}
                onChange={(e) => setForm({ ...form, memo: e.target.value })}
                placeholder="선택 입력"
                className="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
            </div>

            {error && <Alert>{error}</Alert>}

            <div className="flex justify-end">
              <Button type="submit" disabled={submitting}>
                {submitting ? '저장 중...' : '등록'}
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    // ===== List =====
    function TransactionList({ items, loading, error, onDelete }) {
      return (
        <Card className="p-5 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-lg font-semibold text-slate-900">내역 목록</h2>
            <Badge color="indigo">{items.length}건</Badge>
          </div>

          {error && <div className="mb-3"><Alert>{error}</Alert></div>}

          {loading ? (
            <div className="flex items-center justify-center py-10"><Spinner /></div>
          ) : items.length === 0 ? (
            <EmptyState title="등록된 내역이 없습니다" description="위 양식에서 첫 내역을 추가해 보세요." />
          ) : (
            <ul className="divide-y divide-slate-100">
              {items.map((t) => (
                <li key={t.id} className="fade-in py-3 flex items-center gap-3">
                  <div className="shrink-0 w-1 h-10 rounded-full"
                    style={{ background: t.type === 'income' ? '#10b981' : '#f43f5e' }} />
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <Badge color={t.type === 'income' ? 'emerald' : 'rose'}>
                        {t.type === 'income' ? '수입' : '지출'}
                      </Badge>
                      <span className="text-sm font-medium text-slate-800 truncate">{t.category}</span>
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5 truncate">
                      {formatDate(t.date)}{t.memo ? ` · ${t.memo}` : ''}
                    </div>
                  </div>
                  <div className={`shrink-0 text-sm font-semibold tabular-nums ${
                    t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'
                  }`}>
                    {t.type === 'income' ? '+' : '-'}{formatWon(t.amount)}
                  </div>
                  <Button variant="danger" size="sm" onClick={() => onDelete(t.id)}>삭제</Button>
                </li>
              ))}
            </ul>
          )}
        </Card>
      );
    }

    // ===== Summary =====
    function SummarySection({ summary }) {
      const render = (title, obj, color) => {
        const entries = Object.entries(obj || {}).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((s, [, v]) => s + Number(v), 0);
        return (
          <div>
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-sm font-semibold text-slate-800">{title}</h3>
              <span className={`text-sm font-semibold tabular-nums ${color}`}>{formatWon(total)}</span>
            </div>
            {entries.length === 0 ? (
              <p className="text-xs text-slate-400">데이터 없음</p>
            ) : (
              <ul className="flex flex-col gap-2">
                {entries.map(([cat, amt]) => {
                  const pct = total > 0 ? Math.round((amt / total) * 100) : 0;
                  return (
                    <li key={cat}>
                      <div className="flex items-center justify-between text-xs mb-1">
                        <span className="text-slate-700 font-medium">{cat}</span>
                        <span className="tabular-nums text-slate-600">{formatWon(amt)} · {pct}%</span>
                      </div>
                      <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full ${color.replace('text-', 'bg-')}`} style={{ width: `${pct}%` }} />
                      </div>
                    </li>
                  );
                })}
              </ul>
            )}
          </div>
        );
      };

      return (
        <Card className="p-5 sm:p-6">
          <h2 className="text-lg font-semibold text-slate-900 mb-4">카테고리별 합계</h2>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
            {render('수입', summary.income, 'text-emerald-600')}
            {render('지출', summary.expense, 'text-rose-600')}
          </div>
        </Card>
      );
    }

    // ===== Monthly Report + Budget =====
    const BUDGET_STORAGE_KEY = 'account_book_monthly_budget';

    function MonthlyReport({ items }) {
      const [month, setMonth] = useState(() => new Date().toISOString().slice(0, 7));
      const [budget, setBudget] = useState(() => Number(localStorage.getItem(BUDGET_STORAGE_KEY)) || 0);

      const handleBudgetChange = (v) => {
        const n = Number(v) || 0;
        setBudget(n);
        try { localStorage.setItem(BUDGET_STORAGE_KEY, String(n)); } catch (e) {}
      };

      const report = useMemo(() => {
        const filtered = items.filter((t) => t.date && t.date.startsWith(month));
        let income = 0, expense = 0;
        const expenseByCat = {};
        for (const t of filtered) {
          const amt = Number(t.amount) || 0;
          if (t.type === 'income') income += amt;
          else {
            expense += amt;
            const key = t.category || '미분류';
            expenseByCat[key] = (expenseByCat[key] || 0) + amt;
          }
        }
        const topCats = Object.entries(expenseByCat).sort((a, b) => b[1] - a[1]).slice(0, 3);
        return { count: filtered.length, income, expense, net: income - expense, topCats };
      }, [items, month]);

      const pct = budget > 0 ? Math.min(100, Math.round((report.expense / budget) * 100)) : 0;
      const over = budget > 0 && report.expense > budget;
      const barColor = over ? 'bg-rose-500' : pct >= 80 ? 'bg-amber-500' : 'bg-emerald-500';
      const pctTextColor = over ? 'text-rose-600' : pct >= 80 ? 'text-amber-600' : 'text-emerald-600';

      return (
        <Card className="p-5 sm:p-6">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h2 className="text-lg font-semibold text-slate-900">월별 리포트</h2>
            <input type="month" value={month} onChange={(e) => setMonth(e.target.value)}
              className="px-3 py-1.5 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
          </div>

          <div className="grid grid-cols-3 gap-3 mb-5">
            <div className="p-3 rounded-xl bg-emerald-50">
              <p className="text-xs text-emerald-700">수입</p>
              <p className="text-sm font-semibold text-emerald-700 tabular-nums mt-0.5">{formatWon(report.income)}</p>
            </div>
            <div className="p-3 rounded-xl bg-rose-50">
              <p className="text-xs text-rose-700">지출</p>
              <p className="text-sm font-semibold text-rose-700 tabular-nums mt-0.5">{formatWon(report.expense)}</p>
            </div>
            <div className={`p-3 rounded-xl ${report.net >= 0 ? 'bg-slate-100' : 'bg-rose-50'}`}>
              <p className={`text-xs ${report.net >= 0 ? 'text-slate-700' : 'text-rose-700'}`}>잔액</p>
              <p className={`text-sm font-semibold tabular-nums mt-0.5 ${report.net >= 0 ? 'text-slate-800' : 'text-rose-700'}`}>
                {formatWon(report.net)}
              </p>
            </div>
          </div>

          <div className="mb-5">
            <div className="flex items-center justify-between gap-3 mb-2">
              <label className="text-sm font-medium text-slate-700 whitespace-nowrap">예산 대비 지출</label>
              <div className="flex items-center gap-1.5">
                <input type="number" min="0" step="10000" placeholder="월 예산 입력"
                  value={budget || ''} onChange={(e) => handleBudgetChange(e.target.value)}
                  className="w-32 px-2 py-1 border border-slate-300 rounded-md text-xs text-right tabular-nums focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                <span className="text-xs text-slate-500">원</span>
              </div>
            </div>
            {budget > 0 ? (
              <>
                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                  <div className={`h-full transition-all duration-300 ${barColor}`} style={{ width: `${pct}%` }} />
                </div>
                <div className="flex items-center justify-between text-xs mt-1.5">
                  <span className={over ? 'text-rose-600 font-medium tabular-nums' : 'text-slate-600 tabular-nums'}>
                    {formatWon(report.expense)} / {formatWon(budget)}
                  </span>
                  <span className={`tabular-nums font-semibold ${pctTextColor}`}>
                    {pct}%{over ? ' · 초과' : ''}
                  </span>
                </div>
              </>
            ) : (
              <p className="text-xs text-slate-400">월 예산을 입력하면 사용률이 표시됩니다.</p>
            )}
          </div>

          <div>
            <h3 className="text-sm font-semibold text-slate-800 mb-2">이 달 지출 TOP 3</h3>
            {report.topCats.length === 0 ? (
              <p className="text-xs text-slate-400">이 달에 기록된 지출이 없습니다.</p>
            ) : (
              <ul className="flex flex-col gap-1.5">
                {report.topCats.map(([cat, amt], i) => (
                  <li key={cat} className="flex items-center justify-between text-xs">
                    <span className="flex items-center gap-2">
                      <span className="w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-semibold">{i + 1}</span>
                      <span className="font-medium text-slate-700">{cat}</span>
                    </span>
                    <span className="tabular-nums text-rose-600 font-medium">{formatWon(amt)}</span>
                  </li>
                ))}
              </ul>
            )}
          </div>
        </Card>
      );
    }

    // ===== Chart primitives (agent-emitted) =====
    const CHART_COLORS = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#06b6d4', '#a855f7', '#ec4899', '#14b8a6', '#f97316', '#64748b'];
    function formatValue(v, unit) {
      const n = Number(v) || 0;
      if (unit === '원') return formatWon(n);
      return `${n.toLocaleString('ko-KR')}${unit || ''}`;
    }

    function BarChart({ title, labels = [], values = [], unit = '' }) {
      const max = Math.max(...values.map(Number), 1);
      return (
        <div className="mt-4 p-3 border border-slate-200 rounded-xl bg-white">
          <p className="text-xs font-semibold text-slate-700 mb-2">📊 {title}</p>
          <ul className="flex flex-col gap-2">
            {labels.map((label, i) => {
              const v = Number(values[i]) || 0;
              const pct = (v / max) * 100;
              return (
                <li key={i}>
                  <div className="flex items-center justify-between text-[11px] mb-0.5">
                    <span className="text-slate-700 font-medium">{label}</span>
                    <span className="tabular-nums text-slate-600">{formatValue(v, unit)}</span>
                  </div>
                  <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: CHART_COLORS[i % CHART_COLORS.length] }} />
                  </div>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    function PieChart({ title, labels = [], values = [], unit = '' }) {
      const total = values.reduce((s, v) => s + Number(v), 0) || 1;
      let cumul = 0;
      const stops = values.map((v, i) => {
        const start = (cumul / total) * 360;
        cumul += Number(v);
        const end = (cumul / total) * 360;
        return `${CHART_COLORS[i % CHART_COLORS.length]} ${start}deg ${end}deg`;
      }).join(', ');
      return (
        <div className="mt-4 p-3 border border-slate-200 rounded-xl bg-white">
          <p className="text-xs font-semibold text-slate-700 mb-3">🥧 {title}</p>
          <div className="flex gap-4 items-center flex-wrap">
            <div className="rounded-full w-28 h-28 shrink-0 shadow-inner" style={{ background: `conic-gradient(${stops})` }} />
            <ul className="flex-1 min-w-[200px] text-[11px] space-y-1">
              {labels.map((label, i) => {
                const v = Number(values[i]) || 0;
                const pct = ((v / total) * 100).toFixed(1);
                return (
                  <li key={i} className="flex items-center gap-1.5">
                    <span className="w-2.5 h-2.5 rounded-sm shrink-0" style={{ background: CHART_COLORS[i % CHART_COLORS.length] }} />
                    <span className="flex-1 text-slate-700 truncate">{label}</span>
                    <span className="tabular-nums text-slate-600 shrink-0">{formatValue(v, unit)} · {pct}%</span>
                  </li>
                );
              })}
            </ul>
          </div>
        </div>
      );
    }

    function DataTable({ title, columns = [], rows = [] }) {
      return (
        <div className="mt-4 p-3 border border-slate-200 rounded-xl bg-white">
          <p className="text-xs font-semibold text-slate-700 mb-2">📋 {title}</p>
          <div className="overflow-x-auto">
            <table className="w-full text-xs border-collapse">
              <thead>
                <tr className="bg-slate-50">
                  {columns.map((c, i) => (
                    <th key={i} className="text-left px-2 py-1.5 font-semibold text-slate-700 border-b border-slate-200">{c}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className="border-b border-slate-100 last:border-0 hover:bg-slate-50">
                    {r.map((c, j) => (
                      <td key={j} className="px-2 py-1.5 text-slate-700 tabular-nums">
                        {typeof c === 'number' ? c.toLocaleString('ko-KR') : c}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ChartRenderer({ chart }) {
      if (!chart || !chart.chart_type) return null;
      if (chart.chart_type === 'bar') return <BarChart {...chart} />;
      if (chart.chart_type === 'pie') return <PieChart {...chart} />;
      if (chart.chart_type === 'table') return <DataTable {...chart} />;
      return null;
    }

    // ===== Ask Bar =====
    const ASK_PRESETS = [
      '이번 달 얼마 썼어?',
      '식비로 가장 많이 쓴 날이 언제야?',
      '교통 월평균 얼마야?',
      '주중 vs 주말 지출 비교',
      '카테고리별 비율 알려줘',
      '요일별 지출 보여줘',
      '식비랑 쇼핑 비교해줘',
      '줄일 수 있는 것 추천해줘',
      '이번 달 예산 200만원 기준 남은 예산',
      '이 속도로 쓰면 연말까지 얼마 쓸 것 같아?',
    ];

    function analyzeQuery(q, items) {
      const query = (q || '').trim();
      if (!query) return null;

      const today = new Date();
      const YM = today.toISOString().slice(0, 7);
      const year = today.getFullYear();
      const daysInMonth = new Date(year, today.getMonth() + 1, 0).getDate();
      const daysRemainingInMonth = daysInMonth - today.getDate();

      const expenses = items.filter((t) => t.type === 'expense');
      const incomes = items.filter((t) => t.type === 'income');
      const thisMonthExpenses = expenses.filter((t) => t.date?.startsWith(YM));
      const thisMonthIncomes = incomes.filter((t) => t.date?.startsWith(YM));
      const thisMonthExpense = thisMonthExpenses.reduce((s, t) => s + Number(t.amount), 0);

      const categories = [...new Set(items.map((t) => t.category).filter(Boolean))];
      const findCategory = (str) => categories.find((c) => str.includes(c));

      // 1) 이번 달 얼마
      if (/(이번\s*달|이달|금월)/.test(query) && /(얼마|총|합|쓰|지출)/.test(query)) {
        const top = [...thisMonthExpenses].sort((a, b) => Number(b.amount) - Number(a.amount)).slice(0, 3);
        return {
          title: `이번 달(${YM}) 총 지출`,
          main: formatWon(thisMonthExpense),
          details: [
            `지출 ${thisMonthExpenses.length}건 · 수입 ${thisMonthIncomes.length}건`,
            top.length > 0 ? `큰 지출 TOP 3: ${top.map((t) => `${t.category}(${formatWon(t.amount)})`).join(' · ')}` : null,
          ].filter(Boolean),
        };
      }

      // 2) 가장 많이 쓴 날 / 최고 지출일
      if (/(가장|최고|제일|많이).*(쓴|지출).*(날|언제)/.test(query) || /(언제|날).*(가장|제일).*(많|크)/.test(query)) {
        const cat = findCategory(query);
        const pool = cat ? expenses.filter((t) => t.category === cat) : expenses;
        if (pool.length === 0) return { title: `${cat || '전체'} 최대 지출일`, main: '해당 기록 없음' };
        const top = pool.reduce((m, t) => (Number(t.amount) > Number(m.amount) ? t : m));
        return {
          title: `${cat ? cat + ' ' : ''}최대 지출일`,
          main: `${top.date} · ${formatWon(top.amount)}`,
          details: [top.memo ? `메모: ${top.memo}` : null, `기록 ${pool.length}건 중 최대값`].filter(Boolean),
        };
      }

      // 3) 월평균
      if (/월\s*평균|월별\s*평균/.test(query)) {
        const cat = findCategory(query);
        const pool = cat ? expenses.filter((t) => t.category === cat) : expenses;
        if (pool.length === 0) return { title: `${cat || '전체'} 월평균`, main: '기록 없음' };
        const months = new Set(pool.map((t) => t.date?.slice(0, 7)).filter(Boolean));
        const total = pool.reduce((s, t) => s + Number(t.amount), 0);
        const avg = months.size > 0 ? total / months.size : 0;
        return {
          title: `${cat || '전체'} 월평균 지출`,
          main: formatWon(Math.round(avg)),
          details: [`데이터 월 수: ${months.size}개월 · ${pool.length}건`, `총 ${formatWon(total)}`],
        };
      }

      // 4) 주중 vs 주말
      if (/주중.*주말|주말.*주중|평일.*주말|주말.*평일/.test(query)) {
        let wd = 0, we = 0;
        const wdDays = new Set(), weDays = new Set();
        for (const t of thisMonthExpenses) {
          const dow = new Date(t.date).getDay();
          if (dow === 0 || dow === 6) { we += Number(t.amount); weDays.add(t.date); }
          else { wd += Number(t.amount); wdDays.add(t.date); }
        }
        return {
          title: `이번 달(${YM}) 주중 vs 주말 지출`,
          main: `주중 ${formatWon(wd)} · 주말 ${formatWon(we)}`,
          details: [
            `주중 ${wdDays.size}일 · 일평균 ${formatWon(Math.round(wd / Math.max(wdDays.size, 1)))}`,
            `주말 ${weDays.size}일 · 일평균 ${formatWon(Math.round(we / Math.max(weDays.size, 1)))}`,
          ],
        };
      }

      // 5) 카테고리별 비율
      if (/카테고리.*비율|비율.*카테고리|카테고리.*분포/.test(query)) {
        const byCat = {};
        for (const t of thisMonthExpenses) byCat[t.category] = (byCat[t.category] || 0) + Number(t.amount);
        const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
        return {
          title: `이번 달(${YM}) 카테고리별 지출 비율`,
          main: `총 ${formatWon(thisMonthExpense)}`,
          details: sorted.map(([c, v]) => `${c}: ${formatWon(v)} (${thisMonthExpense > 0 ? Math.round((v / thisMonthExpense) * 100) : 0}%)`),
        };
      }

      // 6) 절약 추천
      if (/(줄일|아낄|절약|감량).*(추천|있|어떻|뭐|해)/.test(query) || /(소비\s*습관|낭비)/.test(query)) {
        const byCat = {};
        for (const t of thisMonthExpenses) byCat[t.category] = (byCat[t.category] || 0) + Number(t.amount);
        const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
        const discretionary = new Set(['쇼핑', '구독료', '문화생활', '외식', '커피']);
        const tips = [];
        for (const [cat, amt] of sorted) {
          if (discretionary.has(cat)) tips.push(`${cat} ${formatWon(amt)} - 월 한도 설정 권장`);
        }
        const subs = thisMonthExpenses.filter((t) => t.category === '구독료');
        if (subs.length >= 2) {
          const names = subs.map((t) => t.memo).filter(Boolean).join(', ');
          tips.push(`구독료 ${subs.length}건${names ? ` (${names})` : ''} → 중복 여부 점검`);
        }
        const big = thisMonthExpenses.filter((t) => Number(t.amount) >= 500000);
        if (big.length > 0) tips.push(`고액 지출 ${big.length}건: 일회성인지 반복성인지 구분 필요`);
        if (tips.length === 0) tips.push('재량 지출이 크지 않음 · 현재 페이스 유지 가능');
        return {
          title: '절약 추천',
          main: `TOP 카테고리: ${sorted.slice(0, 3).map(([c]) => c).join(' · ') || '없음'}`,
          details: tips,
        };
      }

      // 7) 예산 N만원 기준 남은 예산
      const budgetMatch = query.match(/(\d+(?:[\.,]\d+)?)\s*만\s*원?/);
      if (budgetMatch && /(예산|남|잔)/.test(query)) {
        const budget = Number(budgetMatch[1].replace(',', '')) * 10000;
        const remaining = budget - thisMonthExpense;
        const perDay = daysRemainingInMonth > 0 ? remaining / daysRemainingInMonth : 0;
        return {
          title: `이번 달 예산 ${formatWon(budget)}`,
          main: remaining >= 0 ? `남은 예산 ${formatWon(remaining)}` : `⚠️ 예산 초과 ${formatWon(-remaining)}`,
          details: [
            `사용률 ${budget > 0 ? Math.round((thisMonthExpense / budget) * 100) : 0}% (${formatWon(thisMonthExpense)} / ${formatWon(budget)})`,
            remaining > 0 && daysRemainingInMonth > 0 ? `남은 ${daysRemainingInMonth}일 일 한도: ${formatWon(Math.round(perDay))}` : null,
          ].filter(Boolean),
        };
      }

      // 8) 연말 예상
      if (/(연말|1년|올해|올\s*해).*(얼마|예상|쓸)/.test(query) || /이\s*속도|이대로\s*쓰/.test(query)) {
        const yearExpenses = expenses.filter((t) => t.date?.startsWith(String(year)));
        const yearTotal = yearExpenses.reduce((s, t) => s + Number(t.amount), 0);
        const yearStart = new Date(year, 0, 1);
        const daysElapsed = Math.max(1, Math.floor((today - yearStart) / 86400000) + 1);
        const perDay = yearTotal / daysElapsed;
        const projected = perDay * 365;
        const big = yearExpenses.filter((t) => Number(t.amount) >= 1000000);
        const bigSum = big.reduce((s, t) => s + Number(t.amount), 0);
        const normalProjected = ((yearTotal - bigSum) / daysElapsed) * 365 + bigSum;
        return {
          title: `이 페이스로 연말(${year}-12-31)까지`,
          main: formatWon(Math.round(projected)),
          details: [
            `${daysElapsed}일간 ${formatWon(yearTotal)} · 일평균 ${formatWon(Math.round(perDay))}`,
            big.length > 0 ? `일회성 고액 ${formatWon(bigSum)} 제외 시 현실적 예상: ${formatWon(Math.round(normalProjected))}` : null,
          ].filter(Boolean),
        };
      }

      return {
        title: '이 질문은 아직 처리 못 해',
        main: '아래 예시 칩을 눌러보거나 질문을 바꿔 보세요',
        details: ASK_PRESETS,
      };
    }

    function AskBar() {
      const [query, setQuery] = useState('');
      const [loading, setLoading] = useState(false);
      const [answer, setAnswer] = useState(null);
      const [trace, setTrace] = useState([]);
      const [charts, setCharts] = useState([]);
      const [error, setError] = useState(null);

      const ask = async (q) => {
        const text = (q || '').trim();
        if (!text) return;
        setQuery(text);
        setLoading(true);
        setError(null);
        setAnswer(null);
        setTrace([]);
        setCharts([]);
        try {
          const res = await apiRequest('/ask', { method: 'POST', body: JSON.stringify({ question: text }) });
          setAnswer(res.answer || '');
          setTrace(Array.isArray(res.trace) ? res.trace : []);
          setCharts(Array.isArray(res.charts) ? res.charts : []);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const onSubmit = (e) => { e.preventDefault(); ask(query); };

      return (
        <Card className="p-5 sm:p-6">
          <div className="flex items-center gap-2 mb-3">
            <span className="inline-flex items-center justify-center w-7 h-7 rounded-lg bg-indigo-100 text-indigo-600 text-sm font-semibold">AI</span>
            <h2 className="text-lg font-semibold text-slate-900">소비 분석 에이전트</h2>
            <Badge color="indigo">OpenAI · tool calling</Badge>
          </div>

          <form onSubmit={onSubmit} className="flex gap-2 mb-3">
            <input type="text" value={query} onChange={(e) => setQuery(e.target.value)}
              placeholder='예: "이번 달 얼마 썼어?"' disabled={loading}
              className="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 disabled:bg-slate-50" />
            <Button type="submit" disabled={loading}>{loading ? '분석 중...' : '질문'}</Button>
          </form>

          <div className="flex flex-wrap gap-1.5 mb-4">
            {ASK_PRESETS.map((p) => (
              <button key={p} type="button" onClick={() => ask(p)} disabled={loading}
                className="px-2.5 py-1 text-xs bg-slate-100 hover:bg-indigo-100 hover:text-indigo-700 text-slate-600 rounded-full transition-colors disabled:opacity-50">
                {p}
              </button>
            ))}
          </div>

          {error && <div className="mb-3"><Alert>{error}</Alert></div>}

          {loading && (
            <div className="flex items-center gap-2 text-xs text-slate-500 border-t border-slate-100 pt-4">
              <Spinner /> 에이전트가 DB 를 조회하고 있습니다...
            </div>
          )}

          {!loading && answer && (
            <div className="fade-in border-t border-slate-100 pt-4">
              <div className="text-sm text-slate-800 whitespace-pre-wrap leading-relaxed">{answer}</div>
              {charts.map((c, i) => <ChartRenderer key={i} chart={c} />)}
              {trace.length > 0 && (
                <details className="mt-3">
                  <summary className="text-xs text-slate-400 cursor-pointer hover:text-slate-600">
                    🔧 툴 호출 {trace.length}회 보기
                  </summary>
                  <ul className="mt-2 space-y-1 text-[11px] text-slate-500 font-mono">
                    {trace.map((t, i) => (
                      <li key={i} className="bg-slate-50 rounded px-2 py-1">
                        <span className="text-indigo-600">{t.tool}</span>({JSON.stringify(t.args)})
                        {' → '}{JSON.stringify(t.result_summary)}
                      </li>
                    ))}
                  </ul>
                </details>
              )}
            </div>
          )}
        </Card>
      );
    }

    // ===== App =====
    function App() {
      const [items, setItems] = useState([]);
      const [summary, setSummary] = useState({ income: {}, expense: {} });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const loadAll = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const [list, sum] = await Promise.all([
            apiRequest('/transactions'),
            apiRequest('/transactions/summary'),
          ]);
          setItems(Array.isArray(list) ? list : []);
          setSummary(sum || { income: {}, expense: {} });
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      const handleDelete = async (id) => {
        if (!window.confirm('이 내역을 삭제하시겠어요?')) return;
        try {
          await apiRequest(`/transactions/${id}`, { method: 'DELETE' });
          await loadAll();
        } catch (e) {
          setError(e.message);
        }
      };

      const totals = useMemo(() => {
        const income = Object.values(summary.income || {}).reduce((s, v) => s + Number(v), 0);
        const expense = Object.values(summary.expense || {}).reduce((s, v) => s + Number(v), 0);
        return { income, expense, net: income - expense };
      }, [summary]);

      return (
        <div className="min-h-screen">
          <header className="bg-white border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5 flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8v8m0 0v2m0-10V6m9 6a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
              <div className="flex-1">
                <h1 className="text-xl font-bold text-slate-900">가계부</h1>
                <p className="text-xs text-slate-500">수입·지출을 기록하고 카테고리별로 확인하세요.</p>
              </div>
              <div className="hidden sm:flex gap-4 text-right">
                <div>
                  <p className="text-xs text-slate-500">수입</p>
                  <p className="text-sm font-semibold text-emerald-600 tabular-nums">{formatWon(totals.income)}</p>
                </div>
                <div>
                  <p className="text-xs text-slate-500">지출</p>
                  <p className="text-sm font-semibold text-rose-600 tabular-nums">{formatWon(totals.expense)}</p>
                </div>
                <div>
                  <p className="text-xs text-slate-500">잔액</p>
                  <p className={`text-sm font-semibold tabular-nums ${totals.net >= 0 ? 'text-slate-800' : 'text-rose-600'}`}>
                    {formatWon(totals.net)}
                  </p>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex flex-col gap-6">
            <AskBar />
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
              <div className="flex flex-col gap-6">
                <TransactionForm onCreated={loadAll} />
                <MonthlyReport items={items} />
                <SummarySection summary={summary} />
              </div>
              <TransactionList items={items} loading={loading} error={error} onDelete={handleDelete} />
            </div>
          </main>

          <footer className="max-w-6xl mx-auto px-4 sm:px-6 py-6 text-center text-xs text-slate-400">
            Account Book · Express + Supabase + React
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
