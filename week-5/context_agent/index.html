<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Context Agent — 모드 선택</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Pretendard', system-ui, sans-serif;
         background: #fafafa; color: #1a1a1a; line-height: 1.6; }
  .wrap { max-width: 840px; margin: 0 auto; padding: 32px 24px; }
  header h1 { margin: 0 0 4px; font-size: 22px; }
  header p { margin: 0 0 20px; color: #666; font-size: 14px; }

  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .preset { padding: 8px 14px; background: #fff; border: 1px solid #ddd; border-radius: 999px;
            font-size: 13px; cursor: pointer; }
  .preset:hover { background: #f0f0f0; }

  form { display: grid; gap: 12px; margin-bottom: 20px; }
  input[type=text] { padding: 12px 14px; font-size: 15px; border: 1px solid #ccc;
                     border-radius: 8px; background: #fff; }

  .modes { display: flex; gap: 10px; flex-wrap: wrap; }
  .mode { flex: 1; min-width: 220px; position: relative; }
  .mode input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }
  .mode span { display: block; padding: 14px 16px; border: 1.5px solid #ddd; border-radius: 10px;
               background: #fff; cursor: pointer; transition: all .15s; }
  .mode span b { display: block; font-size: 14px; margin-bottom: 2px; }
  .mode span small { color: #888; font-size: 12px; }
  .mode input:checked + span { border-color: #0b6bcb; background: #eef5ff; }

  button[type=submit] { padding: 12px 22px; font-size: 15px; background: #111; color: #fff;
                        border: 0; border-radius: 8px; cursor: pointer; }
  button[type=submit]:disabled { background: #888; cursor: wait; }

  .answer-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 22px;
                 min-height: 160px; border-left: 3px solid #ccc; }
  .answer-card.raw { border-left-color: #bbb; }
  .answer-card.agent { border-left-color: #0b6bcb; }
  .answer-card .badge { display: inline-block; padding: 3px 10px; border-radius: 999px;
                        font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .badge.raw { background: #eee; color: #555; }
  .badge.agent { background: #0b6bcb; color: #fff; }
  .answer-card .q { font-size: 13px; color: #666; margin-bottom: 12px; }
  .answer-card .q b { color: #222; }
  .answer { white-space: pre-wrap; font-size: 14.5px; color: #222; }
  .meta { margin-top: 10px; font-size: 12px; color: #888; }
  .err { color: #c00; }

  details { margin-top: 20px; background: #fff; padding: 12px 16px; border: 1px solid #e5e5e5;
            border-radius: 8px; font-size: 13px; }
  details pre { white-space: pre-wrap; margin: 8px 0 0; color: #444; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>나를 아는 AI 에이전트</h1>
    <p>같은 질문을 모드를 바꿔가며 각각 물어본 뒤 2장씩 캡처하세요. (Before = 일반 AI / After = 내 에이전트)</p>
  </header>

  <div class="presets" id="presets"></div>

  <form id="ask">
    <input type="text" id="q" placeholder="질문을 입력하세요" autocomplete="off" />

    <div class="modes">
      <label class="mode">
        <input type="radio" name="mode" value="raw" />
        <span><b>① 일반 AI (Before)</b><small>프로필·DB 없이 순수 GPT 답변</small></span>
      </label>
      <label class="mode">
        <input type="radio" name="mode" value="agent" checked />
        <span><b>② 내 에이전트 (After)</b><small>context.md + work_logs Function Calling</small></span>
      </label>
    </div>

    <button type="submit" id="go">물어보기</button>
  </form>

  <div class="answer-card" id="card">
    <span class="badge" id="badge">—</span>
    <div class="q" id="qEcho"></div>
    <div class="answer" id="answer">모드 선택 후 질문을 입력하고 '물어보기'를 누르세요.</div>
    <div class="meta" id="meta"></div>
  </div>

  <details>
    <summary>에이전트가 참고하는 <code>context.md</code> 보기</summary>
    <pre id="ctxDump">로딩 중...</pre>
  </details>
</div>

<script>
const PRESETS = [
  '이번 주 제일 시간 많이 쓴 사업은? 다음 주 어디 집중해야 해?',
  '라라케어 B2B 런칭 목표인데, 최근 영업 페이스 괜찮아?',
  '솔로 오퍼레이터인 내가 지금 세 사업 시간 배분 건강해?',
  '이번 주말 내가 쉬어도 되는 상황이야?',
];

const $presets = document.getElementById('presets');
const $q = document.getElementById('q');
const $form = document.getElementById('ask');
const $go = document.getElementById('go');
const $card = document.getElementById('card');
const $badge = document.getElementById('badge');
const $qEcho = document.getElementById('qEcho');
const $answer = document.getElementById('answer');
const $meta = document.getElementById('meta');
const $ctxDump = document.getElementById('ctxDump');

PRESETS.forEach((p) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'preset';
  b.textContent = p;
  b.onclick = () => { $q.value = p; $q.focus(); };
  $presets.appendChild(b);
});

fetch('/api/context').then((r) => r.json()).then((d) => { $ctxDump.textContent = d.context; });

$form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = $q.value.trim();
  const mode = document.querySelector('input[name=mode]:checked')?.value;
  if (!question || !mode) return;

  $go.disabled = true;
  $card.className = 'answer-card ' + mode;
  $badge.className = 'badge ' + mode;
  $badge.textContent = mode === 'raw' ? '① 일반 AI (Before)' : '② 내 에이전트 (After)';
  $qEcho.innerHTML = `<b>Q.</b> ${question}`;
  $answer.textContent = '...';
  $meta.textContent = '';

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ question, mode }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.status);
    $answer.textContent = data.answer;
    const tools = data.toolCalls?.length
      ? ` · tools: ${data.toolCalls.map((t) => `${t.name}(${JSON.stringify(t.args)})`).join(', ')}`
      : '';
    $meta.textContent = `${(data.ms / 1000).toFixed(1)}s${tools}`;
  } catch (err) {
    $answer.innerHTML = `<span class="err">에러: ${err.message}</span>`;
  } finally {
    $go.disabled = false;
  }
});
</script>
</body>
</html>
