<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종합소득세 세금계산기 (2024)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .tooltip-trigger:hover .tooltip-content { display: block; }
    .bracket-bar { transition: width 0.5s ease-out; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;

    // ========================================
    // Utility Functions
    // ========================================

    function formatWon(num) {
      if (num === 0) return '0';
      return Math.round(num).toLocaleString('ko-KR');
    }

    function formatWonUnit(num) {
      if (num >= 100000000) {
        const eok = Math.floor(num / 100000000);
        const man = Math.floor((num % 100000000) / 10000);
        return man > 0 ? `${eok}억 ${formatWon(man)}만` : `${eok}억`;
      }
      if (num >= 10000) {
        return `${formatWon(Math.floor(num / 10000))}만`;
      }
      return formatWon(num);
    }

    function parseInputValue(val) {
      const cleaned = val.replace(/[^0-9]/g, '');
      return cleaned === '' ? 0 : parseInt(cleaned, 10);
    }

    // ========================================
    // Tax Calculation Logic (2024 Korean Income Tax)
    // ========================================

    const TAX_BRACKETS = [
      { limit: 14000000,   rate: 0.06, cumulative: 0,         label: '1,400만원 이하',                color: '#818cf8' },
      { limit: 50000000,   rate: 0.15, cumulative: 840000,    label: '1,400만~5,000만원',             color: '#6366f1' },
      { limit: 88000000,   rate: 0.24, cumulative: 6240000,   label: '5,000만~8,800만원',             color: '#4f46e5' },
      { limit: 150000000,  rate: 0.35, cumulative: 15360000,  label: '8,800만~1억5천만원',            color: '#4338ca' },
      { limit: 300000000,  rate: 0.38, cumulative: 37060000,  label: '1억5천~3억원',                  color: '#3730a3' },
      { limit: 500000000,  rate: 0.40, cumulative: 94060000,  label: '3억~5억원',                     color: '#312e81' },
      { limit: 1000000000, rate: 0.42, cumulative: 174060000, label: '5억~10억원',                    color: '#1e1b4b' },
      { limit: Infinity,   rate: 0.45, cumulative: 384060000, label: '10억원 초과',                   color: '#0f0a2e' },
    ];

    function calculateTax(taxableIncome) {
      if (taxableIncome <= 0) return { totalTax: 0, bracketDetails: [] };

      const bracketDetails = [];
      let remaining = taxableIncome;
      let prevLimit = 0;

      for (const bracket of TAX_BRACKETS) {
        const bracketWidth = bracket.limit === Infinity ? Infinity : bracket.limit - prevLimit;
        const amountInBracket = Math.min(remaining, bracketWidth);

        if (amountInBracket > 0) {
          bracketDetails.push({
            label: bracket.label,
            rate: bracket.rate,
            amount: amountInBracket,
            tax: amountInBracket * bracket.rate,
            color: bracket.color,
          });
        }

        remaining -= amountInBracket;
        prevLimit = bracket.limit;
        if (remaining <= 0) break;
      }

      const totalTax = bracketDetails.reduce((sum, b) => sum + b.tax, 0);
      return { totalTax, bracketDetails };
    }

    // ========================================
    // Design System Components
    // ========================================

    function Card({ children, className = '', title, subtitle }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {(title || subtitle) && (
            <div className="px-6 pt-6 pb-2">
              {title && <h2 className="text-lg font-bold text-gray-900">{title}</h2>}
              {subtitle && <p className="text-sm text-gray-500 mt-1">{subtitle}</p>}
            </div>
          )}
          <div className="px-6 pb-6">{children}</div>
        </div>
      );
    }

    function WonInput({ label, value, onChange, tooltip, placeholder = '0', disabled = false }) {
      const [displayValue, setDisplayValue] = useState(value > 0 ? formatWon(value) : '');

      useEffect(() => {
        if (value === 0) {
          setDisplayValue('');
        }
      }, [value]);

      const handleChange = (e) => {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        if (raw === '') {
          setDisplayValue('');
          onChange(0);
        } else {
          const num = parseInt(raw, 10);
          setDisplayValue(formatWon(num));
          onChange(num);
        }
      };

      const handleBlur = () => {
        if (value > 0) {
          setDisplayValue(formatWon(value));
        }
      };

      return (
        <div className="relative">
          <div className="flex items-center gap-1.5 mb-1.5">
            <label className="text-sm font-medium text-gray-700">{label}</label>
            {tooltip && (
              <span className="tooltip-trigger relative cursor-help">
                <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span className="tooltip-content hidden absolute z-20 left-6 -top-2 w-60 p-3 bg-gray-900 text-white text-xs rounded-lg shadow-lg leading-relaxed">
                  {tooltip}
                </span>
              </span>
            )}
          </div>
          <div className="relative">
            <input
              type="text"
              inputMode="numeric"
              value={displayValue}
              onChange={handleChange}
              onBlur={handleBlur}
              placeholder={placeholder}
              disabled={disabled}
              className="w-full px-4 py-3 pr-10 border border-gray-200 rounded-xl text-right text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition disabled:bg-gray-50 disabled:text-gray-400 placeholder:text-gray-300"
            />
            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-gray-400 pointer-events-none">
              원
            </span>
          </div>
          {value > 0 && (
            <p className="text-xs text-gray-400 mt-1 text-right">{formatWonUnit(value)}원</p>
          )}
        </div>
      );
    }

    function Counter({ label, value, onChange, min = 0, max = 20, tooltip }) {
      return (
        <div>
          <div className="flex items-center gap-1.5 mb-1.5">
            <label className="text-sm font-medium text-gray-700">{label}</label>
            {tooltip && (
              <span className="tooltip-trigger relative cursor-help">
                <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span className="tooltip-content hidden absolute z-20 left-6 -top-2 w-60 p-3 bg-gray-900 text-white text-xs rounded-lg shadow-lg leading-relaxed">
                  {tooltip}
                </span>
              </span>
            )}
          </div>
          <div className="flex items-center gap-3">
            <button
              onClick={() => onChange(Math.max(min, value - 1))}
              disabled={value <= min}
              className="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition font-bold text-lg"
            >
              -
            </button>
            <span className="w-12 text-center text-lg font-bold text-gray-900">{value}</span>
            <button
              onClick={() => onChange(Math.min(max, value + 1))}
              disabled={value >= max}
              className="w-10 h-10 flex items-center justify-center rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition font-bold text-lg"
            >
              +
            </button>
            <span className="text-sm text-gray-500 ml-1">명 (1인당 150만원)</span>
          </div>
        </div>
      );
    }

    function SectionDivider({ label }) {
      return (
        <div className="flex items-center gap-3 py-1">
          <div className="h-px flex-1 bg-gray-200"></div>
          <span className="text-xs font-semibold text-brand-600 uppercase tracking-wider">{label}</span>
          <div className="h-px flex-1 bg-gray-200"></div>
        </div>
      );
    }

    // ========================================
    // Bracket Visualization Component
    // ========================================

    function BracketChart({ bracketDetails, taxableIncome }) {
      if (!bracketDetails.length) return null;

      const maxAmount = Math.max(...bracketDetails.map(b => b.amount));

      return (
        <div className="space-y-2">
          {bracketDetails.map((b, i) => {
            const widthPct = maxAmount > 0 ? (b.amount / taxableIncome) * 100 : 0;
            return (
              <div key={i} className="group">
                <div className="flex items-center justify-between text-xs mb-1">
                  <span className="text-gray-600 font-medium">{b.label} ({(b.rate * 100).toFixed(0)}%)</span>
                  <span className="text-gray-500">{formatWon(b.tax)}원</span>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-6 overflow-hidden relative">
                  <div
                    className="bracket-bar h-full rounded-full flex items-center justify-end pr-2 text-xs text-white font-medium"
                    style={{
                      width: `${Math.max(widthPct, 3)}%`,
                      backgroundColor: b.color,
                    }}
                  >
                    {widthPct > 15 && <span>{formatWon(b.amount)}원</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ========================================
    // Pie-style Breakdown Component
    // ========================================

    function TaxBreakdownVisual({ totalIncome, expenses, incomeDeductions, calculatedTax, taxCredits, localTax }) {
      const items = [
        { label: '필요경비', value: expenses, color: '#94a3b8' },
        { label: '소득공제', value: incomeDeductions, color: '#a5b4fc' },
        { label: '세액공제', value: taxCredits, color: '#818cf8' },
        { label: '결정세액', value: Math.max(0, calculatedTax - taxCredits), color: '#4f46e5' },
        { label: '지방소득세', value: localTax, color: '#312e81' },
      ];

      const netIncome = totalIncome - expenses - incomeDeductions - Math.max(0, calculatedTax - taxCredits) - taxCredits - localTax;
      items.push({ label: '실수령(추정)', value: Math.max(0, netIncome), color: '#10b981' });

      const total = items.reduce((s, i) => s + Math.max(0, i.value), 0);
      if (total <= 0) return null;

      return (
        <div className="space-y-2">
          <div className="w-full h-8 rounded-full overflow-hidden flex">
            {items.map((item, i) => {
              const pct = total > 0 ? (Math.max(0, item.value) / total) * 100 : 0;
              if (pct < 0.5) return null;
              return (
                <div
                  key={i}
                  className="h-full transition-all duration-500"
                  style={{ width: `${pct}%`, backgroundColor: item.color }}
                  title={`${item.label}: ${formatWon(item.value)}원 (${pct.toFixed(1)}%)`}
                />
              );
            })}
          </div>
          <div className="flex flex-wrap gap-x-4 gap-y-1">
            {items.map((item, i) => {
              const pct = total > 0 ? (Math.max(0, item.value) / total) * 100 : 0;
              if (pct < 0.5) return null;
              return (
                <div key={i} className="flex items-center gap-1.5 text-xs">
                  <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: item.color }}></span>
                  <span className="text-gray-600">{item.label} {pct.toFixed(1)}%</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ========================================
    // Calculation Result Row
    // ========================================

    function CalcRow({ label, value, type = 'normal', prefix = '', highlight = false }) {
      const typeStyles = {
        normal: 'text-gray-700',
        subtract: 'text-red-500',
        result: 'text-brand-700 font-bold',
        add: 'text-blue-600',
        final: 'text-brand-800 font-extrabold text-lg',
      };

      return (
        <div className={`flex items-center justify-between py-2.5 ${highlight ? 'bg-brand-50 -mx-4 px-4 rounded-lg' : ''}`}>
          <span className={`text-sm ${type === 'final' ? 'font-bold text-base' : 'font-medium'} ${typeStyles[type]}`}>
            {prefix && <span className="text-gray-400 mr-1">{prefix}</span>}
            {label}
          </span>
          <span className={`text-sm tabular-nums ${typeStyles[type]}`}>
            {type === 'subtract' && value > 0 ? '-' : ''}{type === 'add' && value > 0 ? '+' : ''}{formatWon(Math.abs(value))}원
          </span>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function IncomeSourceRow({ source, index, onUpdate, onRemove }) {
      const [displayAmount, setDisplayAmount] = useState(source.amount > 0 ? formatWon(source.amount) : '');

      useEffect(() => {
        if (source.amount === 0) setDisplayAmount('');
      }, [source.amount]);

      const handleAmountChange = (e) => {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        if (raw === '') {
          setDisplayAmount('');
          onUpdate(index, { ...source, amount: 0 });
        } else {
          const num = parseInt(raw, 10);
          setDisplayAmount(formatWon(num));
          onUpdate(index, { ...source, amount: num });
        }
      };

      return (
        <div className="flex items-start gap-2 group">
          <div className="flex-1 min-w-0">
            <input
              type="text"
              value={source.name}
              onChange={(e) => onUpdate(index, { ...source, name: e.target.value })}
              placeholder="수입처명 (예: 회사명, 프리랜서)"
              className="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition placeholder:text-gray-300"
            />
          </div>
          <div className="w-40 flex-shrink-0 relative">
            <input
              type="text"
              inputMode="numeric"
              value={displayAmount}
              onChange={handleAmountChange}
              placeholder="금액"
              className="w-full px-3 py-2.5 pr-8 border border-gray-200 rounded-xl text-sm text-right text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition placeholder:text-gray-300"
            />
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 pointer-events-none">원</span>
          </div>
          <button
            onClick={() => onRemove(index)}
            className="mt-1 w-8 h-8 flex items-center justify-center rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition flex-shrink-0"
            title="삭제"
          >
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      );
    }

    function App() {
      // Input state
      const [incomeSources, setIncomeSources] = useState([{ name: '', amount: 0 }]);
      const [expenses, setExpenses] = useState(0);
      const [basicDeductionCount, setBasicDeductionCount] = useState(1);
      const [pensionDeduction, setPensionDeduction] = useState(0);
      const [healthInsurance, setHealthInsurance] = useState(0);
      const [otherDeductions, setOtherDeductions] = useState(0);
      const [childTaxCredit, setChildTaxCredit] = useState(0);
      const [otherTaxCredits, setOtherTaxCredits] = useState(0);

      // Total income from sources
      const totalIncome = useMemo(() => {
        return incomeSources.reduce((sum, s) => sum + s.amount, 0);
      }, [incomeSources]);

      const updateSource = (index, updated) => {
        setIncomeSources(prev => prev.map((s, i) => i === index ? updated : s));
      };

      const removeSource = (index) => {
        setIncomeSources(prev => prev.length <= 1 ? [{ name: '', amount: 0 }] : prev.filter((_, i) => i !== index));
      };

      const addSource = () => {
        setIncomeSources(prev => [...prev, { name: '', amount: 0 }]);
      };

      // Derived calculations
      const result = useMemo(() => {
        const basicDeduction = basicDeductionCount * 1500000;
        const totalIncomeDeductions = basicDeduction + pensionDeduction + healthInsurance + otherDeductions;

        const incomeAmount = Math.max(0, totalIncome - expenses);
        const taxableIncome = Math.max(0, incomeAmount - totalIncomeDeductions);

        const { totalTax, bracketDetails } = calculateTax(taxableIncome);

        const totalTaxCredits = childTaxCredit + otherTaxCredits;
        const determinedTax = Math.max(0, totalTax - totalTaxCredits);
        const localTax = Math.round(determinedTax * 0.1);
        const totalPayable = determinedTax + localTax;
        const effectiveRate = totalIncome > 0 ? (totalPayable / totalIncome) * 100 : 0;

        return {
          incomeAmount,
          basicDeduction,
          totalIncomeDeductions,
          taxableIncome,
          calculatedTax: totalTax,
          bracketDetails,
          totalTaxCredits,
          determinedTax,
          localTax,
          totalPayable,
          effectiveRate,
        };
      }, [totalIncome, expenses, basicDeductionCount, pensionDeduction, healthInsurance, otherDeductions, childTaxCredit, otherTaxCredits]);

      const handleReset = () => {
        setIncomeSources([{ name: '', amount: 0 }]);
        setExpenses(0);
        setBasicDeductionCount(1);
        setPensionDeduction(0);
        setHealthInsurance(0);
        setOtherDeductions(0);
        setChildTaxCredit(0);
        setOtherTaxCredits(0);
      };

      const handleExample = () => {
        setIncomeSources([
          { name: '(주)테크컴퍼니', amount: 60000000 },
          { name: '프리랜서 외주', amount: 15000000 },
          { name: '블로그 광고 수익', amount: 5000000 },
        ]);
        setExpenses(10000000);
        setBasicDeductionCount(3);
        setPensionDeduction(4500000);
        setHealthInsurance(3200000);
        setOtherDeductions(2000000);
        setChildTaxCredit(300000);
        setOtherTaxCredits(500000);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-brand-50 via-white to-indigo-50">
          {/* Header */}
          <header className="bg-white/80 backdrop-blur-sm border-b border-gray-100 sticky top-0 z-30">
            <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center">
                  <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-lg font-bold text-gray-900">종합소득세 계산기</h1>
                  <p className="text-xs text-gray-500">2024년 귀속 소득세 기준</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={handleExample}
                  className="px-3 py-2 text-xs font-medium text-brand-600 bg-brand-50 rounded-lg hover:bg-brand-100 transition"
                >
                  예시 입력
                </button>
                <button
                  onClick={handleReset}
                  className="px-3 py-2 text-xs font-medium text-gray-500 bg-gray-100 rounded-lg hover:bg-gray-200 transition"
                >
                  초기화
                </button>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-5xl mx-auto px-4 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">

              {/* Left Column: Inputs */}
              <div className="lg:col-span-5 space-y-5">
                {/* Income Sources */}
                <Card title="수입처" subtitle="소득이 발생한 곳을 입력하세요.">
                  <div className="space-y-3 mt-2">
                    {incomeSources.map((source, i) => (
                      <IncomeSourceRow
                        key={i}
                        source={source}
                        index={i}
                        onUpdate={updateSource}
                        onRemove={removeSource}
                      />
                    ))}
                    <button
                      onClick={addSource}
                      className="w-full py-2.5 border-2 border-dashed border-gray-200 rounded-xl text-sm font-medium text-gray-400 hover:text-brand-600 hover:border-brand-300 hover:bg-brand-50 transition flex items-center justify-center gap-1.5"
                    >
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                      </svg>
                      수입처 추가
                    </button>
                    <div className="bg-brand-50 rounded-xl p-3 flex justify-between items-center">
                      <span className="text-sm font-medium text-brand-700">총 수입금액</span>
                      <span className="text-sm font-bold text-brand-800 tabular-nums">{formatWon(totalIncome)}원</span>
                    </div>
                    {totalIncome > 0 && (
                      <p className="text-xs text-gray-400 text-right">{formatWonUnit(totalIncome)}원</p>
                    )}
                  </div>
                </Card>

                {/* Expenses */}
                <Card title="필요경비">
                  <div className="space-y-4 mt-2">
                    <WonInput
                      label="필요경비"
                      value={expenses}
                      onChange={setExpenses}
                      tooltip="수입을 얻기 위해 지출한 비용입니다. 사업자의 경우 매입비, 임차료, 인건비 등이 포함됩니다."
                    />
                    <div className="bg-brand-50 rounded-xl p-3 flex justify-between items-center">
                      <span className="text-sm font-medium text-brand-700">소득금액</span>
                      <span className="text-sm font-bold text-brand-800 tabular-nums">{formatWon(result.incomeAmount)}원</span>
                    </div>
                  </div>
                </Card>

                {/* Income Deductions */}
                <Card title="소득공제" subtitle="과세표준을 줄여주는 공제항목입니다.">
                  <div className="space-y-4 mt-2">
                    <Counter
                      label="기본공제 인원"
                      value={basicDeductionCount}
                      onChange={setBasicDeductionCount}
                      tooltip="본인, 배우자, 부양가족 수를 합산합니다. 1인당 150만원이 공제됩니다."
                    />
                    <div className="pl-4 border-l-2 border-brand-200">
                      <p className="text-xs text-gray-500 mb-1">기본공제 합계</p>
                      <p className="text-sm font-bold text-brand-700">{formatWon(result.basicDeduction)}원</p>
                    </div>

                    <WonInput
                      label="국민연금 공제"
                      value={pensionDeduction}
                      onChange={setPensionDeduction}
                      tooltip="1년간 납부한 국민연금 보험료 전액이 공제됩니다."
                    />
                    <WonInput
                      label="건강보험료 공제"
                      value={healthInsurance}
                      onChange={setHealthInsurance}
                      tooltip="건강보험료 및 장기요양보험료 납부액이 공제됩니다."
                    />
                    <WonInput
                      label="기타 소득공제"
                      value={otherDeductions}
                      onChange={setOtherDeductions}
                      tooltip="주택자금공제, 신용카드공제, 개인연금저축공제 등 기타 소득공제 합계를 입력하세요."
                    />

                    <div className="bg-brand-50 rounded-xl p-3 flex justify-between items-center">
                      <span className="text-sm font-medium text-brand-700">소득공제 합계</span>
                      <span className="text-sm font-bold text-brand-800 tabular-nums">{formatWon(result.totalIncomeDeductions)}원</span>
                    </div>
                  </div>
                </Card>

                {/* Tax Credits */}
                <Card title="세액공제" subtitle="산출세액에서 직접 차감되는 공제입니다.">
                  <div className="space-y-4 mt-2">
                    <WonInput
                      label="자녀 세액공제"
                      value={childTaxCredit}
                      onChange={setChildTaxCredit}
                      tooltip="기본공제대상 자녀가 있는 경우 적용됩니다. 1명 15만원, 2명 30만원, 3명 이상 30만원 + 추가 1명당 30만원입니다."
                    />
                    <WonInput
                      label="기타 세액공제"
                      value={otherTaxCredits}
                      onChange={setOtherTaxCredits}
                      tooltip="근로소득세액공제, 의료비/교육비/기부금 세액공제, 월세 세액공제 등의 합계를 입력하세요."
                    />
                    <div className="bg-brand-50 rounded-xl p-3 flex justify-between items-center">
                      <span className="text-sm font-medium text-brand-700">세액공제 합계</span>
                      <span className="text-sm font-bold text-brand-800 tabular-nums">{formatWon(result.totalTaxCredits)}원</span>
                    </div>
                  </div>
                </Card>
              </div>

              {/* Right Column: Results */}
              <div className="lg:col-span-7 space-y-5">
                {/* Summary Card */}
                <div className="bg-gradient-to-br from-brand-600 to-brand-800 rounded-2xl p-6 text-white shadow-lg">
                  <p className="text-sm text-brand-200 font-medium mb-1">총 납부세액</p>
                  <p className="text-4xl font-extrabold tracking-tight tabular-nums">
                    {formatWon(result.totalPayable)}<span className="text-xl ml-1">원</span>
                  </p>
                  <div className="flex items-center gap-6 mt-4">
                    <div>
                      <p className="text-xs text-brand-300">실효세율</p>
                      <p className="text-lg font-bold">{result.effectiveRate.toFixed(2)}%</p>
                    </div>
                    <div>
                      <p className="text-xs text-brand-300">결정세액</p>
                      <p className="text-lg font-bold tabular-nums">{formatWon(result.determinedTax)}원</p>
                    </div>
                    <div>
                      <p className="text-xs text-brand-300">지방소득세</p>
                      <p className="text-lg font-bold tabular-nums">{formatWon(result.localTax)}원</p>
                    </div>
                  </div>
                </div>

                {/* Income Distribution Bar */}
                {totalIncome > 0 && (
                  <Card title="소득 구성 비율">
                    <div className="mt-2">
                      <TaxBreakdownVisual
                        totalIncome={totalIncome}
                        expenses={expenses}
                        incomeDeductions={result.totalIncomeDeductions}
                        calculatedTax={result.calculatedTax}
                        taxCredits={result.totalTaxCredits}
                        localTax={result.localTax}
                      />
                    </div>
                  </Card>
                )}

                {/* Step-by-step Breakdown */}
                <Card title="세금 계산 과정">
                  <div className="divide-y divide-gray-100 mt-2">
                    <CalcRow label="총 수입금액" value={totalIncome} />
                    <CalcRow label="필요경비" value={expenses} type="subtract" prefix="(-)" />
                    <CalcRow label="소득금액" value={result.incomeAmount} type="result" highlight />
                    <CalcRow label="소득공제 합계" value={result.totalIncomeDeductions} type="subtract" prefix="(-)" />
                    <CalcRow label="과세표준" value={result.taxableIncome} type="result" highlight />
                    <CalcRow label="산출세액" value={result.calculatedTax} type="normal" />
                    <CalcRow label="세액공제" value={result.totalTaxCredits} type="subtract" prefix="(-)" />
                    <CalcRow label="결정세액" value={result.determinedTax} type="result" highlight />
                    <CalcRow label="지방소득세 (10%)" value={result.localTax} type="add" prefix="(+)" />
                    <div className="pt-3 mt-1 border-t-2 border-brand-200">
                      <CalcRow label="총 납부세액" value={result.totalPayable} type="final" highlight />
                    </div>
                  </div>
                </Card>

                {/* Bracket Breakdown */}
                {result.bracketDetails.length > 0 && (
                  <Card title="과세표준 구간별 세액" subtitle={`과세표준: ${formatWon(result.taxableIncome)}원`}>
                    <div className="mt-3">
                      <BracketChart bracketDetails={result.bracketDetails} taxableIncome={result.taxableIncome} />
                      <div className="mt-4 bg-gray-50 rounded-xl overflow-hidden">
                        <table className="w-full text-sm">
                          <thead>
                            <tr className="text-xs text-gray-500 border-b border-gray-200">
                              <th className="text-left py-2.5 px-3 font-medium">구간</th>
                              <th className="text-right py-2.5 px-3 font-medium">세율</th>
                              <th className="text-right py-2.5 px-3 font-medium">과세금액</th>
                              <th className="text-right py-2.5 px-3 font-medium">세액</th>
                            </tr>
                          </thead>
                          <tbody>
                            {result.bracketDetails.map((b, i) => (
                              <tr key={i} className="border-b border-gray-100 last:border-0">
                                <td className="py-2.5 px-3">
                                  <div className="flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: b.color }}></span>
                                    <span className="text-gray-700 text-xs">{b.label}</span>
                                  </div>
                                </td>
                                <td className="text-right py-2.5 px-3 text-gray-600 tabular-nums">{(b.rate * 100).toFixed(0)}%</td>
                                <td className="text-right py-2.5 px-3 text-gray-700 font-medium tabular-nums">{formatWon(b.amount)}원</td>
                                <td className="text-right py-2.5 px-3 text-brand-700 font-bold tabular-nums">{formatWon(b.tax)}원</td>
                              </tr>
                            ))}
                          </tbody>
                          <tfoot>
                            <tr className="bg-brand-50">
                              <td colSpan="3" className="py-2.5 px-3 text-sm font-bold text-brand-700">산출세액 합계</td>
                              <td className="text-right py-2.5 px-3 text-sm font-bold text-brand-800 tabular-nums">{formatWon(result.calculatedTax)}원</td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    </div>
                  </Card>
                )}

                {/* Tax Bracket Reference */}
                <Card title="2024년 종합소득세율표" subtitle="과세표준 구간별 세율 안내">
                  <div className="mt-3 overflow-hidden rounded-xl border border-gray-200">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="bg-gray-50 text-xs text-gray-500">
                          <th className="text-left py-2.5 px-3 font-medium">과세표준</th>
                          <th className="text-center py-2.5 px-3 font-medium">세율</th>
                          <th className="text-right py-2.5 px-3 font-medium">누진공제</th>
                        </tr>
                      </thead>
                      <tbody className="text-xs">
                        {[
                          ['1,400만원 이하', '6%', '-'],
                          ['1,400만~5,000만원', '15%', '126만원'],
                          ['5,000만~8,800만원', '24%', '576만원'],
                          ['8,800만~1.5억원', '35%', '1,544만원'],
                          ['1.5억~3억원', '38%', '1,994만원'],
                          ['3억~5억원', '40%', '2,594만원'],
                          ['5억~10억원', '42%', '3,594만원'],
                          ['10억원 초과', '45%', '6,594만원'],
                        ].map(([bracket, rate, deduction], i) => (
                          <tr key={i} className="border-t border-gray-100">
                            <td className="py-2 px-3 text-gray-700">{bracket}</td>
                            <td className="text-center py-2 px-3 font-bold text-brand-600">{rate}</td>
                            <td className="text-right py-2 px-3 text-gray-500">{deduction}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </Card>
              </div>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-gray-100 mt-12">
            <div className="max-w-5xl mx-auto px-4 py-6 text-center">
              <p className="text-xs text-gray-400">
                본 계산기는 2024년 귀속 종합소득세 기준으로 참고용이며, 실제 세액은 세무사 상담을 권장합니다.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
