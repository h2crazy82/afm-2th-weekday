<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }

    .meme-text {
      font-family: Impact, 'Arial Black', sans-serif;
      color: white;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
      word-wrap: break-word;
      -webkit-text-stroke: 2px black;
      paint-order: stroke fill;
      text-shadow:
        3px 3px 0 #000,
        -3px -3px 0 #000,
        3px -3px 0 #000,
        -3px 3px 0 #000,
        0 3px 0 #000,
        0 -3px 0 #000,
        3px 0 0 #000,
        -3px 0 0 #000;
      pointer-events: none;
      user-select: none;
    }

    .upload-zone {
      border: 3px dashed #cbd5e1;
      transition: all 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6366f1;
      background-color: #eef2ff;
    }

    @keyframes bounce-in {
      0% { transform: scale(0.9); opacity: 0; }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-bounce-in {
      animation: bounce-in 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useRef, useCallback, useEffect } = React;

    // ========================================
    // Design System Components
    // ========================================

    function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '' }) {
      const base = 'font-bold rounded-xl transition-all duration-200 inline-flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200 hover:shadow-indigo-300',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border-2 border-gray-200 hover:border-gray-300',
        danger: 'bg-red-500 hover:bg-red-600 text-white shadow-lg shadow-red-200',
        success: 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-200',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-7 py-3.5 text-lg',
      };
      return (
        <button onClick={onClick} disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, maxLength, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-bold text-gray-600 mb-1.5">{label}</label>}
          <input
            type="text"
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            maxLength={maxLength}
            className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-gray-800"
          />
        </div>
      );
    }

    function Slider({ label, value, onChange, min, max, step = 1, unit = '', className = '' }) {
      return (
        <div className={className}>
          {label && (
            <label className="block text-sm font-bold text-gray-600 mb-1.5">
              {label}: <span className="text-indigo-600">{value}{unit}</span>
            </label>
          )}
          <input
            type="range"
            min={min} max={max} step={step}
            value={value}
            onChange={onChange}
            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
          />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // Page Components
    // ========================================

    function MemeGenerator() {
      const [image, setImage] = useState(null);
      const [imageSrc, setImageSrc] = useState(null);
      const [topText, setTopText] = useState('');
      const [bottomText, setBottomText] = useState('');
      const [fontSize, setFontSize] = useState(48);
      const [isDragging, setIsDragging] = useState(false);
      const [isDownloading, setIsDownloading] = useState(false);

      const fileInputRef = useRef(null);
      const previewRef = useRef(null);
      const canvasRef = useRef(null);

      const handleFileSelect = useCallback((file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            setImage(img);
            setImageSrc(e.target.result);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }, []);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setIsDragging(false);
        const file = e.dataTransfer.files[0];
        handleFileSelect(file);
      }, [handleFileSelect]);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        setIsDragging(true);
      }, []);

      const handleDragLeave = useCallback(() => {
        setIsDragging(false);
      }, []);

      const drawMemeToCanvas = useCallback(() => {
        if (!image) return null;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;

        ctx.drawImage(image, 0, 0);

        const scale = canvas.width / 600;
        const actualFontSize = fontSize * scale;

        ctx.font = `900 ${actualFontSize}px Impact, "Arial Black", sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'white';
        ctx.strokeStyle = 'black';
        ctx.lineWidth = actualFontSize / 12;
        ctx.lineJoin = 'round';
        ctx.miterLimit = 2;

        const maxWidth = canvas.width * 0.9;
        const x = canvas.width / 2;

        const wrapText = (text, yStart, direction) => {
          if (!text) return;
          const words = text.toUpperCase().split(' ');
          const lines = [];
          let currentLine = words[0] || '';

          for (let i = 1; i < words.length; i++) {
            const testLine = currentLine + ' ' + words[i];
            const metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth) {
              lines.push(currentLine);
              currentLine = words[i];
            } else {
              currentLine = testLine;
            }
          }
          lines.push(currentLine);

          const lineHeight = actualFontSize * 1.15;

          lines.forEach((line, idx) => {
            const y = direction === 'down'
              ? yStart + idx * lineHeight
              : yStart - (lines.length - 1 - idx) * lineHeight;
            ctx.strokeText(line, x, y);
            ctx.fillText(line, x, y);
          });
        };

        wrapText(topText, actualFontSize * 1.1, 'down');
        wrapText(bottomText, canvas.height - actualFontSize * 0.3, 'up');

        return canvas;
      }, [image, topText, bottomText, fontSize]);

      const handleDownload = useCallback(() => {
        if (!image) return;
        setIsDownloading(true);
        setTimeout(() => {
          const canvas = drawMemeToCanvas();
          if (canvas) {
            const link = document.createElement('a');
            link.download = `meme_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          }
          setIsDownloading(false);
        }, 100);
      }, [image, drawMemeToCanvas]);

      const handleReset = useCallback(() => {
        setImage(null);
        setImageSrc(null);
        setTopText('');
        setBottomText('');
        setFontSize(48);
      }, []);

      const previewFontSize = `${fontSize}px`;

      return (
        <div className="min-h-screen py-6 px-4">
          <div className="max-w-4xl mx-auto">
            {/* Header */}
            <div className="text-center mb-8">
              <h1 className="text-4xl md:text-5xl font-black text-gray-800 mb-2">
                <span className="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
                  짤 생성기
                </span>
              </h1>
              <p className="text-gray-500 text-lg">이미지를 업로드하고 재미있는 텍스트를 넣어보세요</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
              {/* Preview Area - Left */}
              <div className="lg:col-span-3">
                <Card className="overflow-hidden">
                  {!imageSrc ? (
                    <div
                      className={`upload-zone rounded-2xl p-12 flex flex-col items-center justify-center min-h-[400px] cursor-pointer ${isDragging ? 'drag-over' : ''}`}
                      onClick={() => fileInputRef.current?.click()}
                      onDrop={handleDrop}
                      onDragOver={handleDragOver}
                      onDragLeave={handleDragLeave}
                      role="button"
                      aria-label="이미지 업로드"
                      tabIndex={0}
                      onKeyDown={(e) => e.key === 'Enter' && fileInputRef.current?.click()}
                    >
                      <div className="text-6xl mb-4">
                        <svg className="w-20 h-20 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                      </div>
                      <p className="text-xl font-bold text-gray-400 mb-2">여기를 클릭하거나 이미지를 드래그하세요</p>
                      <p className="text-sm text-gray-400">PNG, JPG, GIF, WebP 지원</p>
                    </div>
                  ) : (
                    <div className="animate-bounce-in">
                      <div
                        ref={previewRef}
                        className="relative inline-block w-full"
                        style={{ lineHeight: 0 }}
                      >
                        <img
                          src={imageSrc}
                          alt="업로드된 이미지"
                          className="w-full h-auto block"
                          style={{ maxHeight: '70vh' }}
                        />
                        {/* Top Text Overlay */}
                        {topText && (
                          <div
                            className="meme-text absolute left-1/2 w-[90%]"
                            style={{
                              top: '4%',
                              transform: 'translateX(-50%)',
                              fontSize: previewFontSize,
                            }}
                          >
                            {topText.toUpperCase()}
                          </div>
                        )}
                        {/* Bottom Text Overlay */}
                        {bottomText && (
                          <div
                            className="meme-text absolute left-1/2 w-[90%]"
                            style={{
                              bottom: '4%',
                              transform: 'translateX(-50%)',
                              fontSize: previewFontSize,
                            }}
                          >
                            {bottomText.toUpperCase()}
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </Card>
              </div>

              {/* Controls - Right */}
              <div className="lg:col-span-2 space-y-4">
                {/* Upload Button */}
                <Card className="p-5">
                  <h2 className="font-bold text-gray-700 mb-3 flex items-center gap-2">
                    <svg className="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    이미지 업로드
                  </h2>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={(e) => handleFileSelect(e.target.files[0])}
                  />
                  <Button
                    variant={imageSrc ? 'secondary' : 'primary'}
                    className="w-full"
                    onClick={() => fileInputRef.current?.click()}
                  >
                    {imageSrc ? '다른 이미지 선택' : '이미지 선택하기'}
                  </Button>
                </Card>

                {/* Text Controls */}
                <Card className="p-5">
                  <h2 className="font-bold text-gray-700 mb-3 flex items-center gap-2">
                    <svg className="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    텍스트 입력
                  </h2>
                  <div className="space-y-3">
                    <Input
                      label="상단 텍스트"
                      value={topText}
                      onChange={(e) => setTopText(e.target.value)}
                      placeholder="위에 들어갈 텍스트"
                      maxLength={100}
                    />
                    <Input
                      label="하단 텍스트"
                      value={bottomText}
                      onChange={(e) => setBottomText(e.target.value)}
                      placeholder="아래에 들어갈 텍스트"
                      maxLength={100}
                    />
                    <Slider
                      label="글자 크기"
                      value={fontSize}
                      onChange={(e) => setFontSize(Number(e.target.value))}
                      min={16}
                      max={96}
                      step={2}
                      unit="px"
                    />
                  </div>
                </Card>

                {/* Action Buttons */}
                <Card className="p-5">
                  <h2 className="font-bold text-gray-700 mb-3 flex items-center gap-2">
                    <svg className="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    저장하기
                  </h2>
                  <div className="space-y-2">
                    <Button
                      variant="success"
                      className="w-full"
                      onClick={handleDownload}
                      disabled={!imageSrc || isDownloading}
                    >
                      {isDownloading ? (
                        <>
                          <svg className="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                          </svg>
                          다운로드 중...
                        </>
                      ) : (
                        <>
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                          </svg>
                          PNG로 다운로드
                        </>
                      )}
                    </Button>
                    {imageSrc && (
                      <Button
                        variant="danger"
                        className="w-full"
                        onClick={handleReset}
                      >
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        초기화
                      </Button>
                    )}
                  </div>
                  {!imageSrc && (
                    <p className="text-xs text-gray-400 mt-3 text-center">
                      이미지를 먼저 업로드해 주세요
                    </p>
                  )}
                </Card>
              </div>
            </div>

            {/* Footer */}
            <div className="text-center mt-8 text-sm text-gray-400">
              짤 생성기 &mdash; 이미지에 텍스트를 넣어 나만의 짤을 만들어 보세요
            </div>
          </div>

          {/* Hidden Canvas for export */}
          <canvas ref={canvasRef} className="hidden" />
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      return <MemeGenerator />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
