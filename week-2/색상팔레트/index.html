<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEX 색상 팔레트 생성기</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans KR"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    code, .font-mono { font-family: 'JetBrains Mono', monospace; }
    .toast-enter { animation: toastIn 0.3s ease-out; }
    .toast-exit { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    .swatch-hover { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .swatch-hover:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(0,0,0,0.15); z-index: 10; }
    input[type="color"] { -webkit-appearance: none; border: none; cursor: pointer; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 2px solid #e5e7eb; border-radius: 8px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ========================================
    // 2. Design System Components
    // ========================================
    const Button = ({ children, onClick, variant = "primary", size = "md", className = "", ...props }) => {
      const base = "inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 active:scale-95 cursor-pointer";
      const variants = {
        primary: "bg-gray-900 text-white hover:bg-gray-800 shadow-sm",
        secondary: "bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 hover:border-gray-300 shadow-sm",
        ghost: "text-gray-600 hover:bg-gray-100 hover:text-gray-900",
        accent: "bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-xs gap-1.5",
        md: "px-4 py-2 text-sm gap-2",
        lg: "px-6 py-3 text-base gap-2",
      };
      return (
        <button onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    };

    const Input = ({ label, className = "", ...props }) => (
      <div className={className}>
        {label && <label className="block text-xs font-medium text-gray-500 mb-1.5">{label}</label>}
        <input
          className="w-full px-3 py-2 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400 transition-all"
          {...props}
        />
      </div>
    );

    const Card = ({ children, className = "", ...props }) => (
      <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`} {...props}>
        {children}
      </div>
    );

    const SectionTitle = ({ children, sub }) => (
      <div className="mb-4">
        <h2 className="text-lg font-semibold text-gray-900">{children}</h2>
        {sub && <p className="text-sm text-gray-500 mt-0.5">{sub}</p>}
      </div>
    );

    const Toast = ({ message, visible, exiting }) => {
      if (!visible) return null;
      return (
        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 ${exiting ? 'toast-exit' : 'toast-enter'}`}>
          <div className="bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2">
            <svg className="w-4 h-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
            </svg>
            {message}
          </div>
        </div>
      );
    };

    const CopyIcon = () => (
      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
    );

    // ========================================
    // 3. Color Utility Functions
    // ========================================
    const hexToRgb = (hex) => {
      const clean = hex.replace("#", "");
      const full = clean.length === 3
        ? clean.split("").map((c) => c + c).join("")
        : clean;
      const num = parseInt(full, 16);
      return {
        r: (num >> 16) & 255,
        g: (num >> 8) & 255,
        b: num & 255,
      };
    };

    const rgbToHex = ({ r, g, b }) =>
      "#" + [r, g, b].map((v) => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, "0")).join("");

    const rgbToHsl = ({ r, g, b }) => {
      const rn = r / 255, gn = g / 255, bn = b / 255;
      const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn);
      const l = (max + min) / 2;
      if (max === min) return { h: 0, s: 0, l: Math.round(l * 100) };
      const d = max - min;
      const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      let h;
      if (max === rn) h = ((gn - bn) / d + (gn < bn ? 6 : 0)) / 6;
      else if (max === gn) h = ((bn - rn) / d + 2) / 6;
      else h = ((rn - gn) / d + 4) / 6;
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    };

    const getRelativeLuminance = ({ r, g, b }) => {
      const [rs, gs, bs] = [r, g, b].map((c) => {
        const s = c / 255;
        return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
    };

    const getContrastRatio = (rgb1, rgb2) => {
      const l1 = getRelativeLuminance(rgb1);
      const l2 = getRelativeLuminance(rgb2);
      const lighter = Math.max(l1, l2);
      const darker = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    };

    const getWcagGrade = (ratio) => {
      if (ratio >= 7) return { grade: "AAA", color: "text-green-600", bg: "bg-green-50" };
      if (ratio >= 4.5) return { grade: "AA", color: "text-emerald-600", bg: "bg-emerald-50" };
      if (ratio >= 3) return { grade: "AA+", color: "text-yellow-600", bg: "bg-yellow-50" };
      return { grade: "Fail", color: "text-red-500", bg: "bg-red-50" };
    };

    const lightenColor = (rgb, amount) => ({
      r: rgb.r + (255 - rgb.r) * amount,
      g: rgb.g + (255 - rgb.g) * amount,
      b: rgb.b + (255 - rgb.b) * amount,
    });

    const darkenColor = (rgb, amount) => ({
      r: rgb.r * (1 - amount),
      g: rgb.g * (1 - amount),
      b: rgb.b * (1 - amount),
    });

    const generateShades = (hex) => {
      const rgb = hexToRgb(hex);
      const steps = [0.5, 0.4, 0.3, 0.2, 0.1];
      const lighter = steps.map((s) => rgbToHex(lightenColor(rgb, s)));
      const darker = steps.reverse().map((s) => rgbToHex(darkenColor(rgb, s)));
      return [...lighter, hex.startsWith("#") ? hex : "#" + hex, ...darker];
    };

    const isValidHex = (hex) => /^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex);

    const normalizeHex = (hex) => {
      let clean = hex.replace("#", "");
      if (clean.length === 3) clean = clean.split("").map((c) => c + c).join("");
      return "#" + clean.toLowerCase();
    };

    const randomHex = () => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, "0");

    const hexToTailwind = (hex) => {
      const rgb = hexToRgb(hex);
      const hsl = rgbToHsl(rgb);
      const hueNames = [
        [0, "red"], [15, "orange"], [35, "amber"], [45, "yellow"],
        [65, "lime"], [120, "green"], [160, "emerald"], [175, "teal"],
        [190, "cyan"], [210, "sky"], [225, "blue"], [250, "indigo"],
        [270, "violet"], [290, "purple"], [310, "fuchsia"], [330, "pink"],
        [350, "rose"],
      ];
      if (hsl.s < 10) {
        const shade = Math.round(((100 - hsl.l) / 100) * 9) * 100 || 50;
        return `gray-${Math.min(950, Math.max(50, shade))}`;
      }
      let name = "red";
      for (let i = 0; i < hueNames.length; i++) {
        if (hsl.h >= hueNames[i][0]) name = hueNames[i][1];
      }
      const shade = Math.round(((100 - hsl.l) / 100) * 9) * 100 || 50;
      return `${name}-${Math.min(950, Math.max(50, shade))}`;
    };

    const presetColors = [
      { name: "인디고", hex: "#6366F1" },
      { name: "에메랄드", hex: "#10B981" },
      { name: "로즈", hex: "#F43F5E" },
      { name: "앰버", hex: "#F59E0B" },
      { name: "스카이", hex: "#0EA5E9" },
      { name: "바이올렛", hex: "#8B5CF6" },
      { name: "코랄", hex: "#FF6B6B" },
      { name: "틸", hex: "#14B8A6" },
      { name: "슬레이트", hex: "#64748B" },
      { name: "퓨시아", hex: "#D946EF" },
    ];

    // ========================================
    // 4. Page Components
    // ========================================
    const ColorInput = ({ hex, onHexChange }) => {
      const [text, setText] = useState(hex);
      const inputRef = useRef(null);

      useEffect(() => { setText(hex); }, [hex]);

      const handleTextChange = (e) => {
        let val = e.target.value;
        if (!val.startsWith("#")) val = "#" + val;
        setText(val);
        if (isValidHex(val)) onHexChange(normalizeHex(val));
      };

      const handlePickerChange = (e) => {
        const val = e.target.value;
        setText(val);
        onHexChange(val);
      };

      return (
        <Card className="p-6">
          <SectionTitle sub="HEX 코드를 입력하거나 컬러 피커를 사용하세요">색상 입력</SectionTitle>
          <div className="flex flex-wrap items-end gap-3">
            <div className="relative">
              <input
                type="color"
                value={isValidHex(text) ? normalizeHex(text) : "#000000"}
                onChange={handlePickerChange}
                className="w-14 h-14 rounded-xl cursor-pointer"
              />
            </div>
            <Input
              label="HEX 코드"
              value={text}
              onChange={handleTextChange}
              placeholder="#6366F1"
              className="w-40"
              maxLength={7}
              spellCheck={false}
              ref={inputRef}
              style={{ fontFamily: "'JetBrains Mono', monospace" }}
            />
            <Button onClick={() => onHexChange(randomHex())} variant="secondary" size="md">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
              랜덤 색상
            </Button>
            <div className="flex gap-1.5 flex-wrap">
              {presetColors.map((c) => (
                <button
                  key={c.hex}
                  onClick={() => onHexChange(c.hex.toLowerCase())}
                  className="w-8 h-8 rounded-lg border-2 border-white shadow-sm hover:scale-110 transition-transform cursor-pointer"
                  style={{ backgroundColor: c.hex }}
                  title={c.name}
                />
              ))}
            </div>
          </div>
        </Card>
      );
    };

    const PaletteStrip = ({ shades, activeIndex, onSelect, onCopy }) => (
      <Card className="p-6">
        <SectionTitle sub="밝은 색상 5단계 + 원본 + 어두운 색상 5단계">팔레트 스트립</SectionTitle>
        <div className="flex rounded-2xl overflow-hidden shadow-md h-28 mb-4">
          {shades.map((shade, i) => {
            const rgb = hexToRgb(shade);
            const lum = getRelativeLuminance(rgb);
            const textColor = lum > 0.4 ? "rgba(0,0,0,0.7)" : "rgba(255,255,255,0.85)";
            const isCenter = i === 5;
            const isActive = i === activeIndex;
            return (
              <div
                key={i}
                onClick={() => { onSelect(i); onCopy(shade); }}
                className={`flex-1 flex flex-col items-center justify-center cursor-pointer transition-all relative group
                  ${isCenter ? "flex-[1.5] ring-2 ring-white/50 ring-inset" : ""}
                  ${isActive ? "ring-4 ring-gray-900/30 ring-inset" : ""}`}
                style={{ backgroundColor: shade }}
              >
                <span className="font-mono text-[10px] font-medium opacity-0 group-hover:opacity-100 transition-opacity" style={{ color: textColor }}>
                  {shade.toUpperCase()}
                </span>
                {isCenter && (
                  <span className="text-[9px] font-semibold mt-1 px-1.5 py-0.5 rounded-full" style={{ color: textColor, backgroundColor: lum > 0.4 ? "rgba(0,0,0,0.08)" : "rgba(255,255,255,0.15)" }}>
                    원본
                  </span>
                )}
              </div>
            );
          })}
        </div>
        {/* Gradient bar */}
        <div className="rounded-xl overflow-hidden h-4 shadow-inner"
          style={{ background: `linear-gradient(to right, ${shades.join(", ")})` }} />
        <p className="text-xs text-gray-400 mt-2 text-center">색상을 클릭하면 HEX 코드가 복사됩니다</p>
      </Card>
    );

    const SwatchGrid = ({ shades, activeIndex, onSelect, onCopy }) => (
      <Card className="p-6">
        <SectionTitle sub="각 색상의 HEX, RGB 값 한눈에 보기">색상 스와치 그리드</SectionTitle>
        <div className="grid grid-cols-11 gap-2">
          {shades.map((shade, i) => {
            const rgb = hexToRgb(shade);
            const lum = getRelativeLuminance(rgb);
            const textColor = lum > 0.4 ? "#374151" : "#F9FAFB";
            const isActive = i === activeIndex;
            const label = i < 5 ? `+${(5 - i) * 10}%` : i === 5 ? "원본" : `-${(i - 5) * 10}%`;
            return (
              <div
                key={i}
                onClick={() => { onSelect(i); onCopy(shade); }}
                className={`swatch-hover rounded-xl cursor-pointer text-center relative ${isActive ? "ring-2 ring-offset-2 ring-gray-900" : ""}`}
              >
                <div className="aspect-square rounded-t-xl flex items-center justify-center" style={{ backgroundColor: shade }}>
                  <span className="text-[9px] font-medium" style={{ color: textColor }}>{label}</span>
                </div>
                <div className="py-1.5 text-[9px] font-mono text-gray-600 bg-gray-50 rounded-b-xl border border-t-0 border-gray-100">
                  {shade.toUpperCase()}
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    );

    const ColorInfoPanel = ({ hex }) => {
      const rgb = hexToRgb(hex);
      const hsl = rgbToHsl(rgb);
      const luminance = getRelativeLuminance(rgb);
      const contrastWhite = getContrastRatio(rgb, { r: 255, g: 255, b: 255 });
      const contrastBlack = getContrastRatio(rgb, { r: 0, g: 0, b: 0 });
      const wcagWhite = getWcagGrade(contrastWhite);
      const wcagBlack = getWcagGrade(contrastBlack);
      const twClass = hexToTailwind(hex);
      const cssVar = `--color-primary: ${hex};`;
      const [alpha, setAlpha] = useState(1);

      const textOnBg = luminance > 0.4 ? "#111827" : "#F9FAFB";

      const infos = [
        { label: "HEX", value: hex.toUpperCase(), mono: true },
        { label: "RGB", value: `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`, mono: true },
        { label: "HSL", value: `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`, mono: true },
        { label: "RGBA", value: `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha.toFixed(2)})`, mono: true },
        { label: "CSS 변수", value: cssVar, mono: true },
        { label: "Tailwind", value: `bg-${twClass}`, mono: true },
        { label: "명도 (Luminance)", value: luminance.toFixed(4) },
      ];

      return (
        <Card className="p-6">
          <SectionTitle sub="같은 정보, 다른 형태 (Same info, different forms)">색상 상세 정보</SectionTitle>
          <div className="flex gap-6 flex-col lg:flex-row">
            {/* Big swatch */}
            <div className="flex flex-col items-center gap-3 shrink-0">
              <div
                className="w-36 h-36 rounded-2xl shadow-lg border border-gray-100 flex items-center justify-center"
                style={{ backgroundColor: hex }}
              >
                <span className="font-mono font-semibold text-sm" style={{ color: textOnBg }}>{hex.toUpperCase()}</span>
              </div>
              {/* Alpha slider */}
              <div className="w-36">
                <label className="text-[10px] text-gray-500 font-medium">Alpha: {alpha.toFixed(2)}</label>
                <input
                  type="range" min="0" max="1" step="0.01" value={alpha}
                  onChange={(e) => setAlpha(parseFloat(e.target.value))}
                  className="w-full h-1.5 rounded-full appearance-none cursor-pointer"
                  style={{ accentColor: hex }}
                />
                <div className="w-full h-6 rounded-lg mt-1 border border-gray-100"
                  style={{
                    backgroundImage: `linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%)`,
                    backgroundSize: "8px 8px",
                    backgroundPosition: "0 0, 0 4px, 4px -4px, -4px 0px",
                  }}>
                  <div className="w-full h-full rounded-lg" style={{ backgroundColor: `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})` }} />
                </div>
              </div>
            </div>
            {/* Info grid */}
            <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-2">
              {infos.map(({ label, value, mono }) => (
                <div key={label} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2.5 group">
                  <div>
                    <div className="text-[10px] text-gray-400 font-medium">{label}</div>
                    <div className={`text-sm text-gray-800 ${mono ? "font-mono" : ""}`}>{value}</div>
                  </div>
                  <button
                    onClick={() => navigator.clipboard.writeText(value)}
                    className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-gray-700 transition-all p-1 cursor-pointer"
                    title="복사"
                  >
                    <CopyIcon />
                  </button>
                </div>
              ))}
            </div>
          </div>
          {/* Contrast info */}
          <div className="mt-5 grid grid-cols-2 gap-3">
            <div className="rounded-xl p-4 border border-gray-100" style={{ backgroundColor: "#FFFFFF" }}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-gray-500">흰색 배경 대비</span>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${wcagWhite.color} ${wcagWhite.bg}`}>{wcagWhite.grade}</span>
              </div>
              <div className="text-2xl font-bold font-mono" style={{ color: hex }}>{contrastWhite.toFixed(2)} : 1</div>
              <p className="text-sm mt-2" style={{ color: hex }}>가나다라마바사 Sample Text</p>
            </div>
            <div className="rounded-xl p-4 border border-gray-100" style={{ backgroundColor: "#111827" }}>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs text-gray-400">검정 배경 대비</span>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${wcagBlack.color} ${wcagBlack.bg}`}>{wcagBlack.grade}</span>
              </div>
              <div className="text-2xl font-bold font-mono" style={{ color: hex }}>{contrastBlack.toFixed(2)} : 1</div>
              <p className="text-sm mt-2" style={{ color: hex }}>가나다라마바사 Sample Text</p>
            </div>
          </div>
        </Card>
      );
    };

    const TextPreview = ({ shades }) => (
      <Card className="p-6">
        <SectionTitle sub="각 색상 위에 텍스트를 표시하여 가독성 확인">텍스트 가독성 미리보기</SectionTitle>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {shades.map((shade, i) => {
            const rgb = hexToRgb(shade);
            const lum = getRelativeLuminance(rgb);
            const onWhite = getContrastRatio(rgb, { r: 255, g: 255, b: 255 });
            const onBlack = getContrastRatio(rgb, { r: 0, g: 0, b: 0 });
            const textColor = lum > 0.4 ? "#111827" : "#F9FAFB";
            const label = i < 5 ? `밝게 +${(5 - i) * 10}%` : i === 5 ? "원본" : `어둡게 -${(i - 5) * 10}%`;
            return (
              <div key={i} className="rounded-xl p-4 border border-gray-100" style={{ backgroundColor: shade }}>
                <div className="flex justify-between items-start mb-2">
                  <span className="text-[10px] font-mono" style={{ color: textColor }}>{shade.toUpperCase()}</span>
                  <span className="text-[9px] px-1.5 py-0.5 rounded-full font-medium" style={{ color: textColor, backgroundColor: lum > 0.4 ? "rgba(0,0,0,0.06)" : "rgba(255,255,255,0.12)" }}>{label}</span>
                </div>
                <p className="text-sm font-medium mb-1" style={{ color: textColor }}>안녕하세요, 반갑습니다!</p>
                <p className="text-xs" style={{ color: textColor, opacity: 0.8 }}>Hello, this is sample text for readability check.</p>
              </div>
            );
          })}
        </div>
      </Card>
    );

    const CSSOutput = ({ hex, shades }) => {
      const cssVars = shades.map((s, i) => {
        const label = i < 5 ? `${(5 - i) * 100}` : i === 5 ? "500" : `${500 + (i - 5) * 100}`;
        return `  --color-${label}: ${s};`;
      }).join("\n");
      const full = `:root {\n${cssVars}\n}`;

      const tailwindConfig = `colors: {\n  custom: {\n${shades.map((s, i) => {
        const label = i < 5 ? `${(5 - i) * 100}` : i === 5 ? "500" : `${500 + (i - 5) * 100}`;
        return `    '${label}': '${s}',`;
      }).join("\n")}\n  }\n}`;

      const [copied, setCopied] = useState(null);
      const copy = (text, id) => {
        navigator.clipboard.writeText(text);
        setCopied(id);
        setTimeout(() => setCopied(null), 1500);
      };

      return (
        <Card className="p-6">
          <SectionTitle sub="바로 복사하여 사용 가능한 코드">CSS / Tailwind 코드 출력</SectionTitle>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-medium text-gray-500">CSS Custom Properties</span>
                <Button size="sm" variant="ghost" onClick={() => copy(full, "css")}>
                  <CopyIcon /> {copied === "css" ? "복사됨!" : "복사"}
                </Button>
              </div>
              <pre className="bg-gray-900 text-gray-100 rounded-xl p-4 text-xs font-mono overflow-x-auto leading-relaxed">{full}</pre>
            </div>
            <div>
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-medium text-gray-500">Tailwind Config</span>
                <Button size="sm" variant="ghost" onClick={() => copy(tailwindConfig, "tw")}>
                  <CopyIcon /> {copied === "tw" ? "복사됨!" : "복사"}
                </Button>
              </div>
              <pre className="bg-gray-900 text-gray-100 rounded-xl p-4 text-xs font-mono overflow-x-auto leading-relaxed">{tailwindConfig}</pre>
            </div>
          </div>
        </Card>
      );
    };

    // ========================================
    // 5. App Component
    // ========================================
    const App = () => {
      const [hex, setHex] = useState("#6366f1");
      const [activeIndex, setActiveIndex] = useState(5);
      const [toast, setToast] = useState({ visible: false, message: "", exiting: false });

      const shades = useMemo(() => generateShades(normalizeHex(hex)), [hex]);
      const activeHex = shades[activeIndex] || hex;

      const showToast = useCallback((message) => {
        setToast({ visible: true, message, exiting: false });
        setTimeout(() => setToast((t) => ({ ...t, exiting: true })), 1800);
        setTimeout(() => setToast({ visible: false, message: "", exiting: false }), 2100);
      }, []);

      const handleCopy = useCallback((color) => {
        navigator.clipboard.writeText(color.toUpperCase());
        showToast(`${color.toUpperCase()} 클립보드에 복사됨`);
      }, [showToast]);

      const handleHexChange = useCallback((newHex) => {
        setHex(newHex);
        setActiveIndex(5);
      }, []);

      return (
        <div className="max-w-6xl mx-auto px-4 py-8 pb-20">
          {/* Header */}
          <header className="mb-8 text-center">
            <h1 className="text-3xl font-bold text-gray-900 mb-1">
              <span className="inline-block w-8 h-8 rounded-lg mr-2 align-middle shadow-sm" style={{ backgroundColor: hex }} />
              HEX 색상 팔레트 생성기
            </h1>
            <p className="text-gray-500 text-sm">같은 정보, 다른 형태 &mdash; 하나의 색상을 다양한 형식으로 확인하세요</p>
          </header>

          <div className="space-y-6">
            <ColorInput hex={hex} onHexChange={handleHexChange} />
            <PaletteStrip shades={shades} activeIndex={activeIndex} onSelect={setActiveIndex} onCopy={handleCopy} />
            <SwatchGrid shades={shades} activeIndex={activeIndex} onSelect={setActiveIndex} onCopy={handleCopy} />
            <ColorInfoPanel hex={activeHex} />
            <TextPreview shades={shades} />
            <CSSOutput hex={hex} shades={shades} />
          </div>

          <Toast {...toast} />
        </div>
      );
    };

    // ========================================
    // 6. ReactDOM.createRoot Render
    // ========================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
