<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Day 계산기</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans KR"', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
    @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slide-up 0.4s ease-out; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-950 to-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ========================================
    // 2. Design System Components
    // ========================================
    const Button = ({ children, onClick, variant = "primary", size = "md", className = "", ...props }) => {
      const base = "font-semibold rounded-xl transition-all duration-200 cursor-pointer inline-flex items-center justify-center gap-2 active:scale-95";
      const variants = {
        primary: "bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white shadow-lg shadow-violet-500/25 hover:shadow-violet-500/40",
        danger: "bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-500 hover:to-pink-500 text-white shadow-lg shadow-rose-500/25",
        ghost: "bg-white/5 hover:bg-white/10 text-white/70 hover:text-white border border-white/10",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-5 py-2.5 text-sm",
        lg: "px-6 py-3 text-base",
      };
      return (
        <button onClick={onClick} className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {children}
        </button>
      );
    };

    const Input = ({ label, className = "", ...props }) => (
      <div className={`flex flex-col gap-1.5 ${className}`}>
        {label && <label className="text-sm font-medium text-white/60">{label}</label>}
        <input
          className="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500/50 transition-all"
          {...props}
        />
      </div>
    );

    const Card = ({ children, className = "", highlight = false, ...props }) => (
      <div
        className={`rounded-2xl border backdrop-blur-sm transition-all duration-300 ${
          highlight
            ? "bg-gradient-to-br from-violet-500/20 to-indigo-500/20 border-violet-500/30 shadow-lg shadow-violet-500/10"
            : "bg-white/5 border-white/10 hover:bg-white/8 hover:border-white/15"
        } ${className}`}
        {...props}
      >
        {children}
      </div>
    );

    const Modal = ({ open, onClose, children }) => {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" />
          <div
            className="relative w-full max-w-md bg-slate-900/95 border border-white/10 rounded-2xl p-6 shadow-2xl slide-up"
            onClick={(e) => e.stopPropagation()}
          >
            {children}
          </div>
        </div>
      );
    };

    // ========================================
    // 3. Utility Functions
    // ========================================
    const STORAGE_KEY = "dday-items-v1";

    const loadItems = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    };

    const saveItems = (items) => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    };

    const calcDiff = (targetDateStr, now) => {
      const target = new Date(targetDateStr + "T00:00:00");
      const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffMs = target.getTime() - now.getTime();
      const diffDaysFromMidnight = Math.ceil((target.getTime() - todayMidnight.getTime()) / (1000 * 60 * 60 * 24));
      const isPast = diffMs <= 0 && diffDaysFromMidnight <= 0;

      const absDiffMs = Math.abs(diffMs);
      const totalSeconds = Math.floor(absDiffMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return { days, hours, minutes, seconds, isPast, diffMs, diffDaysFromMidnight };
    };

    const pad = (n) => String(n).padStart(2, "0");

    const formatDate = (dateStr) => {
      const d = new Date(dateStr + "T00:00:00");
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const weekDays = ["일", "월", "화", "수", "목", "금", "토"];
      const weekDay = weekDays[d.getDay()];
      return `${year}년 ${month}월 ${day}일 (${weekDay})`;
    };

    const generateId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    const getTodayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    };

    // ========================================
    // 4. Page Components with Business Logic
    // ========================================
    const DDayCard = ({ item, now, isUrgent, onDelete }) => {
      const diff = calcDiff(item.date, now);
      const progressPercent = useMemo(() => {
        const created = new Date(item.createdAt);
        const target = new Date(item.date + "T00:00:00");
        const totalSpan = target.getTime() - created.getTime();
        if (totalSpan <= 0) return 100;
        const elapsed = now.getTime() - created.getTime();
        return Math.min(100, Math.max(0, (elapsed / totalSpan) * 100));
      }, [item.createdAt, item.date, now]);

      return (
        <Card highlight={isUrgent} className="p-5 slide-up">
          <div className="flex items-start justify-between mb-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1">
                {isUrgent && (
                  <span className="px-2 py-0.5 text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30 rounded-full pulse-slow">
                    긴급
                  </span>
                )}
                <span className={`px-2 py-0.5 text-xs font-semibold rounded-full ${
                  diff.isPast
                    ? "bg-slate-500/20 text-slate-400 border border-slate-500/30"
                    : "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30"
                }`}>
                  {diff.isPast ? "D+" : "D-"}
                </span>
              </div>
              <h3 className="text-lg font-bold text-white truncate">{item.title}</h3>
              <p className="text-sm text-white/40 mt-0.5">{formatDate(item.date)}</p>
            </div>
            <button
              onClick={() => onDelete(item.id)}
              className="ml-3 p-2 text-white/20 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-all"
              title="삭제"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" />
              </svg>
            </button>
          </div>

          {/* Countdown Display */}
          <div className={`rounded-xl p-4 mb-3 ${
            diff.isPast
              ? "bg-slate-800/50"
              : isUrgent
                ? "bg-gradient-to-r from-violet-600/20 to-indigo-600/20"
                : "bg-white/5"
          }`}>
            <div className="text-center">
              <div className={`text-3xl sm:text-4xl font-extrabold tracking-tight ${
                diff.isPast ? "text-slate-400" : isUrgent ? "text-violet-300" : "text-white"
              }`}>
                {diff.isPast ? "D+" : "D-"}{diff.days}
              </div>
              <div className="flex items-center justify-center gap-1 mt-2">
                {[
                  { value: pad(diff.hours), label: "시간" },
                  { value: pad(diff.minutes), label: "분" },
                  { value: pad(diff.seconds), label: "초" },
                ].map((unit, i) => (
                  <React.Fragment key={unit.label}>
                    {i > 0 && <span className="text-white/20 text-lg font-light mx-0.5">:</span>}
                    <div className="flex flex-col items-center">
                      <span className={`text-xl font-bold tabular-nums ${
                        diff.isPast ? "text-slate-500" : "text-white/80"
                      }`}>
                        {unit.value}
                      </span>
                      <span className="text-[10px] text-white/30 font-medium">{unit.label}</span>
                    </div>
                  </React.Fragment>
                ))}
              </div>
            </div>
          </div>

          {/* Progress Bar */}
          {!diff.isPast && (
            <div>
              <div className="flex justify-between text-xs text-white/30 mb-1.5">
                <span>진행률</span>
                <span>{Math.round(progressPercent)}%</span>
              </div>
              <div className="h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div
                  className="h-full rounded-full bg-gradient-to-r from-violet-500 to-indigo-500 transition-all duration-1000"
                  style={{ width: `${progressPercent}%` }}
                />
              </div>
            </div>
          )}
        </Card>
      );
    };

    const AddDDayForm = ({ onAdd }) => {
      const [open, setOpen] = useState(false);
      const [title, setTitle] = useState("");
      const [date, setDate] = useState("");
      const titleRef = useRef(null);

      useEffect(() => {
        if (open && titleRef.current) {
          titleRef.current.focus();
        }
      }, [open]);

      const handleSubmit = useCallback(() => {
        if (!title.trim() || !date) return;
        onAdd({ id: generateId(), title: title.trim(), date, createdAt: new Date().toISOString() });
        setTitle("");
        setDate("");
        setOpen(false);
      }, [title, date, onAdd]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === "Enter") handleSubmit();
      }, [handleSubmit]);

      return (
        <>
          <Button onClick={() => setOpen(true)} size="lg" className="w-full sm:w-auto">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            새 디데이 추가
          </Button>

          <Modal open={open} onClose={() => setOpen(false)}>
            <h2 className="text-xl font-bold text-white mb-5">새 디데이 추가</h2>
            <div className="space-y-4">
              <Input
                ref={titleRef}
                label="제목"
                placeholder="예: 시험일, 여행 출발, 생일..."
                value={title}
                onChange={(e) => setTitle(e.target.value)}
                onKeyDown={handleKeyDown}
              />
              <Input
                label="목표 날짜"
                type="date"
                value={date}
                onChange={(e) => setDate(e.target.value)}
                onKeyDown={handleKeyDown}
              />
            </div>
            <div className="flex gap-3 mt-6">
              <Button variant="ghost" onClick={() => setOpen(false)} className="flex-1">
                취소
              </Button>
              <Button onClick={handleSubmit} className="flex-1" disabled={!title.trim() || !date}>
                추가하기
              </Button>
            </div>
          </Modal>
        </>
      );
    };

    const EmptyState = () => (
      <div className="text-center py-16 px-4">
        <div className="text-6xl mb-4 opacity-30">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-white/20">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </div>
        <h3 className="text-lg font-semibold text-white/40 mb-2">등록된 디데이가 없습니다</h3>
        <p className="text-sm text-white/25">위 버튼을 눌러 새 디데이를 추가해보세요</p>
      </div>
    );

    const Header = ({ count }) => (
      <header className="text-center mb-8">
        <h1 className="text-3xl sm:text-4xl font-extrabold bg-gradient-to-r from-violet-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent">
          D-Day 계산기
        </h1>
        <p className="text-white/40 text-sm mt-2">
          {count > 0 ? `${count}개의 디데이가 등록되어 있습니다` : "소중한 날을 기록하세요"}
        </p>
      </header>
    );

    // ========================================
    // 5. App Component
    // ========================================
    const App = () => {
      const [items, setItems] = useState(() => loadItems());
      const [now, setNow] = useState(() => new Date());

      // Real-time clock tick every second
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);

      // Persist to localStorage
      useEffect(() => {
        saveItems(items);
      }, [items]);

      const handleAdd = useCallback((item) => {
        setItems((prev) => [...prev, item]);
      }, []);

      const handleDelete = useCallback((id) => {
        setItems((prev) => prev.filter((item) => item.id !== id));
      }, []);

      // Sort: upcoming first (closest date), then past (most recent first)
      const sortedItems = useMemo(() => {
        return [...items].sort((a, b) => {
          const diffA = calcDiff(a.date, now);
          const diffB = calcDiff(b.date, now);
          // Upcoming before past
          if (!diffA.isPast && diffB.isPast) return -1;
          if (diffA.isPast && !diffB.isPast) return 1;
          // Among upcoming: closest first
          if (!diffA.isPast && !diffB.isPast) return diffA.diffMs - diffB.diffMs;
          // Among past: most recent first
          return diffB.diffMs - diffA.diffMs;
        });
      }, [items, now]);

      // The most urgent is the first upcoming item
      const urgentId = useMemo(() => {
        const upcoming = sortedItems.find((item) => !calcDiff(item.date, now).isPast);
        return upcoming ? upcoming.id : null;
      }, [sortedItems, now]);

      return (
        <div className="min-h-screen px-4 py-8 sm:py-12">
          <div className="max-w-2xl mx-auto">
            <Header count={items.length} />

            <div className="flex justify-center mb-8">
              <AddDDayForm onAdd={handleAdd} />
            </div>

            {sortedItems.length === 0 ? (
              <EmptyState />
            ) : (
              <div className="grid gap-4">
                {sortedItems.map((item) => (
                  <DDayCard
                    key={item.id}
                    item={item}
                    now={now}
                    isUrgent={item.id === urgentId}
                    onDelete={handleDelete}
                  />
                ))}
              </div>
            )}

            <footer className="text-center mt-12 text-white/15 text-xs">
              D-Day 계산기 &copy; {new Date().getFullYear()}
            </footer>
          </div>
        </div>
      );
    };

    // ========================================
    // 6. ReactDOM.createRoot Render
    // ========================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
