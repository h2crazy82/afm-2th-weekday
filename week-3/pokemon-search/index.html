    // ========================================
    async function fetchPokemon(query) {
      // 한글 입력이면 ID로 변환
      const resolvedQuery = POKEMON_KO_MAP[query] || query;

      const res = await fetch(`${POKE_API}/pokemon/${String(resolvedQuery).toLowerCase()}`);
      if (!res.ok) throw new Error("포켓몬을 찾을 수 없습니다");
      const data = await res.json();

      const speciesRes = await fetch(data.species.url);
      const speciesData = await speciesRes.json();

      const koName = speciesData.names.find((n) => n.language.name === "ko");
      const koFlavorText = speciesData.flavor_text_entries.find(
        (f) => f.language.name === "ko"
      );
      const primaryType = data.types[0].type.name;

      return {
        id: data.id,
        name: koName ? koName.name : data.name,
        nameEn: data.name.charAt(0).toUpperCase() + data.name.slice(1),
        types: data.types.map((t) => t.type.name),
        height: (data.height / 10).toFixed(1),
        weight: (data.weight / 10).toFixed(1),
        stats: data.stats.map((s) => ({ name: s.stat.name, value: s.base_stat })),
        description: koFlavorText
          ? koFlavorText.flavor_text.replace(/\n|\f/g, " ")
          : "설명이 없습니다.",
        image: data.sprites.other["official-artwork"].front_default || data.sprites.front_default,
        color: TYPE_GRADIENTS[primaryType] || "from-gray-400 to-gray-600",
      };
    }

    async function fetchPokemonListByType(typeName) {
      const res = await fetch(`${POKE_API}/type/${typeName}`);
      const data = await res.json();
      return data.pokemon
        .map((p) => {
          const urlParts = p.pokemon.url.split("/").filter(Boolean);
          const id = parseInt(urlParts[urlParts.length - 1]);
          return { id, name: p.pokemon.name };
        })
        .filter((p) => p.id <= 1025)
        .sort((a, b) => a.id - b.id)
        .slice(0, 20);
    }

    async function fetchPokemonListByGeneration(genName) {
      const res = await fetch(`${POKE_API}/${genName}`);
      const data = await res.json();
      return data.pokemon_species
        .map((s) => {
          const urlParts = s.url.split("/").filter(Boolean);
          return { id: parseInt(urlParts[urlParts.length - 1]), name: s.name };
        })
        .sort((a, b) => a.id - b.id)
        .slice(0, 20);
    }

    async function fetchPokemonMini(id) {
      const res = await fetch(`${POKE_API}/pokemon/${id}`);
      const data = await res.json();

      const speciesRes = await fetch(data.species.url);
      const speciesData = await speciesRes.json();
      const koName = speciesData.names.find((n) => n.language.name === "ko");

      return {
        id: data.id,
        name: koName ? koName.name : data.name,
        image: data.sprites.other["official-artwork"].front_default || data.sprites.front_default,
        types: data.types.map((t) => t.type.name),
      };
    }

    // 한글 이름 목록 (즉시 사용 가능)

    // 영문 이름 목록 (앱 로드 시 API에서 가져옴)
    let EN_NAME_CACHE = [];

    async function loadEnglishNames() {
      try {
        const res = await fetch(`${POKE_API}/pokemon-species?limit=1025`);
        const data = await res.json();
        EN_NAME_CACHE = data.results.map((s, i) => ({
          id: i + 1,
          name: s.name,
        }));
      } catch {
        EN_NAME_CACHE = [];
      }
    }

    function getAutocompleteSuggestions(input) {
      const q = input.trim().toLowerCase();
      if (!q || q.length < 1) return [];

      const isNumber = /^\d+$/.test(q);
      if (isNumber) {
        const num = parseInt(q);
        const matches = [];
        // 번호로 시작하는 포켓몬 매칭
        for (const entry of KO_NAME_LIST) {
          if (String(entry.id).startsWith(q) && entry.id <= 1025) {
            matches.push(entry);
          }
        }
        // 중복 ID 제거
        const seen = new Set();
        return matches.filter((m) => {
          if (seen.has(m.id)) return false;
          seen.add(m.id);
          return true;
        }).slice(0, 8);
      }

      const isKorean = /[가-힣]/.test(q);
      const results = [];
      const seenIds = new Set();

      if (isKorean) {
        // 한글 검색: 시작 일치 우선, 그 다음 포함 일치
        const startsWith = [];
        const includes = [];
        for (const entry of KO_NAME_LIST) {
          if (seenIds.has(entry.id)) continue;
          if (entry.name.startsWith(q)) {
            startsWith.push(entry);
            seenIds.add(entry.id);
          } else if (entry.name.includes(q)) {
            includes.push(entry);
            seenIds.add(entry.id);
          }
        }
        results.push(...startsWith, ...includes);
      } else {
        // 영문 검색
        const startsWith = [];
        const includes = [];
        for (const entry of EN_NAME_CACHE) {
          if (seenIds.has(entry.id)) continue;
          if (entry.name.startsWith(q)) {
            startsWith.push(entry);
            seenIds.add(entry.id);
          } else if (entry.name.includes(q)) {
            includes.push(entry);
            seenIds.add(entry.id);
          }
        }
        results.push(...startsWith, ...includes);
      }

      return results.slice(0, 8);
    }

    // ========================================
    // 🔎 SearchInput with Autocomplete
    // ========================================
    function SearchInput({ value, onChange, onSearch }) {
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [selectedIndex, setSelectedIndex] = useState(-1);
      const wrapperRef = useRef(null);

      useEffect(() => {
        if (value.trim().length >= 1) {
          const results = getAutocompleteSuggestions(value);
          setSuggestions(results);
          setShowSuggestions(results.length > 0);
          setSelectedIndex(-1);
        } else {
          setSuggestions([]);
          setShowSuggestions(false);
        }
      }, [value]);

      useEffect(() => {
        function handleClickOutside(e) {
          if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
            setShowSuggestions(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const handleSelect = (suggestion) => {
        setShowSuggestions(false);
        onSearch(String(suggestion.id));
      };

      const handleKeyDown = (e) => {
        if (!showSuggestions) {
          if (e.key === "Enter") onSearch(value);
          return;
        }

        if (e.key === "ArrowDown") {
          e.preventDefault();
          setSelectedIndex((prev) => (prev < suggestions.length - 1 ? prev + 1 : 0));
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setSelectedIndex((prev) => (prev > 0 ? prev - 1 : suggestions.length - 1));
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (selectedIndex >= 0 && suggestions[selectedIndex]) {
            handleSelect(suggestions[selectedIndex]);
          } else {
            setShowSuggestions(false);
            onSearch(value);
          }
        } else if (e.key === "Escape") {
          setShowSuggestions(false);
        }
      };

      // 한글 이름이면 한글 표시, 영문이면 영문+한글 ID 표시
      const getDisplayName = (s) => {
        const koEntry = KO_NAME_LIST.find((k) => k.id === s.id);
        const koName = koEntry ? koEntry.name : "";
        if (/[가-힣]/.test(s.name)) {
          return s.name;
        }
        return koName
          ? `${s.name} (${koName})`
          : s.name;
      };

      return (
        <div ref={wrapperRef} className="relative flex gap-2">
          <div className="flex-1 relative">
            <input
              type="text"
              value={value}
              onChange={(e) => onChange(e.target.value)}
              onKeyDown={handleKeyDown}
              onFocus={() => {
                if (suggestions.length > 0) setShowSuggestions(true);
              }}
              placeholder="예: 피카츄, pikachu, 25"
              className="w-full px-5 py-3 rounded-full border-2 border-gray-200 focus:border-blue-400 focus:outline-none text-lg shadow-sm transition-colors"
            />

            {showSuggestions && (
              <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden z-50">
                {suggestions.map((s, i) => (
                  <button
                    key={`${s.id}-${s.name}`}
                    onClick={() => handleSelect(s)}
                    className={`w-full text-left px-4 py-3 flex items-center gap-3 transition-colors ${
                      i === selectedIndex
                        ? "bg-blue-50 text-blue-700"
                        : "hover:bg-gray-50 text-gray-700"
                    }`}
                  >
                    <img
                      src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${s.id}.png`}
                      alt=""
                      className="w-8 h-8"
                    />
                    <div className="flex-1 min-w-0">
                      <span className="font-semibold">{getDisplayName(s)}</span>
                    </div>
                    <span className="text-xs text-gray-400 font-mono flex-shrink-0">
                      #{String(s.id).padStart(3, "0")}
                    </span>
                  </button>
                ))}
              </div>
            )}
          </div>
          <button
            onClick={() => { setShowSuggestions(false); onSearch(value); }}
            className="px-6 py-3 bg-blue-500 text-white rounded-full font-semibold shadow hover:bg-blue-600 transition-colors"
          >
            검색
          </button>
        </div>
      );
    }

    // ========================================
    // 📄 PokemonCard Component
    // ========================================
    function PokemonCard({ pokemon, onBack }) {
      return (
        <div className="fade-in max-w-sm mx-auto">
          <button
            onClick={onBack}
            className="mb-4 px-4 py-2 bg-white rounded-full text-sm text-gray-600 shadow hover:shadow-md hover:text-blue-600 transition-all flex items-center gap-1"
          >
            ← 뒤로가기
          </button>
          <div className={`bg-gradient-to-br ${pokemon.color} rounded-t-3xl p-6 relative overflow-hidden`}>
            <div className="absolute top-4 right-4 text-white/30 text-6xl font-extrabold">
              #{String(pokemon.id).padStart(3, "0")}
            </div>
            <img
              src={pokemon.image}
              alt={pokemon.name}
              className="w-48 h-48 mx-auto drop-shadow-lg bounce-slow relative z-10"
            />
          </div>
          <div className="bg-white rounded-b-3xl shadow-xl p-6 space-y-5">
            <div className="text-center">
              <p className="text-gray-400 text-sm font-mono">No.{String(pokemon.id).padStart(3, "0")}</p>
              <h2 className="text-2xl font-extrabold text-gray-800">{pokemon.name}</h2>
              <p className="text-gray-400 text-sm">{pokemon.nameEn}</p>
              <div className="flex justify-center gap-2 mt-2">
                {pokemon.types.map((type) => (
                  <Badge key={type} label={TYPE_KO[type] || type} className={TYPE_COLORS[type] || "bg-gray-400"} />
                ))}
              </div>
            </div>
            <p className="text-gray-600 text-sm text-center leading-relaxed">{pokemon.description}</p>
            <div className="flex justify-center gap-8 text-center">
              <div>
                <p className="text-gray-400 text-xs">키</p>
                <p className="font-bold text-gray-700">{pokemon.height}m</p>
              </div>
              <div>
                <p className="text-gray-400 text-xs">몸무게</p>
                <p className="font-bold text-gray-700">{pokemon.weight}kg</p>
              </div>
            </div>
            <div className="space-y-2">
              <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider">능력치</h3>
              {pokemon.stats.map((stat) => (
                <StatBar
                  key={stat.name}
                  label={STAT_LABELS[stat.name] || stat.name}
                  value={stat.value}
                  color={STAT_COLORS[stat.name] || "bg-gray-400"}
                />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🗂️ PokemonListItem Component
    // ========================================
    function PokemonListItem({ pokemon, onClick }) {
      const primaryType = pokemon.types[0];
      return (
        <button
          onClick={onClick}
          className="fade-in bg-white rounded-2xl shadow hover:shadow-lg transition-all p-3 flex flex-col items-center gap-2 hover:scale-105"
        >
          <div className={`w-full aspect-square rounded-xl bg-gradient-to-br ${TYPE_GRADIENTS[primaryType] || "from-gray-200 to-gray-300"} flex items-center justify-center p-2`}>
            <img src={pokemon.image} alt={pokemon.name} className="w-full h-full object-contain drop-shadow" />
          </div>
          <p className="text-xs text-gray-400 font-mono">#{String(pokemon.id).padStart(3, "0")}</p>
          <p className="text-sm font-bold text-gray-700 truncate w-full text-center">{pokemon.name}</p>
          <div className="flex gap-1">
            {pokemon.types.map((t) => (
              <span key={t} className={`text-[10px] px-2 py-0.5 rounded-full text-white ${TYPE_COLORS[t] || "bg-gray-400"}`}>
                {TYPE_KO[t] || t}
              </span>
            ))}
          </div>
        </button>
      );
    }

    // ========================================
    // 📂 CategoryBrowser Component
    // ========================================
    function CategoryBrowser({ onSelectPokemon }) {
      const [activeCategory, setActiveCategory] = useState(null);
      const [activeItem, setActiveItem] = useState(null);
      const [pokemonList, setPokemonList] = useState([]);
      const [listLoading, setListLoading] = useState(false);

      const handleItemClick = useCallback(async (category, item) => {
        setActiveItem(item.key);
        setListLoading(true);
        setPokemonList([]);

        try {
          let idList = [];

          if (category.id === "type") {
            idList = await fetchPokemonListByType(item.key);
          } else if (category.id === "generation") {
            idList = await fetchPokemonListByGeneration(item.key);
          } else if (category.id === "popular") {
            onSelectPokemon(item.key);
            setListLoading(false);
            return;
          }

          const results = await Promise.all(idList.map((p) => fetchPokemonMini(p.id)));
          setPokemonList(results);
        } catch {
          setPokemonList([]);
        } finally {
          setListLoading(false);
        }
      }, [onSelectPokemon]);

      return (
        <div className="space-y-6">
          <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
            {CATEGORIES.map((cat) => (
              <button
                key={cat.id}
                onClick={() => {
                  setActiveCategory(activeCategory === cat.id ? null : cat.id);
                  setActiveItem(null);
                  setPokemonList([]);
                }}
                className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition-all ${
                  activeCategory === cat.id
                    ? "bg-blue-500 text-white shadow-md"
                    : "bg-white text-gray-600 shadow hover:shadow-md"
                }`}
              >
                {cat.icon} {cat.label}
              </button>
            ))}
          </div>

          {activeCategory && (
            <div className="fade-in">
              {CATEGORIES.filter((c) => c.id === activeCategory).map((cat) => (
                <div key={cat.id} className="flex flex-wrap gap-2">
                  {cat.items.map((item) => (
                    <button
                      key={item.key}
                      onClick={() => handleItemClick(cat, item)}
                      className={`px-3 py-1.5 rounded-full text-sm transition-all ${
                        activeItem === item.key
                          ? "bg-blue-500 text-white shadow-md"
                          : "bg-white text-gray-600 shadow hover:shadow-md hover:text-blue-600"
                      }`}
                    >
                      {item.label}
                      {item.range && <span className="text-xs opacity-60 ml-1">({item.range})</span>}
                    </button>
                  ))}
                </div>
              ))}
            </div>
          )}

          {listLoading && <Spinner className="mt-8" />}

          {pokemonList.length > 0 && (
            <div className="fade-in">
              <p className="text-sm text-gray-400 mb-3">
                {pokemonList.length}마리 표시 (최대 20마리)
              </p>
              <div className="grid grid-cols-3 sm:grid-cols-4 gap-3">
                {pokemonList.map((p) => (
                  <PokemonListItem
                    key={p.id}
                    pokemon={p}
                    onClick={() => onSelectPokemon(String(p.id))}
                  />
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [query, setQuery] = useState("");
      const [pokemon, setPokemon] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      // 앱 시작 시 영문 이름 목록 로드 (자동완성용)
      useEffect(() => {
        loadEnglishNames();
      }, []);

      const handleSearch = useCallback(async (searchQuery) => {
        const q = (searchQuery || "").trim();
        if (!q) return;

        setLoading(true);
        setError(null);
        setPokemon(null);

        try {
          const result = await fetchPokemon(q);
          setPokemon(result);
        } catch {
          setError("포켓몬을 찾을 수 없습니다");
        } finally {
          setLoading(false);
        }
      }, []);

      const handleBack = () => {
        setPokemon(null);
        setError(null);
      };

      return (
        <div className="min-h-screen bg-gradient-to-b from-gray-50 to-gray-200 py-10 px-4">
          <div className="max-w-lg mx-auto">
            <div className="text-center mb-8">
              <h1 className="text-4xl font-extrabold text-gray-800 mb-2">포켓몬 도감</h1>
              <p className="text-gray-500 mb-6">한글, 영문 이름 또는 번호로 검색하세요</p>
              <SearchInput
                value={query}
                onChange={setQuery}
                onSearch={handleSearch}
              />
            </div>

            {loading && <Spinner />}

            {pokemon && <PokemonCard pokemon={pokemon} onBack={handleBack} />}

            {error && (
              <div className="text-center text-gray-400 mt-12 fade-in space-y-3">
                <p className="text-5xl">😢</p>
                <p className="text-lg font-semibold">{error}</p>
                <p className="text-sm">한글, 영문 이름이나 번호(1~1025)로 검색해 보세요</p>
                <button onClick={handleBack} className="mt-2 px-4 py-2 bg-white rounded-full text-sm text-gray-600 shadow hover:text-blue-600">
                  ← 돌아가기
                </button>
              </div>
            )}

            {!pokemon && !loading && !error && (
              <CategoryBrowser onSelectPokemon={handleSearch} />
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🎬 Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
