    const MOCK_DATA = {

    // ========================================

    const OBJECT_TYPES = [
      { pattern: /nebula[es]?/i, type: '성운', icon: '🌫️', category: 'nebula' },
      { pattern: /galaxy|galaxies/i, type: '은하', icon: '🌀', category: 'galaxy' },
      { pattern: /supernova[es]?/i, type: '초신성', icon: '💥', category: 'supernova' },
      { pattern: /black hole/i, type: '블랙홀', icon: '🕳️', category: 'blackhole' },
      { pattern: /planet(?!ary)/i, type: '행성', icon: '🪐', category: 'planet' },
      { pattern: /moon(?!light|lit)/i, type: '위성', icon: '🌙', category: 'moon' },
      { pattern: /sun(?!set|rise|day|light|lit)|solar(?!\s+system)/i, type: '태양', icon: '☀️', category: 'sun' },
      { pattern: /comet/i, type: '혜성', icon: '☄️', category: 'comet' },
      { pattern: /asteroid/i, type: '소행성', icon: '🪨', category: 'asteroid' },
      { pattern: /aurora[es]?|northern lights|southern lights/i, type: '오로라', icon: '🌌', category: 'aurora' },
      { pattern: /star cluster|cluster of stars/i, type: '성단', icon: '✨', category: 'cluster' },
      { pattern: /milky way/i, type: '우리 은하', icon: '🌌', category: 'milkyway' },
      { pattern: /eclipse/i, type: '일/월식', icon: '🌑', category: 'eclipse' },
      { pattern: /meteor|shooting star/i, type: '유성', icon: '🌠', category: 'meteor' },
      { pattern: /pulsar/i, type: '펄서', icon: '💫', category: 'pulsar' },
      { pattern: /quasar/i, type: '퀘이사', icon: '🔆', category: 'quasar' },
      { pattern: /mars\b/i, type: '화성', icon: '🔴', category: 'planet' },
      { pattern: /jupiter/i, type: '목성', icon: '🟠', category: 'planet' },
      { pattern: /saturn/i, type: '토성', icon: '🪐', category: 'planet' },
      { pattern: /venus/i, type: '금성', icon: '🟡', category: 'planet' },
      { pattern: /mercury/i, type: '수성', icon: '⚫', category: 'planet' },
      { pattern: /neptune/i, type: '해왕성', icon: '🔵', category: 'planet' },
      { pattern: /uranus/i, type: '천왕성', icon: '🫧', category: 'planet' },
      { pattern: /pluto/i, type: '명왕성', icon: '⚪', category: 'planet' },
      { pattern: /ISS|space station/i, type: '국제우주정거장', icon: '🛰️', category: 'iss' },
      { pattern: /star(?!t|dust|board|fish)/i, type: '항성', icon: '⭐', category: 'star' },
    ];

    const FEATURE_PATTERNS = [
      { pattern: /infrared/i, label: '적외선 촬영' },
      { pattern: /ultraviolet|UV\b/i, label: '자외선 촬영' },
      { pattern: /X-ray/i, label: 'X선 촬영' },
      { pattern: /radio\s+(wave|image|telescope|emission)/i, label: '전파 관측' },
      { pattern: /hubble/i, label: '허블 망원경' },
      { pattern: /webb|JWST/i, label: '제임스 웹 망원경' },
      { pattern: /chandra/i, label: '찬드라 관측소' },
      { pattern: /spitzer/i, label: '스피처 망원경' },
      { pattern: /hydrogen|H-alpha/i, label: '수소 방출' },
      { pattern: /oxygen/i, label: '산소 감지' },
      { pattern: /magnetic field/i, label: '자기장' },
      { pattern: /dark matter/i, label: '암흑물질' },
      { pattern: /dark energy/i, label: '암흑에너지' },
      { pattern: /gravity|gravitational/i, label: '중력 효과' },
      { pattern: /supermassive/i, label: '초거대질량' },
      { pattern: /spiral arm/i, label: '나선팔 구조' },
      { pattern: /dust/i, label: '우주 먼지' },
      { pattern: /ionize|ionization/i, label: '이온화 영역' },
      { pattern: /young stars|star.?form/i, label: '별 생성 영역' },
      { pattern: /collision|colliding|merger/i, label: '충돌/병합' },
      { pattern: /tail(?!or)/i, label: '꼬리 구조' },
      { pattern: /ring(?!s?\s+nebula)/i, label: '고리 구조' },
      { pattern: /crater/i, label: '분화구' },
      { pattern: /rover|lander/i, label: '탐사 로버' },
      { pattern: /telescope/i, label: '망원경 관측' },
      { pattern: /composite|mosaic/i, label: '합성 이미지' },
      { pattern: /time.?lapse/i, label: '타임랩스' },
      { pattern: /panoram/i, label: '파노라마' },
    ];

    const DISTANCE_PATTERNS = [
      // "약 1,500 광년" 등 숫자 + 단위
      { pattern: /about\s+([\d,.]+)\s*(million|billion|trillion)?\s*(light.?years?)/i, unit: 'ly' },
      { pattern: /([\d,.]+)\s*(million|billion|trillion)?\s*(light.?years?)\s*(away|from|distant|far)/i, unit: 'ly' },
      { pattern: /distance\s+(?:of\s+)?([\d,.]+)\s*(million|billion|trillion)?\s*(light.?years?)/i, unit: 'ly' },
      { pattern: /([\d,.]+)\s*(million|billion|trillion)?\s*(parsecs?|pc)\b/i, unit: 'pc' },
      { pattern: /([\d,.]+)\s*(million|billion|trillion)?\s*(kilometers?|km)\s*(away|from|distant)?/i, unit: 'km' },
      { pattern: /([\d,.]+)\s*(million|billion|trillion)?\s*(miles?)\s*(away|from|distant)?/i, unit: 'mi' },
      { pattern: /([\d,.]+)\s*(AU|astronomical units?)/i, unit: 'au' },
      { pattern: /light\s+takes?\s+(?:about\s+)?([\d,.]+)\s*(years?|months?|minutes?|seconds?|hours?)/i, unit: 'light-time' },
    ];

    function analyzeApodData(title, explanation) {
      const text = (title + ' ' + explanation).replace(/\s+/g, ' ');

      // 천체 유형 추출
      const detectedTypes = [];
      for (const obj of OBJECT_TYPES) {
        if (obj.pattern.test(text) && !detectedTypes.find(d => d.type === obj.type)) {
          detectedTypes.push(obj);
        }
        if (detectedTypes.length >= 3) break;
      }

      // 특징 추출
      const features = [];
      for (const feat of FEATURE_PATTERNS) {
        if (feat.pattern.test(text) && !features.includes(feat.label)) {
          features.push(feat.label);
        }
        if (features.length >= 5) break;
      }

      // 거리 추출
      let distance = null;
      for (const dp of DISTANCE_PATTERNS) {
        const match = text.match(dp.pattern);
        if (match) {
          if (dp.unit === 'light-time') {
            const val = parseFloat(match[1].replace(/,/g, ''));
            const timeUnit = match[2].toLowerCase();
            distance = formatLightTimeDistance(val, timeUnit);
          } else {
            const rawVal = parseFloat(match[1].replace(/,/g, ''));
            const multiplier = match[2] ? getMultiplier(match[2]) : 1;
            const val = rawVal * multiplier;
            distance = formatDistance(val, dp.unit);
          }
          break;
        }
      }

      // 타이틀 기반 보완 추출
      if (detectedTypes.length === 0) {
        detectedTypes.push({ type: '우주', icon: '🔭', category: 'space' });
      }

      return { types: detectedTypes, features, distance };
    }

    function getMultiplier(word) {
      if (!word) return 1;
      switch (word.toLowerCase()) {
        case 'million': return 1e6;
        case 'billion': return 1e9;
        case 'trillion': return 1e12;
        default: return 1;
      }
    }

    function formatDistance(value, unit) {
      switch (unit) {
        case 'ly': {
          const km = value * 9.461e12;
          return {
            original: `${formatNumber(value)} 광년`,
            km: `${formatNumber(km)} km`,
            description: getDistanceDescription(value, 'ly'),
            lightYears: value,
          };
        }
        case 'pc': {
          const ly = value * 3.2616;
          const km = ly * 9.461e12;
          return {
            original: `${formatNumber(ly)} 광년`,
            km: `${formatNumber(km)} km`,
            description: getDistanceDescription(ly, 'ly'),
            lightYears: ly,
          };
        }
        case 'km': {
          const ly = value / 9.461e12;
          return {
            original: ly > 0.01 ? `${formatNumber(ly)} 광년` : `${formatNumber(value)} km`,
            km: `${formatNumber(value)} km`,
            description: getDistanceDescription(value, 'km'),
            lightYears: ly,
          };
        }
        case 'mi': {
          const km = value * 1.60934;
          const ly = km / 9.461e12;
          return {
            original: ly > 0.01 ? `${formatNumber(ly)} 광년` : `${formatNumber(km)} km`,
            km: `${formatNumber(km)} km`,
            description: getDistanceDescription(km, 'km'),
            lightYears: ly,
          };
        }
        case 'au': {
          const km = value * 1.496e8;
          const ly = km / 9.461e12;
          return {
            original: `${formatNumber(value)} AU`,
            km: `${formatNumber(km)} km`,
            description: getDistanceDescription(value, 'au'),
            lightYears: ly,
          };
        }
        default:
          return { original: `${formatNumber(value)}`, km: '', description: '', lightYears: 0 };
      }
    }

    function formatLightTimeDistance(value, timeUnit) {
      let ly;
      switch (timeUnit) {
        case 'year': case 'years': ly = value; break;
        case 'month': case 'months': ly = value / 12; break;
        case 'hour': case 'hours': ly = value / 8766; break;
        case 'minute': case 'minutes': ly = value / 525960; break;
        case 'second': case 'seconds': ly = value / 3.156e7; break;
        default: ly = value;
      }
      const km = ly * 9.461e12;
      return {
        original: `${formatNumber(ly)} 광년`,
        km: `${formatNumber(km)} km`,
        description: getDistanceDescription(ly, 'ly'),
        lightYears: ly,
      };
    }

    function formatNumber(num) {
      if (num >= 1e12) return (num / 1e12).toFixed(1) + '조';
      if (num >= 1e8) return (num / 1e8).toFixed(1) + '억';
      if (num >= 1e4) return (num / 1e4).toFixed(1) + '만';
      if (num >= 1000) return num.toLocaleString('ko-KR', { maximumFractionDigits: 1 });
      if (num >= 1) return num.toFixed(1);
      if (num >= 0.001) return num.toFixed(3);
      return num.toExponential(1);
    }

    function getDistanceDescription(value, unit) {
      if (unit === 'ly') {
        if (value < 0.001) return '태양계 내부에 위치';
        if (value < 1) return '태양 근방의 이웃 항성 거리';
        if (value < 100) return '우리 은하 태양 근방';
        if (value < 1000) return '우리 은하 팔 내부';
        if (value < 100000) return '우리 은하 내부';
        if (value < 200000) return '우리 은하 경계';
        if (value < 3e6) return '국부 은하군 영역';
        if (value < 1e8) return '관측 가능한 우주 중거리';
        return '극심원 우주 영역';
      }
      if (unit === 'km') {
        if (value < 4e5) return '달보다 가까운 거리';
        if (value < 1.5e8) return '태양계 내행성 거리';
        if (value < 6e9) return '태양계 외행성 거리';
        if (value < 1e13) return '태양계 외곽';
        return '항성간 거리';
      }
      if (unit === 'au') {
        if (value < 1) return '지구 궤도 이내';
        if (value < 5.2) return '태양계 내행성 영역';
        if (value < 40) return '태양계 외행성 영역';
        if (value < 100000) return '태양계 외곽 (오르트 구름)';
        return '항성간 공간';
      }
      return '';
    }

    // ========================================
    // 📄 MagazineCover — 메인 잡지 표지 레이아웃
    // ========================================

    function ObjectInfoPanel({ analysis, compact = false }) {
      if (!analysis) return null;
      const { types, features, distance } = analysis;

      if (compact) {
        return (

    function DistanceVisual({ lightYears }) {
      // 로그 스케일로 우주 거리 시각화
      const logScale = lightYears > 0 ? Math.log10(lightYears) : 0;
      // 범위: -3 (태양계 내) ~ 11 (관측 가능 우주 끝 ~460억 광년)
      const percentage = Math.min(Math.max(((logScale + 3) / 14) * 100, 1), 99);

      const landmarks = [
        { pos: 0, label: '지구' },
        { pos: 21, label: '태양계' },
        { pos: 36, label: '이웃 항성' },
        { pos: 57, label: '은하 내부' },
        { pos: 78, label: '국부 은하군' },
        { pos: 100, label: '관측 한계' },
      ];

      return (
        <div>
          <div className="relative h-2 rounded-full bg-white/5 overflow-hidden">
            <div
              className="absolute left-0 top-0 h-full rounded-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-1000"
              style={{ width: `${percentage}%` }}
            ></div>
            <div
              className="absolute top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-white shadow-lg shadow-blue-500/50 transition-all duration-1000"
              style={{ left: `calc(${percentage}% - 6px)` }}
            ></div>
          </div>
          <div className="relative mt-1.5 flex justify-between">
            {landmarks.map((lm, i) => (
              <span key={i} className="font-sans text-[8px] text-white/25" style={{position: i === 0 || i === landmarks.length - 1 ? 'relative' : 'absolute', left: i === 0 || i === landmarks.length - 1 ? undefined : `${lm.pos}%`, transform: i > 0 && i < landmarks.length - 1 ? 'translateX(-50%)' : undefined}}>
                {lm.label}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [todayData, setTodayData] = useState(null);
      const [recentData, setRecentData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [detailOpen, setDetailOpen] = useState(false);
      const [detailData, setDetailData] = useState(null);
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);

      const fetchApod = useCallback(async (date) => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${APOD_URL}?api_key=${NASA_API_KEY}&date=${date}`);
          if (!res.ok) throw new Error('Failed to fetch');
          const data = await res.json();
          setTodayData(data);
        } catch (err) {
          console.warn('API fetch failed, using mock data:', err.message);
          setTodayData(MOCK_DATA);
          setRecentData(RECENT_MOCK);
        } finally {
          setLoading(false);
        }
      }, []);

      const fetchRecent = useCallback(async () => {
        try {
          const end = new Date();
          const start = new Date();
          start.setDate(end.getDate() - 5);
          const startStr = start.toISOString().split('T')[0];
          const endStr = end.toISOString().split('T')[0];
          const res = await fetch(`${APOD_URL}?api_key=${NASA_API_KEY}&start_date=${startStr}&end_date=${endStr}`);
          if (!res.ok) throw new Error('Failed to fetch recent');
          const data = await res.json();
          setRecentData(data.reverse().slice(1));
        } catch (err) {
          console.warn('Recent fetch failed, using mock data');
          setRecentData(RECENT_MOCK);
        }
      }, []);

      useEffect(() => {
        fetchApod(selectedDate);
        fetchRecent();
      }, []);

      const handleDateChange = useCallback((date) => {
        setSelectedDate(date);
        fetchApod(date);
      }, [fetchApod]);

      const handleOpenDetail = useCallback((data) => {
        setDetailData(data || todayData);
        setDetailOpen(true);
      }, [todayData]);

      const handleCloseDetail = useCallback(() => {
        setDetailOpen(false);
      }, []);

      if (loading) return <LoadingSkeleton />;
      if (error && !todayData) return <ErrorState message={error} onRetry={() => fetchApod(selectedDate)} />;
      if (!todayData) return null;

      return (
        <div className="min-h-screen">
          <MagazineCover
            data={todayData}
            onOpenDetail={() => handleOpenDetail(todayData)}
          />

          {recentData.length > 0 && (
            <RecentSection
              items={recentData}
              onSelect={(item) => handleOpenDetail(item)}
            />
          )}

          <DatePicker
            selectedDate={selectedDate}
            onChange={handleDateChange}
          />

          <Footer />

          <DetailModal
            data={detailData || todayData}
            isOpen={detailOpen}
            onClose={handleCloseDetail}
          />
        </div>
      );
    }
