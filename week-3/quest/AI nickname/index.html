<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 닉네임 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastSlide {
      0% { opacity: 0; transform: translateY(16px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes cardFlip {
      0% { opacity: 0; transform: rotateY(-15deg) scale(0.9); }
      100% { opacity: 1; transform: rotateY(0) scale(1); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
      opacity: 0;
    }
    .animate-toast {
      animation: toastSlide 2s ease-in-out forwards;
    }
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    .animate-card-flip {
      animation: cardFlip 0.6s ease-out forwards;
      opacity: 0;
    }
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px -12px rgba(139, 92, 246, 0.25);
    }
    .copy-btn {
      transition: all 0.2s ease;
    }
    .copy-btn:active {
      transform: scale(0.85);
    }
    .gradient-text {
      background: linear-gradient(135deg, #8b5cf6, #ec4899, #3b82f6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    .loading-dot {
      animation: pulse-dot 1.4s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    .character-card-bg {
      background: linear-gradient(145deg, var(--card-from), var(--card-to));
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 via-pink-50 to-blue-50">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useCallback, useRef } = React;

    // ========================================
    // API Configuration
    // ========================================
    const API_BASE_URL = window.location.origin;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '' }) {
      const base = 'font-bold rounded-2xl transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer';
      const sizes = { sm: 'px-4 py-2 text-sm', md: 'px-6 py-3 text-base', lg: 'px-8 py-4 text-lg' };
      const variants = {
        primary: 'bg-gradient-to-r from-violet-500 via-purple-500 to-pink-500 text-white shadow-lg shadow-purple-200 hover:shadow-xl hover:shadow-purple-300 hover:brightness-110',
        secondary: 'bg-white text-purple-600 border-2 border-purple-200 hover:border-purple-400 hover:bg-purple-50 shadow-sm',
        ghost: 'bg-transparent text-purple-500 hover:bg-purple-50',
      };
      return (
        <button onClick={onClick} disabled={disabled}
          className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, icon }) {
      return (
        <div className="space-y-1.5">
          <label className="block text-sm font-semibold text-gray-600 ml-1">{icon} {label}</label>
          <input type="text" value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            className="w-full px-4 py-3 rounded-xl border-2 border-purple-100 bg-white/80 backdrop-blur-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-purple-400 input-glow transition-all duration-200" />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, color = 'purple' }) {
      const colors = {
        purple: 'bg-purple-100 text-purple-600',
        pink: 'bg-pink-100 text-pink-600',
        blue: 'bg-blue-100 text-blue-600',
        green: 'bg-emerald-100 text-emerald-600',
        amber: 'bg-amber-100 text-amber-600',
        red: 'bg-red-100 text-red-600',
        cyan: 'bg-cyan-100 text-cyan-600',
        violet: 'bg-violet-100 text-violet-600',
        rose: 'bg-rose-100 text-rose-600',
        indigo: 'bg-indigo-100 text-indigo-600',
        teal: 'bg-teal-100 text-teal-600',
        orange: 'bg-orange-100 text-orange-600',
        emerald: 'bg-emerald-100 text-emerald-600',
      };
      return (
        <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[color] || colors.purple}`}>
          {children}
        </span>
      );
    }

    function Toast({ message, visible }) {
      if (!visible) return null;
      return (
        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 animate-toast">
          <div className="bg-gray-800 text-white px-5 py-2.5 rounded-xl shadow-2xl text-sm font-medium flex items-center gap-2">
            <span>✅</span> {message}
          </div>
        </div>
      );
    }

    function LoadingSpinner() {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4">
          <div className="relative">
            <div className="w-16 h-16 rounded-full border-4 border-purple-100"></div>
            <div className="w-16 h-16 rounded-full border-4 border-transparent border-t-purple-500 absolute top-0 left-0" style={{ animation: 'spin 1s linear infinite' }}></div>
          </div>
          <div className="flex items-center gap-1.5 text-purple-500 font-medium">
            <span>AI가 닉네임을 만들고 있어요</span>
            <span className="loading-dot">.</span>
            <span className="loading-dot">.</span>
            <span className="loading-dot">.</span>
          </div>
          <p className="text-sm text-gray-400">캐릭터 카드도 함께 생성 중!</p>
        </div>
      );
    }

    // ========================================
    // 🧠 Mood Options
    // ========================================
    const MOOD_OPTIONS = [
      { id: 'cool', label: '멋진 🔥' },
      { id: 'pretty', label: '예쁜 🌸' },
      { id: 'funny', label: '재밌는 😂' },
      { id: 'cute', label: '귀여운 🐰' },
      { id: 'dark', label: '다크 🖤' },
      { id: 'mysterious', label: '신비로운 🔮' },
      { id: 'powerful', label: '강한 ⚔️' },
      { id: 'chill', label: '편안한 ☁️' },
    ];

    // ========================================
    // 🃏 Character Card Color Mapping
    // ========================================
    const cardGradients = {
      red: { from: '#fecaca', to: '#fca5a5', border: '#f87171', text: '#991b1b', accent: '#ef4444' },
      blue: { from: '#bfdbfe', to: '#93c5fd', border: '#60a5fa', text: '#1e3a5f', accent: '#3b82f6' },
      purple: { from: '#ddd6fe', to: '#c4b5fd', border: '#a78bfa', text: '#4c1d95', accent: '#8b5cf6' },
      pink: { from: '#fbcfe8', to: '#f9a8d4', border: '#f472b6', text: '#831843', accent: '#ec4899' },
      amber: { from: '#fde68a', to: '#fcd34d', border: '#fbbf24', text: '#78350f', accent: '#f59e0b' },
      emerald: { from: '#a7f3d0', to: '#6ee7b7', border: '#34d399', text: '#064e3b', accent: '#10b981' },
      cyan: { from: '#a5f3fc', to: '#67e8f9', border: '#22d3ee', text: '#164e63', accent: '#06b6d4' },
      violet: { from: '#ddd6fe', to: '#c4b5fd', border: '#a78bfa', text: '#4c1d95', accent: '#7c3aed' },
      rose: { from: '#fecdd3', to: '#fda4af', border: '#fb7185', text: '#881337', accent: '#f43f5e' },
      indigo: { from: '#c7d2fe', to: '#a5b4fc', border: '#818cf8', text: '#312e81', accent: '#6366f1' },
      teal: { from: '#99f6e4', to: '#5eead4', border: '#2dd4bf', text: '#134e4a', accent: '#14b8a6' },
      orange: { from: '#fed7aa', to: '#fdba74', border: '#fb923c', text: '#7c2d12', accent: '#f97316' },
    };

    // ========================================
    // 📄 Page Components
    // ========================================
    function NicknameCard({ item, index, onCopy, expanded, onToggle }) {
      const { nickname, tag, description, character } = item;
      const tagColorMap = { '성격 기반': 'purple', '취미 기반': 'pink', '특이사항': 'emerald', '영한 믹스': 'blue', '종합': 'amber' };
      const badgeColor = tagColorMap[tag] || 'purple';
      const grad = cardGradients[character?.color] || cardGradients.purple;

      return (
        <div className="animate-card-flip card-hover" style={{ animationDelay: `${index * 100}ms` }}>
          <div className="bg-white rounded-2xl shadow-lg border border-purple-50 hover:border-purple-200 overflow-hidden">
            {/* 닉네임 헤더 */}
            <div className="p-5">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <Badge color={badgeColor}>{tag}</Badge>
                  <p className="mt-2 text-xl font-black text-gray-800 break-all leading-snug">
                    {nickname}
                  </p>
                  {description && (
                    <p className="mt-1.5 text-xs text-gray-400 leading-relaxed">{description}</p>
                  )}
                </div>
                <button onClick={() => onCopy(nickname)}
                  className="copy-btn flex-shrink-0 mt-1 p-2.5 rounded-xl text-gray-300 hover:text-purple-500 hover:bg-purple-50 transition-colors"
                  title="복사하기">
                  <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>

              {/* 캐릭터 카드 토글 버튼 */}
              {character && (
                <button onClick={onToggle}
                  className="mt-3 w-full text-center text-xs font-medium py-1.5 rounded-lg transition-colors cursor-pointer"
                  style={{ color: grad.accent, backgroundColor: grad.from + '60' }}>
                  {expanded ? '캐릭터 카드 접기 ▲' : '캐릭터 카드 보기 ▼'}
                </button>
              )}
            </div>

            {/* 캐릭터 카드 (펼쳤을 때) */}
            {expanded && character && (
              <div className="px-4 pb-4">
                <div className="rounded-xl p-4 relative overflow-hidden"
                  style={{ background: `linear-gradient(145deg, ${grad.from}, ${grad.to})`, border: `2px solid ${grad.border}` }}>
                  {/* 배경 이모지 */}
                  <div className="absolute top-2 right-3 text-5xl opacity-15 select-none">{character.emoji}</div>

                  {/* 이모지 + 칭호 */}
                  <div className="flex items-center gap-2 mb-3">
                    <span className="text-3xl">{character.emoji}</span>
                    <div>
                      <p className="text-base font-black" style={{ color: grad.text }}>{nickname}</p>
                      <p className="text-xs font-semibold" style={{ color: grad.accent }}>{character.title}</p>
                    </div>
                  </div>

                  {/* 스탯들 */}
                  <div className="space-y-1.5 text-xs" style={{ color: grad.text }}>
                    <div className="flex gap-2">
                      <span className="font-bold opacity-70 w-10 flex-shrink-0">성격</span>
                      <span className="font-medium">{character.personality}</span>
                    </div>
                    <div className="flex gap-2">
                      <span className="font-bold opacity-70 w-10 flex-shrink-0">특기</span>
                      <span className="font-medium">{character.skill}</span>
                    </div>
                  </div>

                  {/* 대사 */}
                  <div className="mt-3 pt-3 border-t" style={{ borderColor: grad.border + '40' }}>
                    <p className="text-xs italic font-medium" style={{ color: grad.text + 'cc' }}>
                      {character.quote}
                    </p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [name, setName] = useState('');
      const [personality, setPersonality] = useState('');
      const [hobbies, setHobbies] = useState('');
      const [special, setSpecial] = useState('');
      const [moods, setMoods] = useState([]);
      const [nicknames, setNicknames] = useState([]);
      const [generated, setGenerated] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [toastVisible, setToastVisible] = useState(false);
      const [renderKey, setRenderKey] = useState(0);
      const [expandedCards, setExpandedCards] = useState({});
      const resultRef = useRef(null);

      const toggleMood = useCallback((moodId) => {
        setMoods(prev => prev.includes(moodId) ? prev.filter(m => m !== moodId) : [...prev, moodId]);
      }, []);

      const toggleCard = useCallback((index) => {
        setExpandedCards(prev => ({ ...prev, [index]: !prev[index] }));
      }, []);

      const handleGenerate = useCallback(async () => {
        if (!name.trim() || loading) return;
        setLoading(true);
        setError('');
        setExpandedCards({});

        try {
          const res = await fetch(`${API_BASE_URL}/api/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, personality, hobbies, special, moods }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || '서버 오류가 발생했습니다.');
          }

          setNicknames(data.nicknames);
          setGenerated(true);
          setRenderKey(k => k + 1);
          setTimeout(() => {
            resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [name, personality, hobbies, special, moods, loading]);

      const handleCopy = useCallback(async (text) => {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        setToastVisible(true);
        setTimeout(() => setToastVisible(false), 2000);
      }, []);

      const handleReset = useCallback(() => {
        setNicknames([]);
        setGenerated(false);
        setName('');
        setPersonality('');
        setHobbies('');
        setSpecial('');
        setMoods([]);
        setError('');
        setExpandedCards({});
      }, []);

      const expandAll = useCallback(() => {
        const all = {};
        nicknames.forEach((_, i) => { all[i] = true; });
        setExpandedCards(all);
      }, [nicknames]);

      const collapseAll = useCallback(() => {
        setExpandedCards({});
      }, []);

      const canGenerate = name.trim().length > 0 && !loading;

      return (
        <div className="min-h-screen pb-16">
          {/* Header */}
          <header className="pt-10 pb-6 text-center px-4">
            <div className="animate-float inline-block text-5xl mb-3">✨</div>
            <h1 className="text-4xl sm:text-5xl font-black gradient-text leading-tight">
              AI 닉네임 생성기
            </h1>
            <p className="mt-3 text-gray-400 text-sm sm:text-base">
              AI가 만드는 나만의 특별한 닉네임 + 캐릭터 카드!
            </p>
          </header>

          {/* Input Form */}
          <main className="max-w-3xl mx-auto px-4">
            <Card className="p-6 sm:p-8 border border-purple-100">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <Input label="이름" icon="👤" value={name} onChange={setName} placeholder="예: 김철수" />
                <Input label="성격" icon="💫" value={personality} onChange={setPersonality} placeholder="예: 활발한, 조용한" />
                <Input label="취미" icon="🎯" value={hobbies} onChange={setHobbies} placeholder="예: 게임, 독서, 운동" />
                <Input label="특이사항" icon="🌟" value={special} onChange={setSpecial} placeholder="예: 고양이 좋아함" />
              </div>

              {/* 닉네임 느낌 선택 */}
              <div className="mt-5">
                <label className="block text-sm font-semibold text-gray-600 ml-1 mb-2">
                  🎨 어떤 느낌의 닉네임? <span className="text-gray-400 font-normal">(복수 선택 가능)</span>
                </label>
                <div className="flex flex-wrap gap-2">
                  {MOOD_OPTIONS.map(mood => {
                    const selected = moods.includes(mood.id);
                    return (
                      <button key={mood.id} onClick={() => toggleMood(mood.id)}
                        className={`px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 cursor-pointer border-2 ${
                          selected
                            ? 'bg-gradient-to-r from-violet-500 to-pink-500 text-white border-transparent shadow-md scale-105'
                            : 'bg-white/70 text-gray-500 border-purple-100 hover:border-purple-300 hover:text-purple-600 hover:bg-purple-50'
                        }`}>
                        {mood.label}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* 에러 메시지 */}
              {error && (
                <div className="mt-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm">
                  {error}
                </div>
              )}

              <div className="mt-6 flex flex-col sm:flex-row gap-3">
                <Button onClick={handleGenerate} size="lg" disabled={!canGenerate}
                  className="flex-1 text-center justify-center">
                  {loading ? '생성 중...' : (generated ? '🔄 다시 만들기' : '🎲 닉네임 만들기')}
                </Button>
                {generated && !loading && (
                  <Button variant="secondary" size="lg" onClick={handleReset}>
                    초기화
                  </Button>
                )}
              </div>
            </Card>

            {/* Loading */}
            {loading && <LoadingSpinner />}

            {/* Results */}
            {generated && !loading && nicknames.length > 0 && (
              <section ref={resultRef} className="mt-8">
                <div className="flex items-center justify-between mb-5 px-1">
                  <h2 className="text-xl font-bold text-gray-700">
                    🎉 <span className="text-purple-600">{name}</span>님을 위한 닉네임
                  </h2>
                  <div className="flex items-center gap-2">
                    <button onClick={expandAll}
                      className="text-xs text-purple-400 hover:text-purple-600 cursor-pointer transition-colors">
                      전체 펼치기
                    </button>
                    <span className="text-gray-300">|</span>
                    <button onClick={collapseAll}
                      className="text-xs text-purple-400 hover:text-purple-600 cursor-pointer transition-colors">
                      전체 접기
                    </button>
                  </div>
                </div>
                <div key={renderKey} className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {nicknames.map((item, i) => (
                    <NicknameCard
                      key={`${renderKey}-${i}`}
                      item={item}
                      index={i}
                      onCopy={handleCopy}
                      expanded={!!expandedCards[i]}
                      onToggle={() => toggleCard(i)}
                    />
                  ))}
                </div>
              </section>
            )}
          </main>

          {/* Footer */}
          <footer className="mt-16 text-center text-xs text-gray-300 pb-8">
            Powered by OpenAI + React + Tailwind CSS
          </footer>

          <Toast message="복사됨!" visible={toastVisible} />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
