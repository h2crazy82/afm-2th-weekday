<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rael - Your Hip English Teacher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 3px; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .dot-1 { animation: dotPulse 1.4s infinite 0s; }
    .dot-2 { animation: dotPulse 1.4s infinite 0.2s; }
    .dot-3 { animation: dotPulse 1.4s infinite 0.4s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="bg-purple-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const API_BASE_URL = window.location.origin;

    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2 mb-4 fade-in">
          <div className="w-9 h-9 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-base flex-shrink-0 shadow-md">
            R
          </div>
          <div className="bg-white rounded-2xl rounded-bl-md px-4 py-3 shadow-sm">
            <div className="flex gap-1.5">
              <div className="w-2 h-2 bg-purple-400 rounded-full dot-1"></div>
              <div className="w-2 h-2 bg-pink-400 rounded-full dot-2"></div>
              <div className="w-2 h-2 bg-purple-400 rounded-full dot-3"></div>
            </div>
          </div>
        </div>
      );
    }

    function ChatBubble({ message }) {
      const isUser = message.role === 'user';
      return (
        <div className={`flex items-end gap-2 mb-4 fade-in ${isUser ? 'flex-row-reverse' : ''}`}>
          {!isUser && (
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-base font-bold flex-shrink-0 shadow-md">
              R
            </div>
          )}
          <div
            className={`max-w-[75%] rounded-2xl px-4 py-3 shadow-sm whitespace-pre-wrap leading-relaxed text-sm ${
              isUser
                ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-br-md'
                : 'bg-white text-slate-700 rounded-bl-md'
            }`}
          >
            {message.content}
          </div>
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([
        {
          role: 'assistant',
          content: "Heyyyy what's good! I'm Rael, your English teacher! But like, the cool kind, not the boring kind lol\n\nWhether you're just starting out or tryna level up, I got you bestie! We're gonna make learning English fun, no cap.\n\nSo tell me — what's your name and what brings you here today?",
        },
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const chatEndRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      const sendMessage = async () => {
        const text = input.trim();
        if (!text || loading) return;

        const userMsg = { role: 'user', content: text };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput('');
        setLoading(true);

        try {
          const res = await fetch(`${API_BASE_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: newMessages.map(m => ({ role: m.role, content: m.content })) }),
          });

          const data = await res.json();
          if (data.error) throw new Error(data.error);
          setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
        } catch (err) {
          setMessages(prev => [
            ...prev,
            { role: 'assistant', content: `Oof, something went wrong bestie... 😅\n\n${err.message}` },
          ]);
        } finally {
          setLoading(false);
          inputRef.current?.focus();
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const resetChat = () => {
        setMessages([
          {
            role: 'assistant',
            content: "Fresh start, let's gooo! New convo, new energy!\n\nWhat do you wanna learn about today, bestie?",
          },
        ]);
      };

      return (
        <div className="h-screen flex flex-col bg-gradient-to-b from-purple-50 via-pink-50 to-white">
          {/* Header */}
          <header className="bg-white/80 backdrop-blur-md border-b border-purple-100 px-4 py-3 flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-3">
              <div className="w-11 h-11 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-white text-lg font-bold shadow-md">
                R
              </div>
              <div>
                <h1 className="font-bold text-slate-800 text-lg">Rael</h1>
                <p className="text-xs text-purple-500 font-medium">Your Hip English Teacher</p>
              </div>
            </div>
            <button
              onClick={resetChat}
              className="text-sm text-purple-600 hover:text-purple-800 bg-purple-50 hover:bg-purple-100 px-3 py-1.5 rounded-lg transition-colors font-medium"
            >
              New Chat
            </button>
          </header>

          {/* Chat Area */}
          <div className="flex-1 overflow-y-auto chat-scroll px-4 py-6">
            <div className="max-w-2xl mx-auto">
              {/* Welcome Banner */}
              <div className="text-center mb-6">
                <div className="inline-block bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-xl px-4 py-2 text-xs text-purple-600">
                  Talk to Rael in English or Korean — she'll help you either way!
                </div>
              </div>

              {messages.map((msg, i) => (
                <ChatBubble key={i} message={msg} />
              ))}
              {loading && <TypingIndicator />}
              <div ref={chatEndRef} />
            </div>
          </div>

          {/* Input Area */}
          <div className="bg-white/80 backdrop-blur-md border-t border-purple-100 px-4 py-3">
            <div className="max-w-2xl mx-auto flex gap-2">
              <textarea
                ref={inputRef}
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Type anything — English, Korean, whatever you feel!"
                rows={1}
                className="flex-1 resize-none rounded-xl border border-purple-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent placeholder:text-slate-400"
              />
              <button
                onClick={sendMessage}
                disabled={!input.trim() || loading}
                className="bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 disabled:from-slate-300 disabled:to-slate-300 text-white rounded-xl px-5 py-3 text-sm font-medium transition-all flex-shrink-0 shadow-md hover:shadow-lg disabled:shadow-none"
              >
                Send
              </button>
            </div>
            <p className="text-center text-xs text-slate-400 mt-2">
              Enter to send · Shift+Enter for new line
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
