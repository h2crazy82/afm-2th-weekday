<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunny - Rael's English Teacher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 3px; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .dot-1 { animation: dotPulse 1.4s infinite 0s; }
    .dot-2 { animation: dotPulse 1.4s infinite 0.2s; }
    .dot-3 { animation: dotPulse 1.4s infinite 0.4s; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="bg-yellow-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const API_BASE_URL = window.location.origin;

    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2 mb-4 fade-in">
          <div className="w-9 h-9 rounded-full bg-gradient-to-br from-yellow-400 to-orange-400 flex items-center justify-center text-white text-base flex-shrink-0 shadow-md">
            S
          </div>
          <div className="bg-white rounded-2xl rounded-bl-md px-4 py-3 shadow-sm">
            <div className="flex gap-1.5">
              <div className="w-2 h-2 bg-yellow-400 rounded-full dot-1"></div>
              <div className="w-2 h-2 bg-orange-400 rounded-full dot-2"></div>
              <div className="w-2 h-2 bg-yellow-400 rounded-full dot-3"></div>
            </div>
          </div>
        </div>
      );
    }

    function ChatBubble({ message }) {
      const isUser = message.role === 'user';
      const hasImages = message.images && message.images.length > 0;
      return (
        <div className={`flex items-end gap-2 mb-4 fade-in ${isUser ? 'flex-row-reverse' : ''}`}>
          {!isUser && (
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-yellow-400 to-orange-400 flex items-center justify-center text-white text-base font-bold flex-shrink-0 shadow-md">
              R
            </div>
          )}
          <div
            className={`max-w-[75%] rounded-2xl px-4 py-3 shadow-sm whitespace-pre-wrap leading-relaxed text-sm ${
              isUser
                ? 'bg-gradient-to-r from-yellow-400 to-orange-500 text-white rounded-br-md'
                : 'bg-white text-slate-700 rounded-bl-md'
            }`}
          >
            {hasImages && (
              <div className={`grid gap-1.5 mb-2 ${message.images.length === 1 ? 'grid-cols-1' : message.images.length <= 4 ? 'grid-cols-2' : 'grid-cols-3'}`}>
                {message.images.map((img, idx) => (
                  <img key={idx} src={img} alt={`attached ${idx + 1}`} className="w-full rounded-lg max-h-40 object-cover" />
                ))}
              </div>
            )}
            {message.displayText || message.content}
          </div>
        </div>
      );
    }

    function App() {
      const [messages, setMessages] = useState([
        {
          role: 'assistant',
          content: "Hi Rael! I'm Sunny, your English teacher! Nice to meet you!\n\nWe're going to have so much fun learning English together! Are you ready?\n\nTell me — what do you want to learn today? You can talk to me in Korean or English!",
        },
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [images, setImages] = useState([]);
      const chatEndRef = useRef(null);
      const inputRef = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      const handleImageSelect = (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        const remaining = 20 - images.length;
        const toAdd = files.slice(0, remaining);
        toAdd.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setImages(prev => {
              if (prev.length >= 20) return prev;
              return [...prev, ev.target.result];
            });
          };
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      };

      const removeImage = (index) => {
        setImages(prev => prev.filter((_, i) => i !== index));
      };

      const sendMessage = async () => {
        const text = input.trim();
        if ((!text && images.length === 0) || loading) return;

        const userMsg = {
          role: 'user',
          content: text || '(images)',
          displayText: text || '',
          images: [...images],
        };

        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput('');
        setImages([]);
        setLoading(true);

        try {
          const apiMessages = newMessages.map(m => {
            if (m.images && m.images.length > 0) {
              const parts = m.images.map(img => ({
                type: 'image_url',
                image_url: { url: img },
              }));
              parts.push({ type: 'text', text: m.displayText || 'What do you see in these images? Help me learn English with them!' });
              return { role: m.role, content: parts };
            }
            return { role: m.role, content: typeof m.content === 'string' ? m.content : m.content };
          });

          const res = await fetch(`${API_BASE_URL}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: apiMessages }),
          });

          const data = await res.json();
          if (data.error) throw new Error(data.error);
          setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
        } catch (err) {
          setMessages(prev => [
            ...prev,
            { role: 'assistant', content: `Oops! Something went wrong... Let's try again! 😅\n\n${err.message}` },
          ]);
        } finally {
          setLoading(false);
          inputRef.current?.focus();
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      const resetChat = () => {
        setMessages([
          {
            role: 'assistant',
            content: "New class time! Let's learn something fun today!\n\nWhat do you want to talk about, Rael?",
          },
        ]);
      };

      return (
        <div className="h-screen flex flex-col bg-gradient-to-b from-yellow-50 via-orange-50 to-white">
          {/* Header */}
          <header className="bg-white/80 backdrop-blur-md border-b border-yellow-200 px-4 py-3 flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-3">
              <div className="w-11 h-11 rounded-full bg-gradient-to-br from-yellow-400 to-orange-400 flex items-center justify-center text-white text-lg font-bold shadow-md">
                R
              </div>
              <div>
                <h1 className="font-bold text-slate-800 text-lg">Sunny</h1>
                <p className="text-xs text-orange-500 font-medium">Rael's English Teacher</p>
              </div>
            </div>
            <button
              onClick={resetChat}
              className="text-sm text-orange-600 hover:text-orange-700 bg-yellow-50 hover:bg-yellow-100 px-3 py-1.5 rounded-lg transition-colors font-medium"
            >
              New Chat
            </button>
          </header>

          {/* Chat Area */}
          <div className="flex-1 overflow-y-auto chat-scroll px-4 py-6">
            <div className="max-w-2xl mx-auto">
              {/* Welcome Banner */}
              <div className="text-center mb-6">
                <div className="inline-block bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-300 rounded-xl px-4 py-2 text-xs text-orange-600">
                  Talk to Sunny in English or Korean — she'll help you learn!
                </div>
              </div>

              {messages.map((msg, i) => (
                <ChatBubble key={i} message={msg} />
              ))}
              {loading && <TypingIndicator />}
              <div ref={chatEndRef} />
            </div>
          </div>

          {/* Input Area */}
          <div className="bg-white/80 backdrop-blur-md border-t border-yellow-200 px-4 py-3">
            <div className="max-w-2xl mx-auto">
              {/* Image Previews */}
              {images.length > 0 && (
                <div className="mb-2 flex flex-wrap gap-2">
                  {images.map((img, idx) => (
                    <div key={idx} className="relative inline-block">
                      <img src={img} alt={`preview ${idx + 1}`} className="h-16 w-16 rounded-lg border border-yellow-300 object-cover" />
                      <button
                        onClick={() => removeImage(idx)}
                        className="absolute -top-2 -right-2 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600 shadow"
                      >
                        x
                      </button>
                    </div>
                  ))}
                  <span className="self-end text-xs text-orange-400">{images.length}/20</span>
                </div>
              )}
              <div className="flex gap-2">
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="image/*"
                  multiple
                  onChange={handleImageSelect}
                  className="hidden"
                />
                <button
                  onClick={() => fileInputRef.current?.click()}
                  className="flex-shrink-0 w-11 h-11 rounded-xl border border-yellow-300 flex items-center justify-center text-orange-500 hover:bg-yellow-50 hover:border-yellow-400 transition-colors"
                  title="Attach image"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                </button>
                <textarea
                  ref={inputRef}
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="Write in English or Korean!"
                  rows={1}
                  className="flex-1 resize-none rounded-xl border border-yellow-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent placeholder:text-slate-400"
                />
                <button
                  onClick={sendMessage}
                  disabled={(!input.trim() && images.length === 0) || loading}
                  className="bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 disabled:from-slate-300 disabled:to-slate-300 text-white rounded-xl px-5 py-3 text-sm font-medium transition-all flex-shrink-0 shadow-md hover:shadow-lg disabled:shadow-none"
                >
                  Send
                </button>
              </div>
            </div>
            <p className="text-center text-xs text-slate-400 mt-2">
              Enter to send · Shift+Enter for new line
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
