<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo } = React;

    // ========================================
    // 2. Design System Components
    // ========================================

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "", type = "button" }) {
      const baseStyles = "inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed";

      const variants = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500",
        secondary: "bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-400",
        danger: "bg-red-500 text-white hover:bg-red-600 focus:ring-red-400",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 focus:ring-gray-300",
      };

      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-4 py-2 text-base",
        lg: "px-6 py-3 text-lg",
      };

      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`${baseStyles} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ type = "text", label, value, onChange, placeholder, error, disabled = false, className = "", onKeyDown }) {
      return (
        <div className={`w-full ${className}`}>
          {label && (
            <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            onKeyDown={onKeyDown}
            placeholder={placeholder}
            disabled={disabled}
            className={`w-full px-4 py-2 border rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100 disabled:cursor-not-allowed ${
              error ? "border-red-500" : "border-gray-300"
            }`}
            aria-invalid={!!error}
            aria-describedby={error ? "input-error" : undefined}
          />
          {error && (
            <p id="input-error" className="mt-1 text-sm text-red-500">{error}</p>
          )}
        </div>
      );
    }

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-gray-100 p-6 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 3. Page Components
    // ========================================

    function TodoPage() {
      const [todos, setTodos] = useState([]);
      const [inputValue, setInputValue] = useState("");

      // Fetch todos from API on mount
      useEffect(() => {
        fetch("/api/todos")
          .then((res) => res.json())
          .then((json) => {
            if (json.success) setTodos(json.data);
          })
          .catch((err) => console.error("Failed to load todos:", err));
      }, []);

      const remainingCount = useMemo(
        () => todos.filter((t) => !t.done).length,
        [todos]
      );

      const handleAdd = useCallback(() => {
        const text = inputValue.trim();
        if (!text) return;
        fetch("/api/todos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ task: text }),
        })
          .then((res) => res.json())
          .then((json) => {
            if (json.success) setTodos((prev) => [...prev, json.data]);
          })
          .catch((err) => console.error("Failed to add todo:", err));
        setInputValue("");
      }, [inputValue]);

      const handleKeyDown = useCallback(
        (e) => {
          if (e.key === "Enter") handleAdd();
        },
        [handleAdd]
      );

      const handleToggle = useCallback((id) => {
        const todo = todos.find((t) => t.id === id);
        if (!todo) return;
        fetch(`/api/todos/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ done: !todo.done }),
        })
          .then((res) => res.json())
          .then((json) => {
            if (json.success) {
              setTodos((prev) =>
                prev.map((t) => (t.id === id ? json.data : t))
              );
            }
          })
          .catch((err) => console.error("Failed to toggle todo:", err));
      }, [todos]);

      const handleDelete = useCallback((id) => {
        fetch(`/api/todos/${id}`, { method: "DELETE" })
          .then((res) => res.json())
          .then((json) => {
            if (json.success) {
              setTodos((prev) => prev.filter((t) => t.id !== id));
            }
          })
          .catch((err) => console.error("Failed to delete todo:", err));
      }, []);

      return (
        <div className="max-w-lg mx-auto px-4 py-10 sm:py-16">
          <h1 className="text-3xl font-bold text-center text-gray-800 mb-8">
            Todo
          </h1>

          <Card className="mb-6">
            <div className="flex gap-2">
              <Input
                value={inputValue}
                onChange={(e) => setInputValue(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="할 일을 입력하세요"
              />
              <Button onClick={handleAdd} disabled={!inputValue.trim()} className="shrink-0">
                추가
              </Button>
            </div>
          </Card>

          <Card>
            {todos.length === 0 ? (
              <p className="text-center text-gray-400 py-8">
                등록된 할 일이 없습니다.
              </p>
            ) : (
              <ul className="divide-y divide-gray-100" role="list">
                {todos.map((todo) => (
                  <li
                    key={todo.id}
                    className="flex items-center gap-3 py-3 group"
                  >
                    <input
                      type="checkbox"
                      checked={todo.done}
                      onChange={() => handleToggle(todo.id)}
                      className="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer shrink-0"
                      aria-label={`${todo.task} 완료 여부`}
                    />
                    <span
                      className={`flex-1 break-all ${
                        todo.done
                          ? "line-through text-gray-400"
                          : "text-gray-800"
                      }`}
                    >
                      {todo.task}
                    </span>
                    <Button
                      variant="ghost"
                      size="sm"
                      onClick={() => handleDelete(todo.id)}
                      className="opacity-0 group-hover:opacity-100 sm:opacity-100 text-red-400 hover:text-red-600 hover:bg-red-50"
                      aria-label={`${todo.task} 삭제`}
                    >
                      삭제
                    </Button>
                  </li>
                ))}
              </ul>
            )}

            {todos.length > 0 && (
              <p className="text-sm text-gray-500 mt-4 pt-4 border-t border-gray-100">
                남은 할 일: {remainingCount}개
              </p>
            )}
          </Card>
        </div>
      );
    }

    // ========================================
    // 4. App Component
    // ========================================

    function App() {
      return <TodoPage />;
    }

    // ========================================
    // 5. Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
