<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .todo-enter { animation: slideIn 0.2s ease-out; }
    .todo-exit { animation: slideOut 0.15s ease-in forwards; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateX(20px); }
    }
  </style>
</head>
<body class="bg-stone-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ========================================
    // API Helper
    // ========================================
    const api = {
      async getUsers() {
        const res = await fetch('/api/users');
        const json = await res.json();
        return json.data;
      },
      async createUser(name) {
        const res = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const json = await res.json();
        return json.data;
      },
      async getTodos(userId) {
        const res = await fetch(`/api/todos?user_id=${userId}`);
        const json = await res.json();
        return json.data;
      },
      async createTodo(userId, text) {
        const res = await fetch('/api/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, text }),
        });
        const json = await res.json();
        return json.data;
      },
      async toggleTodo(id, done) {
        const res = await fetch(`/api/todos/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done }),
        });
        const json = await res.json();
        return json.data;
      },
      async deleteTodo(id) {
        await fetch(`/api/todos/${id}`, { method: 'DELETE' });
      },
    };

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [users, setUsers] = useState([]);
      const [selectedUserId, setSelectedUserId] = useState(null);
      const [newUserName, setNewUserName] = useState('');
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState('');
      const [removing, setRemoving] = useState(null);
      const [loading, setLoading] = useState(false);
      const inputRef = useRef(null);

      // Load users on mount
      useEffect(() => {
        api.getUsers().then(setUsers);
      }, []);

      // Load todos when user changes
      useEffect(() => {
        if (!selectedUserId) {
          setTodos([]);
          return;
        }
        setLoading(true);
        api.getTodos(selectedUserId).then(data => {
          setTodos(data);
          setLoading(false);
        });
      }, [selectedUserId]);

      const handleCreateUser = async () => {
        const name = newUserName.trim();
        if (!name) return;
        const user = await api.createUser(name);
        setUsers(prev => [user, ...prev]);
        setSelectedUserId(user.id);
        setNewUserName('');
      };

      const addTodo = async () => {
        const text = input.trim();
        if (!text || !selectedUserId) return;
        const todo = await api.createTodo(selectedUserId, text);
        setTodos(prev => [todo, ...prev]);
        setInput('');
        inputRef.current?.focus();
      };

      const toggleTodo = async (id, currentDone) => {
        const updated = await api.toggleTodo(id, !currentDone);
        setTodos(prev => prev.map(t => t.id === id ? updated : t));
      };

      const deleteTodo = (id) => {
        setRemoving(id);
        setTimeout(async () => {
          await api.deleteTodo(id);
          setTodos(prev => prev.filter(t => t.id !== id));
          setRemoving(null);
        }, 150);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') addTodo();
      };

      const handleUserKeyDown = (e) => {
        if (e.key === 'Enter') handleCreateUser();
      };

      const doneCount = todos.filter(t => t.done).length;
      const totalCount = todos.length;
      const selectedUser = users.find(u => u.id === selectedUserId);

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          <header className="mb-8">
            <h1 className="text-2xl font-semibold text-stone-800">Todo</h1>
            {selectedUser && totalCount > 0 && (
              <p className="text-sm text-stone-400 mt-1">
                {doneCount}/{totalCount} completed
              </p>
            )}
          </header>

          {/* User Section */}
          <div className="mb-8 p-4 bg-white rounded-xl border border-stone-200">
            <label className="block text-xs font-medium text-stone-500 mb-2 uppercase tracking-wide">User</label>
            <div className="flex gap-2 mb-3">
              <select
                value={selectedUserId || ''}
                onChange={e => setSelectedUserId(e.target.value ? Number(e.target.value) : null)}
                className="flex-1 px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-stone-700 text-sm focus:outline-none focus:border-stone-400 transition-colors"
              >
                <option value="">-- Select user --</option>
                {users.map(u => (
                  <option key={u.id} value={u.id}>{u.name}</option>
                ))}
              </select>
            </div>
            <div className="flex gap-2">
              <input
                type="text"
                value={newUserName}
                onChange={e => setNewUserName(e.target.value)}
                onKeyDown={handleUserKeyDown}
                placeholder="New user name..."
                className="flex-1 px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-stone-700 text-sm placeholder:text-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
              />
              <button
                onClick={handleCreateUser}
                disabled={!newUserName.trim()}
                className="px-4 py-2 bg-stone-700 text-white rounded-lg text-sm font-medium hover:bg-stone-600 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
              >
                Create
              </button>
            </div>
          </div>

          {/* Show todo UI only when a user is selected */}
          {selectedUserId ? (
            <>
              {/* Input */}
              <div className="flex gap-2 mb-8">
                <input
                  ref={inputRef}
                  type="text"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="Add a new task..."
                  className="flex-1 px-4 py-3 bg-white border border-stone-200 rounded-xl text-stone-800 placeholder:text-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
                />
                <button
                  onClick={addTodo}
                  disabled={!input.trim()}
                  className="px-5 py-3 bg-stone-800 text-white rounded-xl font-medium hover:bg-stone-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
                >
                  Add
                </button>
              </div>

              {/* Todo List */}
              {loading ? (
                <div className="text-center py-16 text-stone-300">
                  <p className="text-sm">Loading...</p>
                </div>
              ) : totalCount === 0 ? (
                <div className="text-center py-16 text-stone-300">
                  <p className="text-4xl mb-3">+</p>
                  <p className="text-sm">Add your first task</p>
                </div>
              ) : (
                <ul className="space-y-2">
                  {todos.map(todo => (
                    <li
                      key={todo.id}
                      className={`group flex items-center gap-3 px-4 py-3 bg-white rounded-xl border border-stone-100 hover:border-stone-200 transition-all ${
                        removing === todo.id ? 'todo-exit' : 'todo-enter'
                      }`}
                    >
                      {/* Checkbox */}
                      <button
                        onClick={() => toggleTodo(todo.id, todo.done)}
                        className={`flex-shrink-0 w-5 h-5 rounded-full border-2 transition-all flex items-center justify-center ${
                          todo.done
                            ? 'bg-stone-800 border-stone-800'
                            : 'border-stone-300 hover:border-stone-400'
                        }`}
                        aria-label={todo.done ? 'Mark incomplete' : 'Mark complete'}
                      >
                        {todo.done && (
                          <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                            <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                          </svg>
                        )}
                      </button>

                      {/* Text */}
                      <span
                        className={`flex-1 text-sm transition-all ${
                          todo.done ? 'text-stone-300 line-through' : 'text-stone-700'
                        }`}
                      >
                        {todo.text}
                      </span>

                      {/* Delete */}
                      <button
                        onClick={() => deleteTodo(todo.id)}
                        className="opacity-0 group-hover:opacity-100 flex-shrink-0 p-1 text-stone-300 hover:text-red-400 transition-all"
                        aria-label="Delete task"
                      >
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </>
          ) : (
            <div className="text-center py-16 text-stone-300">
              <p className="text-sm">Select or create a user to get started</p>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
