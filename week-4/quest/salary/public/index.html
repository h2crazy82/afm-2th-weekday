<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>월급 비교소</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --panel2: #f1f5f9;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #0284c7;
        --accent2: #db2777;
        --good: #16a34a;
        --bad: #dc2626;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }
      header h1 { margin: 0 0 4px; font-size: 28px; }
      header p { color: var(--muted); margin: 0 0 24px; }
      .grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 20px; }
      @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 6px 20px rgba(15, 23, 42, 0.05);
      }
      .card h2 { margin: 0 0 14px; font-size: 17px; }
      label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 6px; }
      input, select {
        width: 100%;
        padding: 10px 12px;
        background: var(--panel2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 14px;
      }
      input:focus, select:focus { outline: none; border-color: var(--accent); }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        background: var(--accent);
        color: #ffffff;
        border: 0;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { filter: brightness(1.08); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
      .stat {
        background: var(--panel2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        text-align: center;
      }
      .stat .label { color: var(--muted); font-size: 12px; }
      .stat .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
      .highlight { color: var(--accent); }
      .good { color: var(--good); }
      .bad { color: var(--bad); }
      .chart-box { background: var(--panel2); border-radius: 10px; padding: 12px; margin-top: 12px; }
      .muted { color: var(--muted); font-size: 13px; }
      .empty { color: var(--muted); padding: 30px 0; text-align: center; }
      .error { color: var(--bad); margin-top: 10px; font-size: 13px; min-height: 16px; }
      .tag {
        display: inline-block;
        padding: 4px 10px;
        background: var(--panel2);
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
      }
      .tip {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 12px 14px;
        border-radius: 10px;
        margin-top: 10px;
        border: 1px solid var(--border);
      }
      .tip.warn { background: #fef2f2; border-color: #fecaca; }
      .tip.good { background: #f0fdf4; border-color: #bbf7d0; }
      .tip .icon { font-size: 20px; line-height: 1; }
      .tip .body { flex: 1; }
      .tip .title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
      .tip .msg { font-size: 13px; color: var(--text); }
      .tip .delta { color: var(--bad); font-size: 12px; margin-left: 6px; }
      .section-title { font-size: 14px; margin: 18px 0 6px; color: var(--muted); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>💰 월급 비교소</h1>
        <p>익명으로 월급과 지출을 제출하면, 전체 평균과 내 위치를 비교해 드려요.</p>
      </header>

      <div class="grid">
        <section class="card">
          <h2>내 월급 입력</h2>
          <form id="form">
            <div class="row">
              <div>
                <label>월급 (만원)</label>
                <input id="salary" type="number" min="1" placeholder="예: 320" required />
              </div>
              <div>
                <label>연차</label>
                <input id="years" type="number" min="0" placeholder="예: 3" required />
              </div>
            </div>
            <label>직군</label>
            <select id="job" required>
              <option value="">선택하세요</option>
              <option>개발</option>
              <option>디자인</option>
              <option>기획/PM</option>
              <option>마케팅</option>
              <option>영업</option>
              <option>경영지원</option>
              <option>교육</option>
              <option>기타</option>
            </select>

            <label style="margin-top: 16px">카테고리별 월 지출 (만원)</label>
            <div class="cat-grid">
              <input data-cat="food" type="number" min="0" placeholder="식비" />
              <input data-cat="housing" type="number" min="0" placeholder="주거/관리비" />
              <input data-cat="transport" type="number" min="0" placeholder="교통" />
              <input data-cat="leisure" type="number" min="0" placeholder="여가/문화" />
              <input data-cat="saving" type="number" min="0" placeholder="저축/투자" />
              <input data-cat="etc" type="number" min="0" placeholder="기타" />
            </div>

            <button type="submit" id="submitBtn">제출하고 비교하기</button>
            <div class="error" id="err"></div>
          </form>
        </section>

        <section class="card">
          <h2>📊 비교 결과</h2>
          <div id="result">
            <div class="empty">왼쪽 폼에 입력하고 제출해 보세요.</div>
          </div>
        </section>
      </div>

      <section class="card" style="margin-top: 20px">
        <h2>🌐 전체 통계</h2>
        <div id="globalStats">
          <div class="empty">불러오는 중…</div>
        </div>
      </section>
    </div>

    <script>
      const CAT_LABEL = {
        food: '식비',
        housing: '주거/관리비',
        transport: '교통',
        leisure: '여가/문화',
        saving: '저축/투자',
        etc: '기타',
      };

      const charts = {};
      function renderChart(id, config) {
        if (charts[id]) charts[id].destroy();
        const ctx = document.getElementById(id);
        if (ctx) charts[id] = new Chart(ctx, config);
      }

      async function loadGlobalStats() {
        const box = document.getElementById('globalStats');
        try {
          const r = await fetch('/api/stats');
          const s = await r.json();
          if (!r.ok) throw new Error(s.error || 'stats error');

          if (!s.total) {
            box.innerHTML = '<div class="empty">아직 데이터가 없어요. 처음 제출자가 되어보세요!</div>';
            return;
          }

          box.innerHTML = `
            <div class="stats">
              <div class="stat"><div class="label">총 응답</div><div class="value">${s.total}명</div></div>
              <div class="stat"><div class="label">전체 평균</div><div class="value highlight">${s.overallAvg}만원</div></div>
              <div class="stat"><div class="label">최저 ~ 최고</div><div class="value">${s.min} ~ ${s.max}</div></div>
            </div>
            <div class="chart-box"><canvas id="distChart" height="110"></canvas></div>
            <div class="chart-box"><canvas id="jobChart" height="120"></canvas></div>
            <div class="chart-box"><canvas id="yearsChart" height="110"></canvas></div>
          `;

          renderChart('distChart', {
            type: 'bar',
            data: {
              labels: s.distribution.map((b) => b.label),
              datasets: [{
                label: '응답 수 (만원 구간)',
                data: s.distribution.map((b) => b.count),
                backgroundColor: '#0284c7',
                borderRadius: 6,
              }],
            },
            options: {
              plugins: { legend: { labels: { color: '#0f172a' } } },
              scales: {
                x: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' } },
                y: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' }, beginAtZero: true },
              },
            },
          });

          renderChart('jobChart', {
            type: 'bar',
            data: {
              labels: s.jobAverages.map((j) => `${j.job} (${j.count})`),
              datasets: [{
                label: '직군별 평균 월급 (만원)',
                data: s.jobAverages.map((j) => j.avg),
                backgroundColor: '#db2777',
                borderRadius: 6,
              }],
            },
            options: {
              indexAxis: 'y',
              plugins: { legend: { labels: { color: '#0f172a' } } },
              scales: {
                x: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' }, beginAtZero: true },
                y: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' } },
              },
            },
          });

          renderChart('yearsChart', {
            type: 'bar',
            data: {
              labels: s.yearsAverages.map((y) => `${y.bucket} (${y.count})`),
              datasets: [{
                label: '연차별 평균 월급 (만원)',
                data: s.yearsAverages.map((y) => y.avg),
                backgroundColor: '#7c3aed',
                borderRadius: 6,
              }],
            },
            options: {
              plugins: { legend: { labels: { color: '#0f172a' } } },
              scales: {
                x: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' } },
                y: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' }, beginAtZero: true },
              },
            },
          });
        } catch (e) {
          box.innerHTML = `<div class="empty">통계 로드 실패: ${e.message}</div>`;
        }
      }

      function readForm() {
        const salary = Number(document.getElementById('salary').value);
        const job = document.getElementById('job').value;
        const years = Number(document.getElementById('years').value);
        const expenses = {};
        document.querySelectorAll('[data-cat]').forEach((el) => {
          const v = Number(el.value);
          expenses[el.dataset.cat] = Number.isFinite(v) && v >= 0 ? v : 0;
        });
        return { salary, job, years, expenses };
      }

      function renderResult(c) {
        const el = document.getElementById('result');
        const diff = c.salary - c.overallAvg;
        const diffLabel = diff >= 0 ? `+${diff}만원` : `${diff}만원`;
        const diffClass = diff >= 0 ? 'good' : 'bad';

        const tipsHtml = c.tips && c.tips.length
          ? c.tips.map((t) => `
              <div class="tip warn">
                <div class="icon">⚠️</div>
                <div class="body">
                  <div class="title">${CAT_LABEL[t.category] || t.category}<span class="delta">평균 대비 +${t.diff}만원</span></div>
                  <div class="msg">${t.message}</div>
                </div>
              </div>`).join('')
          : '<div class="tip good"><div class="icon">🎉</div><div class="body"><div class="title">지출 관리 잘 하고 계세요</div><div class="msg">모든 카테고리가 평균 이하! 이 페이스 유지하세요.</div></div></div>';

        const goodHtml = (c.goodCats || [])
          .slice(0, 2)
          .map((g) => `
            <div class="tip good">
              <div class="icon">✅</div>
              <div class="body">
                <div class="title">${CAT_LABEL[g.category] || g.category}</div>
                <div class="msg">${g.message}</div>
              </div>
            </div>`).join('');

        el.innerHTML = `
          <div class="stats">
            <div class="stat"><div class="label">내 월급</div><div class="value highlight">${c.salary}만원</div></div>
            <div class="stat">
              <div class="label">전체 대비</div>
              <div class="value ${diffClass}">${diffLabel}</div>
            </div>
            <div class="stat">
              <div class="label">전체 상위</div>
              <div class="value highlight">${c.topPercent}%</div>
            </div>
          </div>
          <p class="muted">
            표본 ${c.sampleSize}명 중 ${c.pctBelow}%보다 많이 벌어요.
            ${c.job?.name ? `<span class="tag">${c.job.name} 상위 ${c.job.topPercent}% (평균 ${c.job.avg}만원)</span>` : ''}
            ${c.years?.bucket ? `<span class="tag">${c.years.bucket} 상위 ${c.years.topPercent}% (평균 ${c.years.avg}만원)</span>` : ''}
          </p>

          <div class="section-title">내 월급 vs 기준값</div>
          <div class="chart-box"><canvas id="posChart" height="140"></canvas></div>

          <div class="section-title">카테고리별 지출 (나 vs 평균)</div>
          <div class="chart-box"><canvas id="catChart" height="160"></canvas></div>

          <div class="section-title">💡 지출 팁</div>
          ${tipsHtml}
          ${goodHtml}
        `;

        renderChart('posChart', {
          type: 'bar',
          data: {
            labels: ['전체 평균', `${c.years?.bucket || '연차'} 평균`, `${c.job?.name || '직군'} 평균`, '내 월급'],
            datasets: [{
              label: '월급 (만원)',
              data: [c.overallAvg, c.years?.avg || 0, c.job?.avg || 0, c.salary],
              backgroundColor: ['#94a3b8', '#7c3aed', '#db2777', '#0284c7'],
              borderRadius: 6,
            }],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' } },
              y: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' }, beginAtZero: true },
            },
          },
        });

        const labels = c.categoryCompare.map((x) => CAT_LABEL[x.category] || x.category);
        const mineColors = c.categoryCompare.map((x) => (x.isOverAverage ? '#dc2626' : '#0284c7'));
        renderChart('catChart', {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: '나',
                data: c.categoryCompare.map((x) => x.mine),
                backgroundColor: mineColors,
                borderRadius: 6,
              },
              {
                label: '전체 평균',
                data: c.categoryCompare.map((x) => x.avg),
                backgroundColor: '#cbd5e1',
                borderRadius: 6,
              },
            ],
          },
          options: {
            plugins: { legend: { labels: { color: '#0f172a' } } },
            scales: {
              x: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' } },
              y: { ticks: { color: '#64748b' }, grid: { color: '#e2e8f0' }, beginAtZero: true },
            },
          },
        });
      }

      document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('err');
        const btn = document.getElementById('submitBtn');
        errEl.textContent = '';
        const payload = readForm();

        if (!payload.salary || !payload.job || !Number.isFinite(payload.years)) {
          errEl.textContent = '월급, 직군, 연차를 모두 입력해 주세요.';
          return;
        }

        btn.disabled = true;
        btn.textContent = '제출 중…';
        try {
          const saveRes = await fetch('/api/salaries', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const saveBody = await saveRes.json();
          if (!saveRes.ok) throw new Error(saveBody.error || '저장 실패');

          const cmpRes = await fetch('/api/compare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const cmp = await cmpRes.json();
          if (!cmpRes.ok) throw new Error(cmp.error || '비교 실패');

          renderResult(cmp);
          await loadGlobalStats();
        } catch (e) {
          errEl.textContent = e.message;
        } finally {
          btn.disabled = false;
          btn.textContent = '제출하고 비교하기';
        }
      });

      loadGlobalStats();
    </script>
  </body>
</html>
