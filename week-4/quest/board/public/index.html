<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>익명 고민·칭찬 게시판</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
      min-height: 100vh;
      padding: 30px 20px;
      color: #333;
    }
    .container { max-width: 680px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 { font-size: 28px; color: #2c3e50; margin-bottom: 6px; }
    header p { color: #7f8c8d; font-size: 14px; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 17px; margin-bottom: 14px; color: #2c3e50; }

    .category-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .cat-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e4ea;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .cat-btn:hover { border-color: #b8c1cc; }
    .cat-btn.active {
      background: #4a90e2;
      border-color: #4a90e2;
      color: #fff;
    }
    .cat-btn[data-cat="고민"].active { background: #e67e22; border-color: #e67e22; }
    .cat-btn[data-cat="칭찬"].active { background: #27ae60; border-color: #27ae60; }
    .cat-btn[data-cat="응원"].active { background: #8e44ad; border-color: #8e44ad; }

    textarea {
      width: 100%;
      min-height: 90px;
      padding: 12px;
      border: 1.5px solid #e0e4ea;
      border-radius: 10px;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #4a90e2; }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #3a7fd0; }
    .submit-btn:disabled { background: #b8c1cc; cursor: not-allowed; }

    .sort-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .sort-bar h2 { margin: 0; }
    .sort-toggle { display: flex; gap: 6px; }
    .sort-btn {
      padding: 6px 12px;
      border: 1.5px solid #e0e4ea;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #7f8c8d;
    }
    .sort-btn.active {
      background: #2c3e50;
      border-color: #2c3e50;
      color: #fff;
    }

    .post {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      border-left: 4px solid #4a90e2;
    }
    .post[data-cat="고민"] { border-left-color: #e67e22; }
    .post[data-cat="칭찬"] { border-left-color: #27ae60; }
    .post[data-cat="응원"] { border-left-color: #8e44ad; }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: #4a90e2;
    }
    .badge[data-cat="고민"] { background: #e67e22; }
    .badge[data-cat="칭찬"] { background: #27ae60; }
    .badge[data-cat="응원"] { background: #8e44ad; }

    .post-time { font-size: 12px; color: #95a5a6; }
    .post-content {
      font-size: 14px;
      line-height: 1.6;
      color: #2c3e50;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 12px;
    }
    .reaction-bar { display: flex; gap: 8px; }
    .react-btn {
      position: relative;
      padding: 6px 14px;
      border: 1.5px solid;
      background: #fff;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      overflow: visible;
    }
    .like-btn { border-color: #ff6b6b; color: #ff6b6b; }
    .like-btn:hover { background: #ff6b6b; color: #fff; }
    .dislike-btn { border-color: #546e7a; color: #546e7a; }
    .dislike-btn:hover { background: #546e7a; color: #fff; }

    .floating-emoji {
      position: absolute;
      left: 50%;
      top: -10px;
      transform: translate(-50%, 0) scale(0);
      font-size: 34px;
      pointer-events: none;
      animation: ddiyong 0.9s cubic-bezier(0.2, 1.6, 0.3, 1) forwards;
      z-index: 10;
    }
    @keyframes ddiyong {
      0%   { transform: translate(-50%, 10px) scale(0) rotate(-15deg); opacity: 0; }
      25%  { transform: translate(-50%, -30px) scale(1.6) rotate(10deg); opacity: 1; }
      45%  { transform: translate(-50%, -50px) scale(1.1) rotate(-5deg); opacity: 1; }
      65%  { transform: translate(-50%, -60px) scale(1.3) rotate(3deg); opacity: 1; }
      100% { transform: translate(-50%, -90px) scale(0.8) rotate(0); opacity: 0; }
    }
    .react-btn.pulse { animation: pulse 0.4s ease; }
    @keyframes pulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #95a5a6;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💌 익명 게시판</h1>
      <p>고민을 나누고, 칭찬과 응원을 주고받아요</p>
    </header>

    <div class="card">
      <h2>✏️ 새 글 작성</h2>
      <div class="category-tabs">
        <button class="cat-btn active" data-cat="고민">고민</button>
        <button class="cat-btn" data-cat="칭찬">칭찬</button>
        <button class="cat-btn" data-cat="응원">응원</button>
      </div>
      <textarea id="content" placeholder="익명으로 자유롭게 이야기해 보세요..."></textarea>
      <button class="submit-btn" id="submitBtn">게시하기</button>
    </div>

    <div class="card">
      <div class="sort-bar">
        <h2>📋 전체 글</h2>
        <div class="sort-toggle">
          <button class="sort-btn active" data-sort="created_at">최신순</button>
          <button class="sort-btn" data-sort="likes">공감순</button>
          <button class="sort-btn" data-sort="dislikes">비추순</button>
        </div>
      </div>
      <div id="postList"></div>
    </div>
  </div>

  <script>
    let selectedCategory = '고민';
    let currentSort = 'created_at';

    document.querySelectorAll('.cat-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = btn.dataset.cat;
      });
    });

    document.querySelectorAll('.sort-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        loadPosts();
      });
    });

    document.getElementById('submitBtn').addEventListener('click', submitPost);

    async function submitPost() {
      const content = document.getElementById('content').value.trim();
      if (!content) return alert('내용을 입력해 주세요.');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;

      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category: selectedCategory, content }),
        });
        if (!res.ok) throw new Error('등록 실패');
        document.getElementById('content').value = '';
        await loadPosts();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function reactPost(id, type, btn) {
      const emoji = type === 'like' ? '💗' : '👎';

      const floater = document.createElement('span');
      floater.className = 'floating-emoji';
      floater.textContent = emoji;
      btn.appendChild(floater);
      btn.classList.add('pulse');
      setTimeout(() => {
        floater.remove();
        btn.classList.remove('pulse');
      }, 900);

      try {
        const res = await fetch(`/api/posts/${id}/${type}`, { method: 'PATCH' });
        if (!res.ok) throw new Error('반응 실패');
        setTimeout(loadPosts, 500);
      } catch (err) {
        alert(err.message);
      }
    }

    function formatTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      return d.toLocaleDateString('ko-KR');
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function loadPosts() {
      const list = document.getElementById('postList');
      try {
        const res = await fetch(`/api/posts?sort=${currentSort}`);
        const posts = await res.json();

        if (!posts.length) {
          list.innerHTML = '<div class="empty">아직 글이 없어요. 첫 글을 남겨보세요!</div>';
          return;
        }

        list.innerHTML = posts
          .map(
            (p) => `
          <div class="post" data-cat="${p.category}">
            <div class="post-header">
              <span class="badge" data-cat="${p.category}">${p.category}</span>
              <span class="post-time">${formatTime(p.created_at)}</span>
            </div>
            <div class="post-content">${escapeHtml(p.content)}</div>
            <div class="reaction-bar">
              <button class="react-btn like-btn" onclick="reactPost(${p.id}, 'like', this)">💗 공감 ${p.likes || 0}</button>
              <button class="react-btn dislike-btn" onclick="reactPost(${p.id}, 'dislike', this)">👎 비추 ${p.dislikes || 0}</button>
            </div>
          </div>
        `,
          )
          .join('');
      } catch (err) {
        list.innerHTML = '<div class="empty">글을 불러오지 못했어요.</div>';
      }
    }

    loadPosts();
  </script>
</body>
</html>
