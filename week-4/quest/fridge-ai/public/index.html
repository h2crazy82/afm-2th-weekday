<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉장고 재료 & 레시피 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .fade-in {
      animation: fadeIn 0.25s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================================
    // API Config
    // ========================================
    const API_BASE_URL = '/api';

    // ========================================
    // Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', children, className = '' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-emerald-600 hover:bg-emerald-700 text-white focus:ring-emerald-500',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800 focus:ring-slate-400',
        danger: 'bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 focus:ring-red-400',
        ghost: 'hover:bg-slate-100 text-slate-700 focus:ring-slate-300',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-xs',
        md: 'px-4 py-2 text-sm',
        lg: 'px-5 py-2.5 text-base',
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, error, disabled, required, className = '' }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && (
            <label className="text-sm font-medium text-slate-700">
              {label}{required && <span className="text-red-500 ml-0.5">*</span>}
            </label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors disabled:bg-slate-50 ${
              error ? 'border-red-400' : 'border-slate-300'
            }`}
          />
          {error && <span className="text-xs text-red-500">{error}</span>}
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, rows = 4, required, className = '' }) {
      return (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && (
            <label className="text-sm font-medium text-slate-700">
              {label}{required && <span className="text-red-500 ml-0.5">*</span>}
            </label>
          )}
          <textarea
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            rows={rows}
            className="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors resize-y"
          />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, color = 'slate' }) {
      const colors = {
        slate: 'bg-slate-100 text-slate-700',
        emerald: 'bg-emerald-100 text-emerald-700',
        amber: 'bg-amber-100 text-amber-700',
        sky: 'bg-sky-100 text-sky-700',
        rose: 'bg-rose-100 text-rose-700',
      };
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${colors[color]}`}>
          {children}
        </span>
      );
    }

    function EmptyState({ title, description }) {
      return (
        <div className="text-center py-10 px-4">
          <div className="mx-auto w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0H4" />
            </svg>
          </div>
          <p className="text-sm font-medium text-slate-700">{title}</p>
          {description && <p className="text-xs text-slate-500 mt-1">{description}</p>}
        </div>
      );
    }

    function Spinner({ className = '' }) {
      return (
        <svg className={`animate-spin h-5 w-5 text-emerald-600 ${className}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
      );
    }

    function Alert({ type = 'error', children }) {
      const colors = {
        error: 'bg-red-50 border-red-200 text-red-700',
        info: 'bg-sky-50 border-sky-200 text-sky-700',
      };
      return (
        <div className={`border rounded-lg px-3 py-2 text-sm ${colors[type]}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // Helpers
    // ========================================
    const categoryColorMap = {
      '냉장': 'sky',
      '냉동': 'indigo',
      '상온': 'amber',
      '채소': 'emerald',
      '과일': 'rose',
      '육류': 'rose',
      '유제품': 'amber',
      '해산물': 'sky',
    };
    const getCategoryColor = (cat) => categoryColorMap[cat] || 'slate';

    const chipColorMap = {
      slate: {
        bg: 'bg-slate-100 hover:bg-slate-200',
        border: 'border-slate-200',
        text: 'text-slate-800',
        sub: 'text-slate-500',
        close: 'text-slate-400 hover:text-slate-700 hover:bg-slate-300',
      },
      emerald: {
        bg: 'bg-emerald-50 hover:bg-emerald-100',
        border: 'border-emerald-200',
        text: 'text-emerald-800',
        sub: 'text-emerald-600',
        close: 'text-emerald-400 hover:text-emerald-800 hover:bg-emerald-200',
      },
      amber: {
        bg: 'bg-amber-50 hover:bg-amber-100',
        border: 'border-amber-200',
        text: 'text-amber-800',
        sub: 'text-amber-600',
        close: 'text-amber-400 hover:text-amber-800 hover:bg-amber-200',
      },
      sky: {
        bg: 'bg-sky-50 hover:bg-sky-100',
        border: 'border-sky-200',
        text: 'text-sky-800',
        sub: 'text-sky-600',
        close: 'text-sky-400 hover:text-sky-800 hover:bg-sky-200',
      },
      rose: {
        bg: 'bg-rose-50 hover:bg-rose-100',
        border: 'border-rose-200',
        text: 'text-rose-800',
        sub: 'text-rose-600',
        close: 'text-rose-400 hover:text-rose-800 hover:bg-rose-200',
      },
      indigo: {
        bg: 'bg-indigo-50 hover:bg-indigo-100',
        border: 'border-indigo-200',
        text: 'text-indigo-800',
        sub: 'text-indigo-600',
        close: 'text-indigo-400 hover:text-indigo-800 hover:bg-indigo-200',
      },
    };
    const getChipStyle = (cat) => chipColorMap[getCategoryColor(cat)] || chipColorMap.slate;

    function formatDate(value) {
      if (!value) return '';
      try {
        const d = new Date(value);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
      } catch (e) {
        return '';
      }
    }

    async function apiRequest(path, options = {}) {
      const res = await fetch(`${API_BASE_URL}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        let msg = `요청 실패 (${res.status})`;
        try {
          const body = await res.json();
          if (body?.error) msg = body.error;
        } catch (e) {}
        throw new Error(msg);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    // ========================================
    // Ingredients Section
    // ========================================
    function IngredientChip({ item, onDelete }) {
      const style = getChipStyle(item.category);
      const hasSub = Boolean(item.quantity || item.category);
      return (
        <span
          className={`fade-in group inline-flex items-center gap-1.5 pl-3 pr-1 py-1 rounded-full border text-sm transition-colors ${style.bg} ${style.border} ${style.text}`}
        >
          <span className="font-medium truncate max-w-[12rem]">{item.name}</span>
          {hasSub && (
            <span className={`text-xs ${style.sub}`}>
              {item.quantity && <span>{item.quantity}</span>}
              {item.quantity && item.category && <span className="mx-1">·</span>}
              {item.category && <span>{item.category}</span>}
            </span>
          )}
          <button
            type="button"
            onClick={() => onDelete(item.id)}
            aria-label={`${item.name} 삭제`}
            className={`ml-0.5 w-5 h-5 inline-flex items-center justify-center rounded-full transition-colors opacity-60 group-hover:opacity-100 ${style.close}`}
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </span>
      );
    }

    function IngredientsSection({ onChanged }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [submitting, setSubmitting] = useState(false);
      const [form, setForm] = useState({ name: '', quantity: '', category: '' });
      const nameInputRef = useRef(null);

      const load = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const data = await apiRequest('/ingredients');
          setItems(Array.isArray(data) ? data : []);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleSubmit = async (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!form.name.trim()) {
          setError('재료명을 입력해 주세요.');
          nameInputRef.current?.focus();
          return;
        }
        setSubmitting(true);
        setError(null);
        try {
          await apiRequest('/ingredients', {
            method: 'POST',
            body: JSON.stringify({
              name: form.name.trim(),
              quantity: form.quantity.trim(),
              category: form.category.trim(),
            }),
          });
          setForm({ name: '', quantity: '', category: '' });
          await load();
          onChanged && onChanged();
          // Re-focus the name input after adding for rapid entry
          nameInputRef.current?.focus();
        } catch (e) {
          setError(e.message);
        } finally {
          setSubmitting(false);
        }
      };

      const handleNameKeyDown = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSubmit();
        }
      };

      const handleDelete = async (id) => {
        setError(null);
        // Optimistic removal
        const prev = items;
        setItems((cur) => cur.filter((x) => x.id !== id));
        try {
          await apiRequest(`/ingredients/${id}`, { method: 'DELETE' });
          onChanged && onChanged();
        } catch (e) {
          setError(e.message);
          setItems(prev); // rollback
        }
      };

      return (
        <Card className="p-5 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-lg font-semibold text-slate-900">재료 관리</h2>
              <p className="text-xs text-slate-500 mt-0.5">재료명을 입력하고 Enter로 빠르게 추가하세요.</p>
            </div>
            <Badge color="emerald">{items.length}개</Badge>
          </div>

          <form onSubmit={handleSubmit} className="mb-5">
            <div className="flex flex-wrap items-stretch gap-2 p-2 border border-slate-300 rounded-xl bg-white focus-within:ring-2 focus-within:ring-emerald-500 focus-within:border-emerald-500 transition-colors">
              <input
                ref={nameInputRef}
                type="text"
                value={form.name}
                onChange={(e) => setForm({ ...form, name: e.target.value })}
                onKeyDown={handleNameKeyDown}
                placeholder="재료명 (예: 당근)"
                aria-label="재료명"
                className="flex-1 min-w-[10rem] px-2 py-1.5 text-sm bg-transparent focus:outline-none placeholder:text-slate-400"
              />
              <input
                type="text"
                value={form.quantity}
                onChange={(e) => setForm({ ...form, quantity: e.target.value })}
                onKeyDown={handleNameKeyDown}
                placeholder="수량"
                aria-label="수량"
                className="w-24 px-2 py-1.5 text-sm bg-slate-50 rounded-md border border-slate-200 focus:outline-none focus:border-emerald-400 placeholder:text-slate-400"
              />
              <input
                type="text"
                value={form.category}
                onChange={(e) => setForm({ ...form, category: e.target.value })}
                onKeyDown={handleNameKeyDown}
                placeholder="카테고리"
                aria-label="카테고리"
                className="w-28 px-2 py-1.5 text-sm bg-slate-50 rounded-md border border-slate-200 focus:outline-none focus:border-emerald-400 placeholder:text-slate-400"
              />
              <Button type="submit" size="sm" disabled={submitting}>
                {submitting ? '추가 중...' : '추가'}
              </Button>
            </div>
            <p className="mt-1.5 text-xs text-slate-400">Enter 키로 빠르게 추가할 수 있어요. 수량·카테고리는 선택 사항입니다.</p>
          </form>

          {error && <div className="mb-3"><Alert>{error}</Alert></div>}

          {loading ? (
            <div className="flex items-center justify-center py-10">
              <Spinner />
            </div>
          ) : items.length === 0 ? (
            <EmptyState title="등록된 재료가 없습니다" description="위 입력창에서 첫 재료를 추가해 보세요." />
          ) : (
            <div className="flex flex-wrap gap-2">
              {items.map((item) => (
                <IngredientChip key={item.id} item={item} onDelete={handleDelete} />
              ))}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // Recipes Section
    // ========================================
    function RecipeItem({ recipe, onDelete }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <li className="fade-in py-3">
          <div className="flex items-start justify-between gap-3">
            <button
              type="button"
              onClick={() => setExpanded((v) => !v)}
              className="flex-1 min-w-0 text-left"
            >
              <div className="flex items-center gap-2">
                <span className="font-medium text-slate-900">{recipe.title}</span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  className={`h-4 w-4 text-slate-400 transition-transform ${expanded ? 'rotate-180' : ''}`}
                  fill="none" viewBox="0 0 24 24" stroke="currentColor"
                >
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                </svg>
              </div>
              {recipe.created_at && (
                <div className="mt-1 text-xs text-slate-500">등록: {formatDate(recipe.created_at)}</div>
              )}
            </button>
            <Button variant="danger" size="sm" onClick={() => onDelete(recipe.id)}>
              삭제
            </Button>
          </div>
          {expanded && (
            <div className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-3">
              <div className="bg-slate-50 rounded-lg p-3 border border-slate-100">
                <div className="text-xs font-semibold text-slate-600 mb-1">재료</div>
                <pre className="whitespace-pre-wrap text-sm text-slate-800 font-sans">
                  {recipe.ingredients || '—'}
                </pre>
              </div>
              <div className="bg-slate-50 rounded-lg p-3 border border-slate-100">
                <div className="text-xs font-semibold text-slate-600 mb-1">조리 순서</div>
                <pre className="whitespace-pre-wrap text-sm text-slate-800 font-sans">
                  {recipe.steps || '—'}
                </pre>
              </div>
            </div>
          )}
        </li>
      );
    }

    function RecipesSection() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [submitting, setSubmitting] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [aiNote, setAiNote] = useState('');
      const [form, setForm] = useState({ title: '', ingredients: '', steps: '' });

      const handleGenerate = async () => {
        setGenerating(true);
        setError(null);
        try {
          const data = await apiRequest('/generate-recipe', {
            method: 'POST',
            body: JSON.stringify({ note: aiNote.trim() }),
          });
          setForm({
            title: data.title || '',
            ingredients: data.ingredients || '',
            steps: data.steps || '',
          });
        } catch (e) {
          setError(e.message);
        } finally {
          setGenerating(false);
        }
      };

      const load = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const data = await apiRequest('/recipes');
          setItems(Array.isArray(data) ? data : []);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.title.trim()) {
          setError('제목을 입력해 주세요.');
          return;
        }
        setSubmitting(true);
        setError(null);
        try {
          await apiRequest('/recipes', {
            method: 'POST',
            body: JSON.stringify({
              title: form.title.trim(),
              ingredients: form.ingredients,
              steps: form.steps,
            }),
          });
          setForm({ title: '', ingredients: '', steps: '' });
          await load();
        } catch (e) {
          setError(e.message);
        } finally {
          setSubmitting(false);
        }
      };

      const handleDelete = async (id) => {
        if (!window.confirm('이 레시피를 삭제하시겠어요?')) return;
        setError(null);
        try {
          await apiRequest(`/recipes/${id}`, { method: 'DELETE' });
          setItems((prev) => prev.filter((x) => x.id !== id));
        } catch (e) {
          setError(e.message);
        }
      };

      return (
        <Card className="p-5 sm:p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-lg font-semibold text-slate-900">레시피 관리</h2>
              <p className="text-xs text-slate-500 mt-0.5">나만의 레시피를 기록하고 보관하세요.</p>
            </div>
            <Badge color="sky">{items.length}개</Badge>
          </div>

          <div className="mb-5 p-4 rounded-xl border border-emerald-200 bg-gradient-to-br from-emerald-50 to-sky-50">
            <div className="flex items-center gap-2 mb-2">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
              <h3 className="text-sm font-semibold text-slate-800">AI 레시피 생성</h3>
              <Badge color="emerald">냉장고 재료 기반</Badge>
            </div>
            <p className="text-xs text-slate-600 mb-3">현재 냉장고에 등록된 재료로 만들 수 있는 레시피를 AI가 제안해 줍니다.</p>
            <div className="flex flex-wrap gap-2">
              <input
                type="text"
                value={aiNote}
                onChange={(e) => setAiNote(e.target.value)}
                placeholder="추가 요청 (예: 매운맛, 15분 이내, 한식 등)"
                className="flex-1 min-w-[12rem] px-3 py-2 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 placeholder:text-slate-400"
              />
              <Button onClick={handleGenerate} disabled={generating}>
                {generating ? (
                  <span className="flex items-center gap-2">
                    <Spinner className="!h-4 !w-4 !text-white" />
                    생성 중...
                  </span>
                ) : 'AI로 레시피 생성'}
              </Button>
            </div>
          </div>

          <form onSubmit={handleSubmit} className="flex flex-col gap-3 mb-5">
            <Input
              label="제목"
              value={form.title}
              onChange={(e) => setForm({ ...form, title: e.target.value })}
              placeholder="예) 김치찌개"
              required
            />
            <Textarea
              label="재료"
              value={form.ingredients}
              onChange={(e) => setForm({ ...form, ingredients: e.target.value })}
              placeholder={'한 줄에 하나씩 적어주세요.\n예)\n돼지고기 200g\n김치 1/2포기\n두부 1모'}
              rows={5}
            />
            <Textarea
              label="조리 순서"
              value={form.steps}
              onChange={(e) => setForm({ ...form, steps: e.target.value })}
              placeholder={'단계별로 적어주세요.\n1. 돼지고기를 볶는다.\n2. 김치를 넣고 함께 볶는다.\n3. 물을 붓고 끓인다.'}
              rows={6}
            />
            <div className="flex justify-end">
              <Button type="submit" disabled={submitting}>
                {submitting ? '추가 중...' : '레시피 추가'}
              </Button>
            </div>
          </form>

          {error && <div className="mb-3"><Alert>{error}</Alert></div>}

          {loading ? (
            <div className="flex items-center justify-center py-10">
              <Spinner />
            </div>
          ) : items.length === 0 ? (
            <EmptyState title="등록된 레시피가 없습니다" description="위 양식에서 첫 레시피를 추가해 보세요." />
          ) : (
            <ul className="divide-y divide-slate-100">
              {items.map((recipe) => (
                <RecipeItem key={recipe.id} recipe={recipe} onDelete={handleDelete} />
              ))}
            </ul>
          )}
        </Card>
      );
    }

    // ========================================
    // Recommended Recipe (Auto AI)
    // ========================================
    function RecommendedRecipeSection({ refreshTick }) {
      const [recipe, setRecipe] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [savedMsg, setSavedMsg] = useState('');
      const abortRef = useRef(null);

      const generate = useCallback(async () => {
        if (abortRef.current) abortRef.current.aborted = true;
        const token = { aborted: false };
        abortRef.current = token;

        setLoading(true);
        setError(null);
        setSavedMsg('');
        try {
          const data = await apiRequest('/generate-recipe', {
            method: 'POST',
            body: JSON.stringify({}),
          });
          if (!token.aborted) setRecipe(data);
        } catch (e) {
          if (!token.aborted) {
            setRecipe(null);
            setError(e.message);
          }
        } finally {
          if (!token.aborted) setLoading(false);
        }
      }, []);

      // Debounced auto-regeneration on ingredient changes
      useEffect(() => {
        const t = setTimeout(() => { generate(); }, refreshTick === 0 ? 0 : 1200);
        return () => clearTimeout(t);
      }, [refreshTick, generate]);

      const handleSave = async () => {
        if (!recipe?.title) return;
        setSavedMsg('');
        try {
          await apiRequest('/recipes', {
            method: 'POST',
            body: JSON.stringify({
              title: recipe.title,
              ingredients: recipe.ingredients,
              steps: recipe.steps,
            }),
          });
          setSavedMsg('레시피로 저장되었습니다.');
        } catch (e) {
          setError(e.message);
        }
      };

      return (
        <Card className="p-5 sm:p-6 mb-6 border-emerald-200 bg-gradient-to-br from-emerald-50/60 to-sky-50/60">
          <div className="flex items-center justify-between gap-3 mb-4">
            <div className="flex items-center gap-2">
              <div className="w-9 h-9 rounded-xl bg-emerald-100 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
              </div>
              <div>
                <h2 className="text-lg font-semibold text-slate-900">오늘의 AI 추천 레시피</h2>
                <p className="text-xs text-slate-500 mt-0.5">냉장고 재료가 바뀔 때마다 자동으로 다시 추천합니다.</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <Button variant="secondary" size="sm" onClick={generate} disabled={loading}>
                {loading ? '생성 중...' : '다시 추천'}
              </Button>
              {recipe?.title && (
                <Button size="sm" onClick={handleSave}>
                  레시피로 저장
                </Button>
              )}
            </div>
          </div>

          {error && <div className="mb-3"><Alert>{error}</Alert></div>}
          {savedMsg && <div className="mb-3"><Alert type="info">{savedMsg}</Alert></div>}

          {loading && !recipe ? (
            <div className="flex items-center justify-center py-10">
              <Spinner />
              <span className="ml-2 text-sm text-slate-500">재료로 레시피와 단계별 이미지를 생성 중입니다... (20~40초 소요)</span>
            </div>
          ) : recipe?.title ? (
            <div className="fade-in">
              <div className="flex items-center gap-2 mb-3">
                <h3 className="text-xl font-bold text-slate-900">{recipe.title}</h3>
                {loading && <Spinner className="!h-4 !w-4" />}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div className="bg-white rounded-lg p-3 border border-emerald-100">
                  <div className="text-xs font-semibold text-emerald-700 mb-1">재료</div>
                  <pre className="whitespace-pre-wrap text-sm text-slate-800 font-sans">
                    {recipe.ingredients || '—'}
                  </pre>
                </div>
                <div className="bg-white rounded-lg p-3 border border-sky-100">
                  <div className="text-xs font-semibold text-sky-700 mb-2">조리 순서</div>
                  {recipe.step_images && recipe.step_images.length > 0 ? (
                    <ol className="space-y-3">
                      {recipe.step_images.map((s, i) => (
                        <li key={i} className="flex gap-3">
                          <div className="w-24 h-24 rounded-lg bg-slate-100 border border-slate-200 flex-shrink-0 overflow-hidden">
                            {s.image_url ? (
                              <img
                                src={s.image_url}
                                alt={`단계 ${i + 1}`}
                                className="w-full h-full object-cover"
                                loading="lazy"
                              />
                            ) : (
                              <div className="w-full h-full flex items-center justify-center text-xs text-slate-400">이미지 없음</div>
                            )}
                          </div>
                          <div className="flex-1 text-sm text-slate-800 whitespace-pre-wrap">{s.step}</div>
                        </li>
                      ))}
                    </ol>
                  ) : (
                    <pre className="whitespace-pre-wrap text-sm text-slate-800 font-sans">
                      {recipe.steps || '—'}
                    </pre>
                  )}
                </div>
              </div>
            </div>
          ) : (
            <EmptyState title="추천할 레시피가 없습니다" description="재료를 추가하면 자동으로 레시피를 추천해 드립니다." />
          )}
        </Card>
      );
    }

    // ========================================
    // Header
    // ========================================
    function Header() {
      return (
        <header className="bg-white border-b border-slate-200">
          <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5 flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z M3 10h18 M8 6v1 M8 14v3" />
              </svg>
            </div>
            <div>
              <h1 className="text-xl font-bold text-slate-900">냉장고 재료 & 레시피</h1>
              <p className="text-xs text-slate-500">재료를 관리하고 나만의 레시피를 기록하세요.</p>
            </div>
          </div>
        </header>
      );
    }

    // ========================================
    // App
    // ========================================
    function App() {
      const [tab, setTab] = useState('ingredients');
      const [refreshTick, setRefreshTick] = useState(0);
      const bumpRefresh = useCallback(() => setRefreshTick((n) => n + 1), []);

      return (
        <div className="min-h-screen">
          <Header />
          <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
            <RecommendedRecipeSection refreshTick={refreshTick} />

            {/* Mobile: Tabs */}
            <div className="lg:hidden mb-4">
              <div className="inline-flex bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
                <button
                  type="button"
                  onClick={() => setTab('ingredients')}
                  className={`px-4 py-2 text-sm font-medium rounded-lg transition-colors ${
                    tab === 'ingredients' ? 'bg-emerald-600 text-white' : 'text-slate-600 hover:bg-slate-50'
                  }`}
                >
                  재료
                </button>
                <button
                  type="button"
                  onClick={() => setTab('recipes')}
                  className={`px-4 py-2 text-sm font-medium rounded-lg transition-colors ${
                    tab === 'recipes' ? 'bg-emerald-600 text-white' : 'text-slate-600 hover:bg-slate-50'
                  }`}
                >
                  레시피
                </button>
              </div>
            </div>

            {/* Mobile view */}
            <div className="lg:hidden">
              {tab === 'ingredients' ? <IngredientsSection onChanged={bumpRefresh} /> : <RecipesSection />}
            </div>

            {/* Desktop view: side-by-side */}
            <div className="hidden lg:grid grid-cols-2 gap-6 items-start">
              <IngredientsSection onChanged={bumpRefresh} />
              <RecipesSection />
            </div>
          </main>
          <footer className="max-w-6xl mx-auto px-4 sm:px-6 py-6 text-center text-xs text-slate-400">
            Fridge App · Express + PostgreSQL + React
          </footer>
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
