<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토스 스타일 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            toss: {
              blue: '#3182f6',
              'blue-dark': '#1b6ce5',
              dark: '#191f28',
              gray: '#4e5968',
              'gray-light': '#8b95a1',
              'gray-lighter': '#b0b8c1',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
        'Pretendard', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body class="bg-neutral-100 text-toss-dark leading-relaxed">

  <!-- 네비게이션 -->
  <nav class="fixed top-0 left-0 right-0 bg-white/85 backdrop-blur-xl border-b border-black/5 px-6 h-14 flex items-center justify-between z-50">
    <div class="text-xl font-bold text-toss-blue">My Page</div>
    <ul class="hidden sm:flex gap-6 list-none">
      <li><a href="#features" class="text-toss-gray text-sm font-medium no-underline transition-colors duration-200 hover:text-toss-blue">소개</a></li>
      <li><a href="#link" class="text-toss-gray text-sm font-medium no-underline transition-colors duration-200 hover:text-toss-blue">링크</a></li>
    </ul>
  </nav>

  <!-- 히어로 -->
  <section class="pt-36 pb-20 px-6 text-center bg-gradient-to-b from-white to-neutral-100">
    <h1 class="text-5xl sm:text-5xl max-sm:text-3xl font-extrabold leading-tight tracking-tighter text-toss-dark mb-5">
      <span id="greeting" class="cursor-pointer hover:opacity-70 transition-opacity duration-200">안녕하세요</span><br>
      <span id="dance-text" class="text-toss-blue cursor-pointer inline-block">반갑습니다</span>
    </h1>
    <p class="text-lg max-sm:text-base text-toss-gray-light max-w-md mx-auto mb-10 leading-relaxed">
      본문입니다. 토스 스타일로 깔끔하게 꾸며진 페이지를 경험해보세요.
    </p>
    <a href="#features" class="inline-block bg-toss-blue text-white py-4 px-10 rounded-xl text-base font-semibold no-underline transition-all duration-200 hover:bg-toss-blue-dark hover:-translate-y-0.5">
      자세히 보기
    </a>
  </section>

  <!-- 카드 섹션 -->
  <section class="max-w-4xl mx-auto py-16 px-6" id="features">
    <h2 class="text-3xl max-sm:text-2xl font-bold tracking-tight text-toss-dark mb-3">제목 1</h2>
    <p class="text-base text-toss-gray-light mb-10 leading-relaxed">다양한 기능을 카드 형태로 살펴보세요.</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <div class="bg-white rounded-2xl py-8 px-7 cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-xl">
        <div class="text-4xl mb-4">&#x1F680;</div>
        <h3 class="text-xl font-bold tracking-tight text-toss-dark mb-2">제목 2</h3>
        <p class="text-sm text-toss-gray-light leading-relaxed">빠르고 간편한 경험을 제공합니다. 복잡한 건 저희가 처리할게요.</p>
      </div>
      <div class="bg-white rounded-2xl py-8 px-7 cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-xl">
        <div class="text-4xl mb-4">&#x1F512;</div>
        <h3 class="text-xl font-bold tracking-tight text-toss-dark mb-2">제목 3</h3>
        <p class="text-sm text-toss-gray-light leading-relaxed">안전하고 신뢰할 수 있는 서비스를 만들어갑니다.</p>
      </div>
      <div class="bg-white rounded-2xl py-8 px-7 cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-xl">
        <div class="text-4xl mb-4">&#x2728;</div>
        <h3 class="text-xl font-bold tracking-tight text-toss-dark mb-2">깔끔한 디자인</h3>
        <p class="text-sm text-toss-gray-light leading-relaxed">군더더기 없는 심플한 인터페이스를 지향합니다.</p>
      </div>
    </div>
  </section>

  <!-- 링크 섹션 -->
  <section class="max-w-4xl mx-auto pt-5 pb-20 px-6" id="link">
    <div class="bg-white rounded-2xl py-6 px-7 flex items-center justify-between transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg">
      <a href="https://www.naver.com" class="text-toss-blue no-underline text-base font-semibold hover:underline">네이버 바로가기</a>
      <span class="text-toss-blue text-xl">&rarr;</span>
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="bg-toss-dark text-toss-gray-light text-center py-10 px-6 text-sm leading-loose">
    <p>&copy; 2026 My Page. All rights reserved.</p>
  </footer>

  <script src="client.js"></script>
</body>
</html>
